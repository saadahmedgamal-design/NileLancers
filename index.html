                            <span>{s.name} <span style={{ opacity: 0.5, fontSize: '11px' }}>({s.category})</span></span>
                            <button onClick={() => handleDeleteSkill(s.id)}><i className="fas fa-times"></i></button>
                          </div>
                        ))}
                        {skills.length === 0 && <div className="admin-empty">No skills</div>}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ── DB TOOLS ── */}
            {activeTab === 'db' && (
              <div className="admin-content">
                <div className="admin-db-grid">
                  <div className="admin-panel">
                    <div className="admin-panel-header"><i className="fas fa-seedling"></i> Seed Data</div>
                    <div className="admin-panel-body admin-db-actions">
                      <div className="admin-db-action-card">
                        <div className="admin-db-icon" style={{ background: '#6c63ff18', color: '#6c63ff' }}><i className="fas fa-briefcase"></i></div>
                        <div>
                          <div className="admin-db-action-title">Re-seed Jobs</div>
                          <div className="admin-db-action-desc">Overwrite Firestore jobs collection with {(window.DB_SEED_JOBS || []).length} default job listings.</div>
                        </div>
                        <button className="admin-btn admin-btn-primary" onClick={handleReseedJobs}>Run</button>
                      </div>
                      <div className="admin-db-action-card">
                        <div className="admin-db-icon" style={{ background: '#10b98118', color: '#10b981' }}><i className="fas fa-layer-group"></i></div>
                        <div>
                          <div className="admin-db-action-title">Re-seed Categories</div>
                          <div className="admin-db-action-desc">Write {(window.DB_SEED_CATEGORIES || []).length} default categories to Firestore.</div>
                        </div>
                        <button className="admin-btn admin-btn-primary" onClick={() => {
                          const batch = firebase.firestore().batch();
                          (window.DB_SEED_CATEGORIES || []).forEach(c => batch.set(firebase.firestore().collection('categories').doc(c.id), c));
                          batch.commit().then(() => { showToast('Categories re-seeded.'); loadData(); }).catch(e => showToast(e.message, 'error'));
                        }}>Run</button>
                      </div>
                      <div className="admin-db-action-card">
                        <div className="admin-db-icon" style={{ background: '#f59e0b18', color: '#f59e0b' }}><i className="fas fa-tags"></i></div>
                        <div>
                          <div className="admin-db-action-title">Re-seed Skills</div>
                          <div className="admin-db-action-desc">Write {(window.DB_SEED_SKILLS || []).length} default skills to Firestore.</div>
                        </div>
                        <button className="admin-btn admin-btn-primary" onClick={() => {
                          const batch = firebase.firestore().batch();
                          (window.DB_SEED_SKILLS || []).forEach(s => batch.set(firebase.firestore().collection('skills').doc(s.id), s));
                          batch.commit().then(() => { showToast('Skills re-seeded.'); loadData(); }).catch(e => showToast(e.message, 'error'));
                        }}>Run</button>
                      </div>
                    </div>
                  </div>

                  <div className="admin-panel">
                    <div className="admin-panel-header" style={{ color: '#ef4444' }}><i className="fas fa-exclamation-triangle"></i> Danger Zone</div>
                    <div className="admin-panel-body admin-db-actions">
                      <div className="admin-db-action-card admin-db-danger">
                        <div className="admin-db-icon" style={{ background: '#ef444418', color: '#ef4444' }}><i className="fas fa-file-alt"></i></div>
                        <div>
                          <div className="admin-db-action-title">Wipe All Applications</div>
                          <div className="admin-db-action-desc">Permanently delete all {applications.length} application documents from Firestore.</div>
                        </div>
                        <button className="admin-btn admin-btn-danger" onClick={handleWipeApplications}>Delete</button>
                      </div>
                      <div className="admin-db-action-card admin-db-danger">
                        <div className="admin-db-icon" style={{ background: '#ef444418', color: '#ef4444' }}><i className="fas fa-briefcase"></i></div>
                        <div>
                          <div className="admin-db-action-title">Wipe All Jobs</div>
                          <div className="admin-db-action-desc">Permanently delete all {jobs.length} job documents from Firestore.</div>
                        </div>
                        <button className="admin-btn admin-btn-danger" onClick={() => {
                          if (!window.confirm('DANGER: Delete ALL jobs?')) return;
                          firebase.firestore().collection('jobs').get()
                            .then(snap => { const b = firebase.firestore().batch(); snap.docs.forEach(d => b.delete(d.ref)); return b.commit(); })
                            .then(() => { showToast('All jobs wiped.', 'warning'); loadData(); })
                            .catch(e => showToast(e.message, 'error'));
                        }}>Delete</button>
                      </div>
                    </div>
                  </div>

                  <div className="admin-panel">
                    <div className="admin-panel-header"><i className="fas fa-info-circle"></i> Firebase Config</div>
                    <div className="admin-panel-body">
                      <div className="admin-config-block">
                        <div className="admin-config-row"><span>Project ID</span><code>nilelancers2</code></div>
                        <div className="admin-config-row"><span>Auth Domain</span><code>nilelancers2.firebaseapp.com</code></div>
                        <div className="admin-config-row"><span>Storage Bucket</span><code>nilelancers2.firebasestorage.app</code></div>
                        <div className="admin-config-row"><span>Measurement ID</span><code>G-0KMYYX994M</code></div>
                        <div className="admin-config-row"><span>SDK Version</span><code>Firebase v10 compat</code></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ── SITE SETTINGS ── */}
            {activeTab === 'settings' && (
              <div className="admin-content">
                <div className="admin-settings-grid">
                  <div className="admin-panel">
                    <div className="admin-panel-header"><i className="fas fa-toggle-on"></i> Platform Controls</div>
                    <div className="admin-panel-body">
                      {[
                        { key: 'maintenanceMode', label: 'Maintenance Mode', desc: 'Show a maintenance banner to all visitors.', danger: true },
                        { key: 'newRegistrations', label: 'New Registrations', desc: 'Allow new users to create accounts.' },
                        { key: 'jobPostingEnabled', label: 'Job Posting', desc: 'Allow clients to post new service listings.' },
                        { key: 'emailNotifications', label: 'Email Notifications', desc: 'Send system emails for events.' },
                        { key: 'autoSeed', label: 'Auto-Seed on Load', desc: 'Auto-populate Firestore collections on first load.' },
                      ].map(s => (
                        <div key={s.key} className="admin-setting-row">
                          <div>
                            <div className="admin-setting-label" style={s.danger && siteSettings[s.key] ? { color: '#ef4444' } : {}}>{s.label}</div>
                            <div className="admin-setting-desc">{s.desc}</div>
                          </div>
                          <button
                            className={`admin-toggle${siteSettings[s.key] ? ' on' : ''}`}
                            onClick={() => setSiteSettings(prev => ({ ...prev, [s.key]: !prev[s.key] }))}
                          >
                            <span className="admin-toggle-thumb"></span>
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="admin-panel">
                    <div className="admin-panel-header"><i className="fas fa-palette"></i> Appearance</div>
                    <div className="admin-panel-body">
                      <div className="admin-setting-row">
                        <div>
                          <div className="admin-setting-label">Primary Color</div>
                          <div className="admin-setting-desc">Brand accent color for buttons and highlights.</div>
                        </div>
                        <input type="color" className="admin-color-picker" defaultValue="#c9a84c" />
                      </div>
                      <div className="admin-setting-row">
                        <div>
                          <div className="admin-setting-label">Platform Name</div>
                          <div className="admin-setting-desc">Displayed in the header and emails.</div>
                        </div>
                        <input type="text" className="admin-form-input" style={{ width: '160px' }} defaultValue="NileLancers" />
                      </div>
                      <div className="admin-setting-row">
                        <div>
                          <div className="admin-setting-label">Support Email</div>
                          <div className="admin-setting-desc">Contact email shown on pages.</div>
                        </div>
                        <input type="email" className="admin-form-input" style={{ width: '200px' }} defaultValue="info@nilelancers.com" />
                      </div>
                      <div style={{ marginTop: '16px' }}>
                        <button className="btn-primary" onClick={() => showToast('Settings saved (UI only — connect to Firestore to persist).')}>
                          <i className="fas fa-save"></i> Save Settings
                        </button>
                      </div>
                    </div>
                  </div>

                  <div className="admin-panel">
                    <div className="admin-panel-header"><i className="fas fa-envelope"></i> Email Templates</div>
                    <div className="admin-panel-body">
                      {['Welcome Email', 'Application Accepted', 'Application Rejected', 'Password Reset', 'New Job Alert'].map(t => (
                        <div key={t} className="admin-email-row">
                          <div className="admin-email-icon"><i className="fas fa-envelope"></i></div>
                          <div className="admin-setting-label">{t}</div>
                          <button className="admin-btn admin-btn-outline"><i className="fas fa-edit"></i> Edit</button>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="admin-panel">
                    <div className="admin-panel-header"><i className="fas fa-chart-bar"></i> Analytics Overview</div>
                    <div className="admin-panel-body">
                      <div className="admin-analytics-grid">
                        {[
                          { label: 'Page Views', value: '24,821', icon: 'fa-eye', color: '#6c63ff' },
                          { label: 'Unique Visitors', value: '8,340', icon: 'fa-user', color: '#10b981' },
                          { label: 'Avg. Session', value: '3m 42s', icon: 'fa-clock', color: '#f59e0b' },
                          { label: 'Bounce Rate', value: '41%', icon: 'fa-sign-out-alt', color: '#ef4444' },
                        ].map((a, i) => (
                          <div key={i} className="admin-analytics-card" style={{ '--ac': a.color }}>
                            <div className="admin-analytics-icon"><i className={`fas ${a.icon}`}></i></div>
                            <div className="admin-analytics-value">{a.value}</div>
                            <div className="admin-analytics-label">{a.label}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ── DB EXPLORER ── */}
            {activeTab === 'db-explorer' && <DbExplorerTab showToast={showToast} />}

          </main>
        </div>
      );
    }

    /* ============================================================
       SAVED JOBS PAGE
       ============================================================ */
    function SavedJobsPage({ lang, user, setPage }) {
      const dir = lang === 'ar' ? 'rtl' : 'ltr';
      const [jobs,    setJobs]    = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [saved,   setSaved]   = React.useState([]);
      const [saving,  setSaving]  = React.useState(null);
      const [applied, setApplied] = React.useState([]);
      const [applying,setApplying]= React.useState(null);
      const [query,   setQuery]   = React.useState('');

      React.useEffect(() => {
        if (!user) { setLoading(false); return; }
        Promise.all([
          window.UserDB.getSavedJobs(user.id),
          window.UserDB.getSavedJobIds(user.id),
          window.UserDB.listMyApplications(user.id),
        ]).then(([jobList, savedIds, apps]) => {
          setJobs(jobList);
          setSaved(savedIds);
          setApplied(apps.map(a => a.jobId));
          setLoading(false);
        });
      }, [user]);

      if (!user) {
        return (
          <div className="saved-jobs-page" dir={dir}>
            <div className="saved-jobs-empty">
              <i className="fas fa-lock" style={{ color: 'var(--gold)', opacity: 0.6 }}></i>
              <h2>Please log in to see your saved jobs</h2>
              <button className="btn-primary" onClick={() => setPage('login')}>
                <i className="fas fa-sign-in-alt"></i> Log In
              </button>
            </div>
          </div>
        );
      }

      const toggleSave = (e, jobId) => {
        e.stopPropagation();
        if (saving === jobId) return;
        setSaving(jobId);
        const isSaved = saved.includes(jobId);
        (isSaved ? window.UserDB.unsaveJob(jobId, user.id) : window.UserDB.saveJob(jobId, user.id))
          .then(res => {
            setSaving(null);
            if (res.ok) {
              setSaved(prev => isSaved ? prev.filter(id => id !== jobId) : [...prev, jobId]);
              if (isSaved) setJobs(prev => prev.filter(j => j.id !== jobId));
            }
          });
      };

      const toggleApply = (jobId) => {
        if (applying === jobId) return;
        setApplying(jobId);
        const isApplied = applied.includes(jobId);
        (isApplied ? window.UserDB.withdrawApplication(jobId, user.id) : window.UserDB.applyToJob(jobId, user.id))
          .then(res => {
            setApplying(null);
            if (res.ok) setApplied(prev => isApplied ? prev.filter(id => id !== jobId) : [...prev, jobId]);
          });
      };

      const filtered = jobs.filter(j =>
        !query || j.title.toLowerCase().includes(query.toLowerCase()) ||
        j.category.toLowerCase().includes(query.toLowerCase())
      );

      return (
        <div className="saved-jobs-page" dir={dir}>
          {/* Hero */}
          <div className="saved-jobs-hero">
            <div className="hero-bg-grid"></div>
            <div className="container">
              <span className="tag"><i className="fas fa-bookmark"></i>{lang === 'en' ? 'Saved Jobs' : 'الوظائف المحفوظة'}</span>
              <h1 className="saved-jobs-title">
                {lang === 'en' ? 'Your Saved Jobs' : 'وظائفك المحفوظة'}
              </h1>
              <p className="saved-jobs-sub">
                {lang === 'en'
                  ? "Jobs you bookmarked — apply whenever you're ready."
                  : 'الوظائف التي حفظتها — قدم عليها متى كنت مستعداً.'}
              </p>
            </div>
          </div>

          <div className="container saved-jobs-body">
            {/* Toolbar */}
            <div className="saved-jobs-toolbar">
              <div className="admin-search-wrap" style={{ maxWidth: '380px' }}>
                <i className="fas fa-search"></i>
                <input
                  className="admin-search"
                  placeholder={lang === 'en' ? 'Search saved jobs…' : 'ابحث…'}
                  value={query}
                  onChange={e => setQuery(e.target.value)}
                />
              </div>
              <span className="saved-jobs-count">
                {loading ? '…' : `${filtered.length} ${lang === 'en' ? 'saved' : 'محفوظ'}`}
              </span>
              <button className="btn-secondary" onClick={() => setPage('jobs')} style={{ padding: '9px 20px', fontSize: '13px' }}>
                <i className="fas fa-search"></i> {lang === 'en' ? 'Browse More Jobs' : 'تصفح المزيد'}
              </button>
            </div>

            {loading ? (
              <div style={{ textAlign: 'center', padding: '80px 0' }}>
                <span className="spinner" style={{ width: '40px', height: '40px', borderWidth: '4px', display: 'inline-block', marginBottom: '16px' }}></span>
                <p style={{ color: 'var(--text-muted)' }}>{lang === 'en' ? 'Loading saved jobs…' : 'جاري التحميل…'}</p>
              </div>
            ) : filtered.length === 0 ? (
              <div className="saved-jobs-empty">
                <i className="far fa-bookmark"></i>
                <h2>{lang === 'en' ? (jobs.length === 0 ? 'No saved jobs yet' : 'No results') : (jobs.length === 0 ? 'لا توجد وظائف محفوظة' : 'لا توجد نتائج')}</h2>
                <p>{lang === 'en' ? 'Browse jobs and click the bookmark icon to save them here.' : 'تصفح الوظائف واضغط أيقونة الحفظ لإضافتها هنا.'}</p>
                <button className="btn-primary" onClick={() => setPage('jobs')}>
                  <i className="fas fa-search"></i> {lang === 'en' ? 'Find Jobs' : 'ابحث عن وظائف'}
                </button>
              </div>
            ) : (
              <div className="jobs-grid-full">
                {filtered.map(job => {
                  const isApplied = applied.includes(job.id);
                  const isBusy    = applying === job.id;
                  const isSaved   = saved.includes(job.id);
                  return (
                    <div key={job.id} className="job-card saved-job-card">
                      <div className="job-card-header">
                        <div className="job-card-icon" style={{ background: `${job.color}18`, color: job.color }}>
                          <i className={`fas ${job.icon}`}></i>
                        </div>
                        <div style={{ flex: 1 }}>
                          <div className="job-card-title">{job.title}</div>
                          <div className="job-card-category">{job.category}</div>
                        </div>
                        <span className={`job-type-badge job-type-${job.type}`}>
                          {job.type === 'local' ? (lang === 'en' ? 'LOCAL' : 'محلي') : (lang === 'en' ? 'INTL' : 'دولي')}
                        </span>
                      </div>
                      <p style={{ fontSize: '13px', color: 'var(--text-secondary)', lineHeight: '1.6', marginBottom: '12px' }}>{job.description}</p>
                      <div className="job-skills">
                        {job.skills.map(s => <span key={s} className="job-skill">{s}</span>)}
                      </div>
                      <div className="job-card-footer">
                        <div>
                          <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginBottom: '2px', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                            {lang === 'en' ? 'Budget' : 'الميزانية'}
                          </div>
                          <span className="job-budget">{job.budget.toLocaleString()} {lang === 'en' ? 'EGP' : 'جنيه'}</span>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                          <button
                            className={`job-save-btn${isSaved ? ' saved' : ''}`}
                            onClick={e => toggleSave(e, job.id)}
                            disabled={saving === job.id}
                            title={isSaved ? 'Remove from saved' : 'Save job'}
                          >
                            <i className={`fa${isSaved ? 's' : 'r'} fa-bookmark`}></i>
                          </button>
                          <button onClick={() => toggleApply(job.id)} disabled={isBusy} style={{
                            padding: '8px 18px', borderRadius: '50px', fontWeight: 700, fontSize: '12px',
                            border: 'none', cursor: isBusy ? 'wait' : 'pointer', letterSpacing: '0.5px',
                            background: isApplied ? 'rgba(46,204,113,0.12)' : 'linear-gradient(135deg,var(--gold),var(--gold-light))',
                            color: isApplied ? '#2ecc71' : '#0a0a0f', transition: 'all 0.2s', opacity: isBusy ? 0.6 : 1,
                          }}>
                            {isBusy
                              ? <span className="spinner" style={{ borderTopColor: isApplied ? '#2ecc71' : '#0a0a0f' }}></span>
                              : (isApplied ? (lang === 'en' ? '✓ Applied' : '✓ تم التقديم') : (lang === 'en' ? 'Apply Now' : 'قدم الآن'))}
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ============================================================
       MESSAGES PAGE
       ============================================================ */
    function MessagesPage({ lang, user, setPage, targetId }) {
      const [messages, setMessages] = useState([]);
      const [conversations, setConversations] = useState([]);
      const [activeConvo, setActiveConvo] = useState(null);
      const [input, setInput] = useState('');
      const [isOtherTyping, setIsOtherTyping] = useState(false);
      const typingTimeoutRef = useRef(null);
      const dir = lang === 'ar' ? 'rtl' : 'ltr';
      const t = window.TRANSLATIONS[lang].messages_page;

      useEffect(() => {
        if (!user || !activeConvo) return;
        return window.UserDB.subscribeToTypingStatus(activeConvo.otherId, user.id, setIsOtherTyping);
      }, [user, activeConvo]);

      const handleInputChange = (e) => {
        setInput(e.target.value);
        if (!user || !activeConvo) return;

        window.UserDB.setTypingStatus(user.id, activeConvo.otherId, true);
        
        if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
        typingTimeoutRef.current = setTimeout(() => {
          window.UserDB.setTypingStatus(user.id, activeConvo.otherId, false);
        }, 3000);
      };

      useEffect(() => {
        if (!user) return;
        return window.UserDB.subscribeToMessages(user.id, (all) => {
          setMessages(all);
          const convos = {};
          all.forEach(m => {
            const otherId = m.senderId === user.id ? m.receiverId : m.senderId;
            if (!convos[otherId]) convos[otherId] = { otherId, lastMsg: m, unread: 0 };
            if (m.timestamp > convos[otherId].lastMsg.timestamp) convos[otherId].lastMsg = m;
            if (m.receiverId === user.id && !m.isRead) convos[otherId].unread++;
          });
          const sorted = Object.values(convos).sort((a,b) => b.lastMsg.timestamp > a.lastMsg.timestamp ? 1 : -1);
          setConversations(sorted);

          // If we have a targetId, make sure it's in the list or create a "ghost" convo
          if (targetId && !convos[targetId]) {
            // Check if user exists (mocked or real)
            const ghost = { otherId: targetId, lastMsg: { content: '...', timestamp: '' }, unread: 0 };
            setConversations([ghost, ...sorted]);
            if (!activeConvo) setActiveConvo(ghost);
          } else if (targetId && convos[targetId] && !activeConvo) {
             setActiveConvo(convos[targetId]);
          }
        });
      }, [user, targetId]);

      const sendMessage = () => {
        if (!input.trim() || !activeConvo) return;
        window.UserDB.sendMessage(user.id, activeConvo.otherId, input).then(() => {
           // If it was a ghost convo, it will now become real via the subscription
        });
        setInput('');
      };

      const selectConvo = (c) => {
        setActiveConvo(c);
        messages.filter(m => m.senderId === c.otherId && !m.isRead).forEach(m => {
          window.UserDB.markMessageRead(m.id);
        });
      };

      if (!user) return <div className="messages-page"><div className="container" style={{textAlign:'center', padding:'100px'}}>Login required</div></div>;

      const activeMsgs = messages.filter(m =>
        (m.senderId === user.id && m.receiverId === activeConvo?.otherId) ||
        (m.receiverId === user.id && m.senderId === activeConvo?.otherId)
      );

      return (
        <div className="messages-page" dir={dir}>
          <div className="container">
            <div className="messages-container">
              <div className="convos-sidebar">
                <div className="convos-header">{t.conversations}</div>
                <div className="convos-list">
                  {conversations.length === 0 ? <div style={{padding:'20px', fontSize:'12px', color:'var(--text-muted)'}}>{t.no_convos}</div> :
                   conversations.map(c => (
                    <div key={c.otherId} className={`convo-item ${activeConvo?.otherId === c.otherId ? 'active' : ''}`} onClick={() => selectConvo(c)}>
                      <div className="convo-avatar">{c.otherId[0].toUpperCase()}</div>
                      <div className="convo-info">
                        <div className="convo-name">User {c.otherId.substring(0, 5)}</div>
                        <div className="convo-last">{c.lastMsg.content}</div>
                      </div>
                      {c.unread > 0 && <span className="nav-badge" style={{position:'static', marginLeft:'8px'}}>{c.unread}</span>}
                    </div>
                  ))}
                </div>
              </div>
              <div className="chat-area">
                {activeConvo ? (
                  <>
                    <div className="chat-header">
                      <div className="convo-avatar">{activeConvo.otherId[0].toUpperCase()}</div>
                      <div>
                        <div className="convo-name">User {activeConvo.otherId.substring(0, 5)}</div>

    /* ============================================================
       DASHBOARD PAGE
       ============================================================ */
    function DashboardPage({ lang, user, setPage }) {
      const dir = lang === 'ar' ? 'rtl' : 'ltr';
      const [stats, setStats] = React.useState({ total: 0, active: 0, pending: 0 });
      const [activeProjects, setActiveProjects] = React.useState([]);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        if (!user) return;
        setLoading(true);
        
        // Fetch stats based on role
        if (user.role === 'freelancer') {
          // Freelancer stats
          firebase.firestore().collection('applications').where('userId', '==', user.id).get().then(snap => {
            const apps = snap.docs.map(d => d.data());
            const active = apps.filter(a => a.status === 'accepted' || a.status === 'disputed').length;
            const pending = apps.filter(a => a.status === 'pending').length;
            setStats({ total: user.totalEarnings || 0, active, pending });
            
            // Get active project details
            const activeApps = snap.docs.filter(d => d.data().status === 'accepted' || d.data().status === 'disputed')
              .map(d => Object.assign({ id: d.id }, d.data()));
            setActiveProjects(activeApps);
            setLoading(false);
          });
        } else {
          // Client stats
          window.UserDB.listMyPostedJobs(user.id).then(jobs => {
            const activeJobs = jobs.length;
            firebase.firestore().collection('applications').where('clientId', '==', user.id).get().then(snap => {
              const apps = snap.docs.map(d => d.data());
              const activeHires = apps.filter(a => a.status === 'accepted' || a.status === 'disputed').length;
              setStats({ total: user.totalSpent || 0, active: activeHires, pending: activeJobs });
              
              const activeApps = snap.docs.filter(d => d.data().status === 'accepted' || d.data().status === 'disputed')
                .map(d => Object.assign({ id: d.id }, d.data()));
              setActiveProjects(activeApps);
              setLoading(false);
            });
          });
        }
      }, [user]);

      if (loading) return <div className="loading-screen"><span className="spinner"></span></div>;

      const t = {
        en: { 
          title: 'Your Dashboard', 
          earning: 'Total Earnings', 
          spending: 'Total Spent', 
          active: 'Active Projects', 
          pending_freelancer: 'Pending Bids',
          pending_client: 'Jobs Posted',
          projects_title: 'Recent Active Projects',
          no_projects: 'No active projects at the moment.'
        },
        ar: { 
          title: 'لوحة التحكم', 
          earning: 'إجمالي الأرباح', 
          spending: 'إجمالي المصاريف', 
          active: 'المشاريع النشطة', 
          pending_freelancer: 'عروض قيد الانتظار',
          pending_client: 'وظائف منشورة',
          projects_title: 'المشاريع النشطة الأخيرة',
          no_projects: 'لا توجد مشاريع نشطة حالياً.'
        }
      }[lang];

      return (
        <div className="dashboard-page" dir={dir}>
          <div className="container">
            <div className="section-header">
              <h1>{t.title}</h1>
            </div>

            <div className="stats-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: '20px', marginBottom: '40px' }}>
              <div className="job-card" style={{ textAlign: 'center', padding: '30px', borderBottom: '4px solid var(--gold)' }}>
                <div style={{ fontSize: '14px', color: 'var(--text-secondary)', marginBottom: '10px' }}>{user.role === 'freelancer' ? t.earning : t.spending}</div>
                <div style={{ fontSize: '32px', fontWeight: 900, color: 'var(--gold)' }}>{stats.total.toLocaleString()} EGP</div>
              </div>
              <div className="job-card" style={{ textAlign: 'center', padding: '30px', borderBottom: '4px solid #3498db' }}>
                <div style={{ fontSize: '14px', color: 'var(--text-secondary)', marginBottom: '10px' }}>{t.active}</div>
                <div style={{ fontSize: '32px', fontWeight: 900 }}>{stats.active}</div>
              </div>

    /* ============================================================

       ============================================================ */
    function WorkroomPage({ lang, user, setPage, appId }) {
      const dir = lang === 'ar' ? 'rtl' : 'ltr';
      const [app, setApp] = React.useState(null);
      const [job, setJob] = React.useState(null);
      const [files, setFiles] = React.useState([]);
      const [milestones, setMilestones] = React.useState([]);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        if (!appId) return;
        firebase.firestore().collection('applications').doc(appId).get().then(doc => {
          if (doc.exists) {
            const data = doc.data();
            setApp(Object.assign({ id: doc.id }, data));
            firebase.firestore().collection('jobs').doc(data.jobId).get().then(jdoc => {
              if (jdoc.exists) setJob(Object.assign({ id: jdoc.id }, jdoc.data()));
              setLoading(false);
            });
            
            // Listen for files
            const unsubFiles = firebase.firestore().collection('workrooms').doc(appId).collection('files')
              .orderBy('timestamp', 'desc').onSnapshot(snap => {
                setFiles(snap.docs.map(d => Object.assign({ id: d.id }, d.data())));
              });
              
            // Listen for milestones
            const unsubMiles = firebase.firestore().collection('workrooms').doc(appId).collection('milestones')
              .orderBy('timestamp', 'asc').onSnapshot(snap => {
                setMilestones(snap.docs.map(d => Object.assign({ id: d.id }, d.data())));
              });
              
            return () => { unsubFiles(); unsubMiles(); };
          }
        });
      }, [appId]);

      const fileInputRef = React.useRef(null);
      const [uploading, setUploading] = React.useState(false);
      
      const handleAddMilestone = () => {
        if (user.id !== app.clientId) return alert('Only clients can add milestones.');
        const title = prompt(lang === 'en' ? 'Milestone Title:' : 'عنوان المرحلة:');
        if (title) {
          firebase.firestore().collection('workrooms').doc(appId).collection('milestones').add({
            title, status: 'pending', timestamp: new Date().toISOString()
          });
        }
      };

      const handleToggleMilestone = (mid, currentStatus) => {
        if (user.id !== app.clientId) return alert('Only clients can approve milestones.');
        const newStatus = currentStatus === 'pending' ? 'completed' : 'pending';
        firebase.firestore().collection('workrooms').doc(appId).collection('milestones').doc(mid).update({
          status: newStatus
        });
        if (newStatus === 'completed') {
          window.UserDB.addNotification(app.userId, 'success', `Milestone completed: ${milestones.find(m => m.id === mid).title}`, 'workroom', appId);
        }
      };

      const handleOpenDispute = () => {
        const reason = prompt(lang === 'en' ? 'Reason for dispute:' : 'سبب النزاع:');
        if (reason) {
          firebase.firestore().collection('applications').doc(appId).update({
            status: 'disputed',
            disputeReason: reason,
            disputeOpenedBy: user.id,
            disputeAt: new Date().toISOString()
          }).then(() => {
            alert(lang === 'en' ? 'Dispute opened. An admin will review this project.' : 'تم فتح نزاع. سيقوم المسؤول بمراجعة المشروع.');
            window.UserDB.addNotification(user.id === app.userId ? app.clientId : app.userId, 'warning', `A dispute has been opened for project: ${job.title}`, 'workroom', appId);
          });
        }
      };

      const handleUploadFile = () => {
        fileInputRef.current?.click();
      };

      const handleFileChange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true);
        try {
          const url = await window.UserDB.uploadFile(file, `workrooms/${appId}`);
          await firebase.firestore().collection('workrooms').doc(appId).collection('files').add({
            name: file.name, url, senderId: user.id, senderName: user.name, timestamp: new Date().toISOString()
          });
          window.UserDB.addNotification(user.id === app.userId ? app.clientId : app.userId, 'info', `${user.name} uploaded a file: ${file.name}`, 'workroom', appId);
        } catch (err) {
          alert('Upload error: ' + err.message);
        } finally {
          setUploading(false);
        }
      };

      if (loading) return <div className="loading-screen"><div className="spinner"></div></div>;

      return (
        <div className="workroom-page fade-in" dir={dir}>
          <div className="container" style={{ maxWidth: '1000px', padding: '40px 20px' }}>
            <div className="section-header" style={{ marginBottom: '30px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <span className="tag" style={{ background: 'var(--gold)', color: '#000' }}>
                    <i className="fas fa-rocket"></i> {lang === 'en' ? 'Active Project' : 'مشروع نشط'}
                  </span>
                  <h1 style={{ marginTop: '10px' }}>{job?.title}</h1>
                  <p style={{ color: 'var(--text-secondary)' }}>
                    {lang === 'en' ? 'Collaboration with ' : 'بالتعاون مع '}
                    <strong style={{ color: 'var(--gold)' }}>{user.id === app.userId ? app.clientName : app.applicantName}</strong>
                  </p>
                </div>
                <div style={{ display: 'flex', gap: '10px' }}>
                  {app?.status !== 'disputed' && (
                    <button className="btn-secondary" style={{ borderColor: '#e74c3c', color: '#e74c3c' }} onClick={handleOpenDispute}>
                      <i className="fas fa-exclamation-triangle"></i> {lang === 'en' ? 'Dispute' : 'فتح نزاع'}
                    </button>
                  )}
                  <button className="btn-secondary" onClick={() => setPage('applications')}>
                    <i className="fas fa-arrow-left"></i> {lang === 'en' ? 'Back' : 'رجوع'}
                  </button>
                </div>
              </div>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: '24px' }}>
              <div>
                {/* File Sharing Card */}
                <div className="job-card" style={{ marginBottom: '24px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                    <h3 style={{ fontSize: '18px', fontWeight: 800 }}>
                      <i className="fas fa-folder-open" style={{ color: 'var(--gold)', marginRight: '10px' }}></i>
                      {lang === 'en' ? 'Shared Files' : 'الملفات المشتركة'}
                    </h3>
                    <input type="file" ref={fileInputRef} style={{ display: 'none' }} onChange={handleFileChange} />
                    <button className="btn-primary" style={{ fontSize: '12px', padding: '6px 12px' }} onClick={handleUploadFile} disabled={uploading}>
                      {uploading ? <span className="spinner" style={{ width: '12px', height: '12px' }}></span> : <><i className="fas fa-plus"></i> {lang === 'en' ? 'Upload' : 'رفع ملف'}</>}
                    </button>
                  </div>
                  
                  <div className="file-list">
                    {files.length === 0 ? (
                      <div style={{ textAlign: 'center', padding: '40px', color: 'var(--text-muted)', fontSize: '14px' }}>
                        <i className="fas fa-cloud-upload-alt" style={{ fontSize: '32px', marginBottom: '10px', display: 'block' }}></i>
                        {lang === 'en' ? 'No files shared yet' : 'لا توجد ملفات مشتركة بعد'}
                      </div>
                    ) : (
                      <div style={{ display: 'grid', gap: '10px' }}>
                        {files.map(f => (
                          <div key={f.id} className="file-item" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px', background: 'rgba(255,255,255,0.03)', borderRadius: '8px', border: '1px solid var(--border)' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                              <i className="fas fa-file-pdf" style={{ fontSize: '20px', color: '#e74c3c' }}></i>
                              <div>
                                <div style={{ fontWeight: 700, fontSize: '14px' }}>{f.name}</div>
                                <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{f.senderName} • {new Date(f.timestamp).toLocaleString()}</div>
                              </div>
                            </div>
                            <a href={f.url} target="_blank" className="nav-icon-btn"><i className="fas fa-download"></i></a>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>

                {/* Milestones Card */}
                <div className="job-card">
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                    <h3 style={{ fontSize: '18px', fontWeight: 800 }}>
                      <i className="fas fa-tasks" style={{ color: 'var(--gold)', marginRight: '10px' }}></i>
                      {lang === 'en' ? 'Milestones & Delivery' : 'المراحل والتسليم'}
                    </h3>
                    {user.id === app.clientId && (
                      <button className="btn-secondary" style={{ fontSize: '11px', padding: '6px 12px' }} onClick={handleAddMilestone}>
                        <i className="fas fa-plus"></i> {lang === 'en' ? 'Add Milestone' : 'إضافة مرحلة'}
                      </button>
                    )}
                  </div>
                  
                  <div className="milestones-list">
                    {milestones.length === 0 ? (
                      <div style={{ textAlign: 'center', padding: '30px', color: 'var(--text-muted)', fontSize: '14px' }}>
                        {lang === 'en' ? 'No milestones defined yet' : 'لا توجد مراحل محددة بعد'}
                      </div>
                    ) : (
                      <div style={{ display: 'grid', gap: '12px' }}>
                        {milestones.map(m => {
                          const isDone = m.status === 'completed';
                          return (
                            <div key={m.id} className="milestone-item" style={{ 
                              padding: '16px', 
                              background: isDone ? 'rgba(16,185,129,0.05)' : 'rgba(255,255,255,0.02)', 
                              borderRadius: '12px', 
                              border: isDone ? '1px solid rgba(16,185,129,0.2)' : '1px solid var(--border)',
                              display: 'flex',
                              justifyContent: 'space-between',
                              alignItems: 'center'
                            }}>
                              <div>
                                <div style={{ fontWeight: 800, fontSize: '15px', color: isDone ? '#10b981' : 'var(--text-main)' }}>{m.title}</div>
                                <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '4px' }}>{new Date(m.timestamp).toLocaleDateString()}</div>
                              </div>
                              <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                <span style={{ color: isDone ? '#10b981' : 'var(--gold)', fontSize: '11px', fontWeight: 700, textTransform: 'uppercase' }}>
                                  {isDone ? (lang === 'en' ? 'COMPLETED' : 'مكتمل') : (lang === 'en' ? 'PENDING' : 'قيد الانتظار')}
                                </span>
                                {user.id === app.clientId && (
                                  <button 
                                    className={`nav-icon-btn ${isDone ? 'active' : ''}`} 
                                    onClick={() => handleToggleMilestone(m.id, m.status)}
                                    style={{ color: isDone ? '#10b981' : 'var(--text-muted)' }}
                                  >
                                    <i className={`fas fa-${isDone ? 'check-circle' : 'circle'}`}></i>
                                  </button>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </div>
              </div>

              <div>
                {/* Quick Info Sidebar */}
                <div className="job-card" style={{ position: 'sticky', top: '100px' }}>
                  <h4 style={{ marginBottom: '16px' }}>{lang === 'en' ? 'Project Summary' : 'ملخص المشروع'}</h4>
                  <div style={{ display: 'grid', gap: '16px' }}>
                    <div style={{ fontSize: '13px' }}>
                      <div style={{ color: 'var(--text-muted)', marginBottom: '4px' }}>{lang === 'en' ? 'Budget' : 'الميزانية'}</div>
                      <div style={{ fontWeight: 800, fontSize: '16px', color: 'var(--gold)' }}>{app?.bidAmount || job?.budget} EGP</div>
                    </div>
                    <div style={{ fontSize: '13px' }}>
                      <div style={{ color: 'var(--text-muted)', marginBottom: '4px' }}>{lang === 'en' ? 'Deadline' : 'الموعد النهائي'}</div>
                      <div style={{ fontWeight: 800 }}>{app?.deliveryTime || '14 Days'}</div>
                    </div>
                    <div className="divider"></div>
                    <button className="btn-primary" style={{ width: '100%' }} onClick={() => setPage('messages', { targetId: user.id === app.userId ? app.clientId : app.userId })}>
                      <i className="fas fa-comment-dots"></i> {lang === 'en' ? 'Message Support' : 'تواصل مع الدعم'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function HomePage({ lang, setPage, user, formatPrice }) {

      return (
        <>
          <HeroSection lang={lang} setPage={setPage} />
          <TrustBar lang={lang} />
          <ServicesGrid lang={lang} setPage={setPage} />
          <FeaturedJobs lang={lang} setPage={setPage} user={user} formatPrice={formatPrice} />
          <HowItWorks lang={lang} />
          <TestimonialsSection lang={lang} />
          <CTASection lang={lang} setPage={setPage} />
        </>
      );
    }

    /* ============================================================
       APP ROOT
       ============================================================ */
    function App() {
      const [page, setPage] = useState('home');
      const [pageParams, setPageParams] = useState(null);
      const [lang, setLang] = useState(() => localStorage.getItem('nl_lang') || 'en');
      const [theme, setTheme] = useState(() => localStorage.getItem('nl_theme') || 'dark');
      const [currency, setCurrency] = useState(() => localStorage.getItem('nl_currency') || 'EGP');
      const [user, setUser] = useState(() => window.UserDB ? window.UserDB.getSession() : null);

      const formatPrice = (amountEGP) => {
        if (!amountEGP) return '0';
        if (currency === 'USD') {
          return '$' + (amountEGP / 50).toFixed(2);
        }
        return amountEGP.toLocaleString() + ' EGP';
      };

      useEffect(() => { localStorage.setItem('nl_currency', currency); }, [currency]);

      const [unreadMsgCount, setUnreadMsgCount] = useState(0);
      const [unreadNoteCount, setUnreadNoteCount] = useState(0);

      const navigate = (p, params = null) => {
        setPage(p);
        setPageParams(params);
        window.scrollTo(0, 0);
      };

      /* Keep user state in sync with Firebase Auth */
      useEffect(() => {
        if (!window.UserDB || !window.UserDB.onAuthStateChanged) return;
        const unsubscribe = window.UserDB.onAuthStateChanged((fbUser) => {
          setUser(fbUser);
        });
        return () => { if (typeof unsubscribe === 'function') unsubscribe(); };
      }, []);

      /* Listen for unread messages and notifications */
      useEffect(() => {
        if (!user) {
          setUnreadMsgCount(0);
          setUnreadNoteCount(0);
          return;
        }
        const unsub1 = window.UserDB.subscribeToMessages(user.id, (msgs) => {
          setUnreadMsgCount(msgs.filter(m => m.receiverId === user.id && !m.isRead).length);
        });
        const unsub2 = window.UserDB.subscribeToNotifications(user.id, (notes) => {
          setUnreadNoteCount(notes.filter(n => !n.isRead).length);
        });
        return () => { unsub1(); unsub2(); };
      }, [user]);

      useEffect(() => { localStorage.setItem('nl_lang', lang); }, [lang]);
      useEffect(() => {
        localStorage.setItem('nl_theme', theme);
        document.documentElement.setAttribute('data-theme', theme);
      }, [theme]);

      const shared = { lang, setPage: navigate, theme, setTheme, user, setUser, currency, setCurrency, formatPrice };

      const renderPage = () => {
        switch (page) {
          case 'home': return <HomePage {...shared} />;
          case 'jobs': return <JobsPage {...shared} params={pageParams} />;
          case 'login': return <LoginPage {...shared} />;
          case 'signup': return <SignupPage {...shared} />;
          case 'forgot-password': return <ForgotPasswordPage {...shared} />;
          case 'profile': return <ProfilePage {...shared} viewUserId={pageParams?.viewUserId} />;
          case 'contact': return <ContactPage {...shared} />;
          case 'about': return <AboutPage {...shared} />;
          case 'post-job': return <PostJobPage {...shared} />;
          case 'wallet': return <WalletPage {...shared} />;
          case 'settings': return <SettingsPage {...shared} setLang={setLang} />;
          case 'saved-jobs': return <SavedJobsPage {...shared} />;
          case 'applications': return <ApplicationsPage {...shared} />;
          case 'dashboard': return <DashboardPage {...shared} />;
          case 'membership': return <MembershipPage {...shared} />;
          case 'legal': return <LegalPage {...shared} type={pageParams?.type} />;
          case 'blog': return <BlogPage {...shared} postId={pageParams?.id} />;
          case 'admin': return <AdminPage {...shared} />;
          case 'messages': return <MessagesPage {...shared} targetId={pageParams?.targetId} />;
          case 'notifications': return <NotificationsPage {...shared} />;
          case 'workroom': return <WorkroomPage {...shared} appId={pageParams?.appId} />;
          default: return <HomePage {...shared} />;
        }
      };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
          <Header page={page} setPage={navigate} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} user={user} setUser={setUser} currency={currency} setCurrency={setCurrency} unreadMessages={unreadMsgCount} unreadNotifications={unreadNoteCount} />
          <main style={{ flex: 1 }}>{renderPage()}</main>
          <Footer lang={lang} setPage={navigate} />
          <Chatbot lang={lang} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
