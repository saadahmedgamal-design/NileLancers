                  <h3 className="settings-sub-title">Email Notifications</h3>
                  {[
                    { key: 'emailApplications', label: 'Application Updates',  desc: 'When your application status changes (accepted / rejected).' },
                    { key: 'emailMessages',      label: 'New Messages',          desc: 'When a client or freelancer sends you a message.' },
                    { key: 'emailJobs',          label: 'New Job Alerts',        desc: 'Weekly digest of new jobs matching your skills.' },
                    { key: 'emailMarketing',     label: 'Marketing & Tips',      desc: 'Platform tips, offers, and news from NileLancers.' },
                  ].map(n => (
                    <div key={n.key} className="settings-toggle-row">
                      <div>
                        <div className="settings-toggle-label">{n.label}</div>
                        <div className="settings-toggle-desc">{n.desc}</div>
                      </div>
                      <Toggle value={notifs[n.key]} onChange={v => setNotifs(s => ({ ...s, [n.key]: v }))} />
                    </div>
                  ))}

                  <h3 className="settings-sub-title" style={{ marginTop: '28px' }}>Push Notifications</h3>
                  {[
                    { key: 'pushApplications', label: 'Application Updates', desc: 'Real-time alerts when your application status changes.' },
                    { key: 'pushMessages',      label: 'New Messages',        desc: 'Instant notification when you receive a message.' },
                  ].map(n => (
                    <div key={n.key} className="settings-toggle-row">
                      <div>
                        <div className="settings-toggle-label">{n.label}</div>
                        <div className="settings-toggle-desc">{n.desc}</div>
                      </div>
                      <Toggle value={notifs[n.key]} onChange={v => setNotifs(s => ({ ...s, [n.key]: v }))} />
                    </div>
                  ))}

                  <div className="settings-actions">
                    <button className="btn-primary" onClick={() => showToast('Notification preferences saved.')}>
                      <i className="fas fa-save"></i> Save Preferences
                    </button>
                  </div>
                </div>
              )}

              {/* ─── PRIVACY ─── */}
              {activeTab === 'privacy' && (
                <div className="settings-section">
                  <div className="settings-section-header">
                    <i className="fas fa-user-lock"></i>
                    <div><h2>Privacy</h2><p>Control who can see your information.</p></div>
                  </div>

                  {[
                    { key: 'profileVisible',   label: 'Public Profile',          desc: 'Allow others to view your profile page.' },
                    { key: 'showEmail',        label: 'Show Email Address',       desc: 'Display your email on your public profile.' },
                    { key: 'showPhone',        label: 'Show Phone Number',        desc: 'Display your phone number on your public profile.' },
                    { key: 'showOnlineStatus', label: 'Show Online Status',       desc: 'Let others see when you were last active.' },
                    { key: 'allowMessages',    label: 'Allow Direct Messages',    desc: 'Allow any user to send you a message.' },
                  ].map(p => (
                    <div key={p.key} className="settings-toggle-row">
                      <div>
                        <div className="settings-toggle-label">{p.label}</div>
                        <div className="settings-toggle-desc">{p.desc}</div>
                      </div>
                      <Toggle value={privacy[p.key]} onChange={v => setPrivacy(s => ({ ...s, [p.key]: v }))} />
                    </div>
                  ))}

                  <div className="settings-actions">
                    <button className="btn-primary" onClick={() => showToast('Privacy settings saved.')}>
                      <i className="fas fa-save"></i> Save Privacy Settings
                    </button>
                  </div>
                </div>
              )}

              {/* ─── PREFERENCES ─── */}
              {activeTab === 'preferences' && (
                <div className="settings-section">
                  <div className="settings-section-header">
                    <i className="fas fa-sliders-h"></i>
                    <div><h2>Preferences</h2><p>Personalise your NileLancers experience.</p></div>
                  </div>

                  <div className="settings-pref-group">
                    <div className="settings-pref-label">Interface Theme</div>
                    <div className="settings-theme-options">
                      {[
                        { val: 'dark',  icon: 'fa-moon',      label: 'Dark' },
                        { val: 'light', icon: 'fa-sun',       label: 'Light' },
                      ].map(opt => (
                        <div
                          key={opt.val}
                          className={`settings-theme-card${theme === opt.val ? ' selected' : ''}`}
                          onClick={() => { setTheme(opt.val); showToast(`Switched to ${opt.label} mode.`); }}
                        >
                          <i className={`fas ${opt.icon}`}></i>
                          <span>{opt.label}</span>
                          {theme === opt.val && <i className="fas fa-check settings-theme-check"></i>}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="settings-pref-group">
                    <div className="settings-pref-label">Language</div>
                    <div className="settings-theme-options">
                      {[
                        { val: 'en', label: 'English', flag: '🇬🇧' },
                        { val: 'ar', label: 'العربية', flag: '🇪🇬' },
                      ].map(opt => (
                        <div
                          key={opt.val}
                          className={`settings-theme-card${lang === opt.val ? ' selected' : ''}`}
                          onClick={() => { setLang(opt.val); showToast('Language updated.'); }}
                        >
                          <span style={{ fontSize: '22px' }}>{opt.flag}</span>
                          <span>{opt.label}</span>
                          {lang === opt.val && <i className="fas fa-check settings-theme-check"></i>}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="settings-pref-group">
                    <div className="settings-pref-label">Currency Display</div>
                    <div className="settings-theme-options">
                      {['EGP', 'USD', 'EUR'].map(c => (
                        <div key={c} className={`settings-theme-card${c === 'EGP' ? ' selected' : ''}`}>
                          <span style={{ fontWeight: 800, fontSize: '16px' }}>{c}</span>
                          {c === 'EGP' && <i className="fas fa-check settings-theme-check"></i>}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* ─── DANGER ZONE ─── */}
              {activeTab === 'danger' && (
                <div className="settings-section">
                  <div className="settings-section-header">
                    <i className="fas fa-exclamation-triangle" style={{ color: '#ef4444' }}></i>
                    <div>
                      <h2 style={{ color: '#ef4444' }}>Danger Zone</h2>
                      <p>These actions are irreversible. Proceed with caution.</p>
                    </div>
                  </div>

                  <div className="settings-danger-card">
                    <div className="settings-danger-info">
                      <div className="settings-danger-title">
                        <i className="fas fa-sign-out-alt"></i> Log Out
                      </div>
                      <div className="settings-danger-desc">Sign out of your account on this device.</div>
                    </div>
                    <button className="settings-danger-btn settings-danger-btn-outline" onClick={() => {
                      window.UserDB.logout(); setUser(null); setPage('home');
                    }}>
                      Log Out
                    </button>
                  </div>

                  <div className="settings-danger-card">
                    <div className="settings-danger-info">
                      <div className="settings-danger-title">
                        <i className="fas fa-user-slash"></i> Delete Account
                      </div>
                      <div className="settings-danger-desc">
                        Permanently delete your account and all associated data. This <strong>cannot</strong> be undone.
                      </div>
                    </div>
                    <button className="settings-danger-btn settings-danger-btn-red" onClick={handleDeleteAccount}>
                      Delete Account
                    </button>
                  </div>
                </div>
              )}

            </main>
          </div>
        </div>
      );
    }

    /* ============================================================
       CONTACT PAGE
       ============================================================ */
    function ContactPage({ lang }) {
      const t = window.TRANSLATIONS[lang].contact;
      const dir = lang === 'ar' ? 'rtl' : 'ltr';
      const [form, setForm] = useState({ name: '', email: '', subject: '', message: '' });
      const [loading, setLoading] = useState(false);
      const [sent, setSent] = useState(false);
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!form.name || !form.email || !form.subject || !form.message) return;
        setLoading(true);
        setTimeout(() => { setLoading(false); setSent(true); }, 1200);
      };

      const infoItems = [
        { icon: 'fa-phone-alt', label: t.phone_label, value: '+20 123 456 7890', color: '#0074D9' },
        { icon: 'fa-envelope', label: t.email_label, value: 'info@nilelancers.com', color: '#FFD700' },
        { icon: 'fa-map-marker-alt', label: t.address_label, value: lang === 'en' ? 'Alexandria, Egypt' : 'الإسكندرية، مصر', color: '#2ecc71' },
        { icon: 'fa-clock', label: t.hours_label, value: t.hours_val, color: '#9b59b6' },
      ];

      return (
        <div className="contact-page" dir={dir}>
          {/* Hero */}
          <div className="contact-hero">
            <div className="hero-bg-grid"></div>
            <div className="container">
              <span className="tag"><i className="fas fa-paper-plane"></i>{t.tag}</span>
              <h1 className="contact-hero-title">
                {t.title} <span style={{ background: 'linear-gradient(135deg,var(--gold),var(--gold-light))', WebkitBackgroundClip: 'text', backgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>{t.title_accent}</span>
              </h1>
              <p className="contact-hero-sub">{t.subtitle}</p>
            </div>
          </div>

          <div className="container">
            <div className="contact-grid">

              {/* Info Panel */}
              <div className="contact-info-panel">
                <h3>{t.info_title}</h3>
                <div className="contact-info-list">
                  {infoItems.map((item, i) => (
                    <div key={i} className="contact-info-item">
                      <div className="contact-info-icon" style={{ background: `${item.color}18`, color: item.color }}>
                        <i className={`fas ${item.icon}`}></i>
                      </div>
                      <div>
                        <div className="contact-info-label">{item.label}</div>
                        <div className="contact-info-value">{item.value}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="contact-social-row">
                  <div className="contact-social-title">{t.follow}</div>
                  <div style={{ display: 'flex', gap: '10px', marginTop: '12px' }}>
                    {['facebook-f', 'twitter', 'linkedin-in', 'instagram'].map(s => (
                      <div key={s} className="social-btn"><i className={`fab fa-${s}`}></i></div>
                    ))}
                  </div>
                </div>
                {/* Decorative map placeholder */}
                <div className="contact-map-placeholder">
                  <i className="fas fa-map-marked-alt"></i>
                  <span>{lang === 'en' ? 'Alexandria, Egypt' : 'الإسكندرية، مصر'}</span>
                </div>
              </div>

              {/* Form Panel */}
              <div className="contact-form-panel">
                {sent ? (
                  <div className="contact-sent">
                    <div className="contact-sent-icon"><i className="fas fa-check-circle"></i></div>
                    <h2>{t.sent_title}</h2>
                    <p>{t.sent_desc}</p>
                    <button className="btn-primary" onClick={() => { setSent(false); setForm({ name: '', email: '', subject: '', message: '' }); }}>
                      <i className="fas fa-redo"></i>{t.back}
                    </button>
                  </div>
                ) : (
                  <form onSubmit={handleSubmit} className="contact-form">
                    <div className="contact-form-row">
                      <div className="form-group">
                        <label className="form-label">{t.name}</label>
                        <div className="input-icon-wrap">
                          <i className="fas fa-user input-icon"></i>
                          <input className="form-input" type="text" value={form.name}
                            onChange={e => set('name', e.target.value)}
                            placeholder={lang === 'en' ? 'Your full name' : 'اسمك الكامل'} />
                        </div>
                      </div>
                      <div className="form-group">
                        <label className="form-label">{t.email}</label>
                        <div className="input-icon-wrap">
                          <i className="fas fa-envelope input-icon"></i>
                          <input className="form-input" type="email" value={form.email}
                            onChange={e => set('email', e.target.value)}
                            placeholder="you@example.com" />
                        </div>
                      </div>
                    </div>
                    <div className="form-group">
                      <label className="form-label">{t.subject}</label>
                      <div className="input-icon-wrap">
                        <i className="fas fa-tag input-icon"></i>
                        <input className="form-input" type="text" value={form.subject}
                          onChange={e => set('subject', e.target.value)}
                          placeholder={lang === 'en' ? 'How can we help?' : 'كيف يمكننا مساعدتك؟'} />
                      </div>
                    </div>
                    <div className="form-group">
                      <label className="form-label">{t.message}</label>
                      <textarea className="form-input contact-textarea" value={form.message}
                        onChange={e => set('message', e.target.value)}
                        placeholder={lang === 'en' ? 'Write your message here...' : 'اكتب رسالتك هنا...'}
                      />
                    </div>
                    <button className="btn-auth btn-auth-primary contact-submit" type="submit" disabled={loading}>
                      {loading
                        ? <><span className="spinner"></span>{t.sending}</>
                        : <><i className="fas fa-paper-plane" style={{ marginRight: '8px' }}></i>{t.send}</>}
                    </button>
                  </form>
                )}
              </div>

            </div>
          </div>
        </div>
      );
    }

                <div style={{ display: 'flex', gap: '16px', justifyContent: 'center', flexWrap: 'wrap' }}>
                  <button className="btn-primary" onClick={() => setPage('signup')}>

                  </button>

    /* ============================================================
       DB EXPLORER TAB — SQL-style Firestore Collection Browser
       (Declared before AdminPage so it can be used as a component)
       ============================================================ */
    /* ── DB Explorer helpers ── */
    function DbCellEditor({ value, onSave, onCancel }) {
      const [val, setVal] = React.useState(value);
      const ref = React.useRef(null);
      React.useEffect(() => { ref.current?.focus(); ref.current?.select(); }, []);
      const commit = () => onSave(val);
      return (
        <input
          ref={ref}
          className="dbx-cell-input"
          value={val}
          onChange={e => setVal(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') onCancel(); }}
          onBlur={commit}
        />
      );
    }

    function DbJsonModal({ field, value, onSave, onClose }) {
      const [text, setText] = React.useState(
        typeof value === 'object' ? JSON.stringify(value, null, 2) : String(value ?? '')
      );
      const [err, setErr] = React.useState('');
      const tryParse = (s) => { try { return JSON.parse(s); } catch { return s; } };
      const commit = () => {
        try { if (text.trim().startsWith('{') || text.trim().startsWith('[')) JSON.parse(text); }
        catch { setErr('Invalid JSON'); return; }
        onSave(tryParse(text));
      };
      return (
        <div className="dbx-modal-overlay" onClick={onClose}>
          <div className="dbx-modal" onClick={e => e.stopPropagation()}>
            <div className="dbx-modal-header">
              <span><i className="fas fa-code"></i> Edit field: <code>{field}</code></span>
              <button className="dbx-modal-close" onClick={onClose}><i className="fas fa-times"></i></button>
            </div>
            {err && <div className="dbx-modal-err">{err}</div>}
            <textarea className="dbx-modal-textarea" value={text} onChange={e => { setText(e.target.value); setErr(''); }} rows={14} spellCheck={false} />
            <div className="dbx-modal-footer">
              <button className="dbx-btn dbx-btn-ghost" onClick={onClose}>Cancel</button>
              <button className="dbx-btn dbx-btn-primary" onClick={commit}><i className="fas fa-save"></i> Save</button>
            </div>
          </div>
        </div>
      );
    }

    function DbNewRowModal({ cols, collectionName, onSave, onClose }) {
      const fields = cols.filter(c => c !== '__id');
      const [form, setForm] = React.useState(() => Object.fromEntries(fields.map(f => [f, ''])));
      const [saving, setSaving] = React.useState(false);
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const commit = () => {
        setSaving(true);
        const data = {};
        fields.forEach(f => { const v = form[f]; data[f] = v === '' ? null : (isNaN(v) ? v : (v.includes('.') ? parseFloat(v) : parseInt(v, 10))); });
        const ref = firebase.firestore().collection(collectionName).doc();
        ref.set(data).then(() => { onSave({ __id: ref.id, ...data }); }).catch(e => { alert(e.message); setSaving(false); });
      };
      return (
        <div className="dbx-modal-overlay" onClick={onClose}>
          <div className="dbx-modal" onClick={e => e.stopPropagation()}>
            <div className="dbx-modal-header">
              <span><i className="fas fa-plus"></i> Insert new document into <code>{collectionName}</code></span>
              <button className="dbx-modal-close" onClick={onClose}><i className="fas fa-times"></i></button>
            </div>
            <div className="dbx-newrow-form">
              {fields.map(f => (
                <div key={f} className="dbx-newrow-field">
                  <label className="dbx-newrow-label">{f}</label>
                  <input className="dbx-newrow-input" value={form[f]} onChange={e => set(f, e.target.value)} placeholder="value…" />
                </div>
              ))}
            </div>
            <div className="dbx-modal-footer">
              <button className="dbx-btn dbx-btn-ghost" onClick={onClose}>Cancel</button>
              <button className="dbx-btn dbx-btn-primary" onClick={commit} disabled={saving}>
                {saving ? <><span className="spinner"></span> Inserting…</> : <><i className="fas fa-plus"></i> Insert</>}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function DbExplorerTab({ showToast }) {
      const COLLECTIONS = [
        { key: 'users',        label: 'users',        icon: 'fa-users' },
        { key: 'jobs',         label: 'jobs',         icon: 'fa-briefcase' },
        { key: 'applications', label: 'applications', icon: 'fa-file-alt' },
        { key: 'categories',   label: 'categories',   icon: 'fa-layer-group' },
        { key: 'skills',       label: 'skills',       icon: 'fa-tags' },
        { key: 'saved_jobs',   label: 'saved_jobs',   icon: 'fa-bookmark' },
      ];

      const [dbCol,       setDbCol]       = React.useState('users');
      const [dbRows,      setDbRows]      = React.useState([]);
      const [dbCols,      setDbCols]      = React.useState([]);
      const [dbLoading,   setDbLoading]   = React.useState(false);
      const [dbSearch,    setDbSearch]    = React.useState('');
      const [sortCol,     setSortCol]     = React.useState(null);
      const [sortAsc,     setSortAsc]     = React.useState(true);
      // Editing state
      const [editCell,    setEditCell]    = React.useState(null); // { rowId, col }
      const [savingCell,  setSavingCell]  = React.useState(null);
      const [jsonModal,   setJsonModal]   = React.useState(null); // { rowId, col, value }
      const [newRowModal, setNewRowModal] = React.useState(false);
      const [deletingRow, setDeletingRow] = React.useState(null);
      const [pendingEdits,setPendingEdits]= React.useState({}); // { rowId: { col: newVal } }

      const toast = (msg, type = 'success') => showToast && showToast(msg, type);

      const fetchCollection = React.useCallback((colName) => {
        setDbLoading(true); setDbRows([]); setDbCols([]); setDbSearch('');
        setSortCol(null); setEditCell(null); setPendingEdits({});
        firebase.firestore().collection(colName).get()
          .then(snap => {
            const docs = snap.docs.map(d => ({ __id: d.id, ...d.data() }));
            const colSet = new Set(['__id']);
            docs.forEach(d => Object.keys(d).forEach(k => colSet.add(k)));
            setDbCols([...colSet]);
            setDbRows(docs);
            setDbLoading(false);
          })
          .catch(err => { toast(err.message, 'error'); setDbLoading(false); });
      }, []);

      React.useEffect(() => { fetchCollection(dbCol); }, [dbCol]);

      const handleSort = col => {
        if (sortCol === col) setSortAsc(a => !a);
        else { setSortCol(col); setSortAsc(true); }
      };

      const displayRows = React.useMemo(() => {
        let rows = dbRows;
        if (dbSearch.trim()) {
          const q = dbSearch.toLowerCase();
          rows = rows.filter(r => dbCols.some(c => String(r[c] ?? '').toLowerCase().includes(q)));
        }
        if (sortCol) {
          rows = [...rows].sort((a, b) => {
            const va = String(a[sortCol] ?? ''), vb = String(b[sortCol] ?? '');
            return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
          });
        }
        return rows;
      }, [dbRows, dbSearch, sortCol, sortAsc, dbCols]);

      const fmt = val => {
        if (val === null || val === undefined) return '';
        if (typeof val === 'object') return JSON.stringify(val);
        return String(val);
      };
      const truncate = (s, n = 36) => s.length > n ? s.slice(0, n) + '\u2026' : s;

      const isObj = val => val !== null && val !== undefined && typeof val === 'object';

      /* ── Save a single cell edit to Firestore ── */
      const commitCellEdit = (rowId, col, rawVal) => {
        setEditCell(null);
        if (rawVal === fmt(dbRows.find(r => r.__id === rowId)?.[col])) return; // no change
        const parsed = rawVal === '' ? null : (isNaN(rawVal) || rawVal === '' ? rawVal : (rawVal.includes('.') ? parseFloat(rawVal) : parseInt(rawVal, 10)));
        setSavingCell({ rowId, col });
        firebase.firestore().collection(dbCol).doc(rowId).update({ [col]: parsed })
          .then(() => {
            setDbRows(prev => prev.map(r => r.__id === rowId ? { ...r, [col]: parsed } : r));
            toast(`Updated ${col} on ${rowId.slice(0, 8)}…`);
          })
          .catch(e => toast(e.message, 'error'))
          .finally(() => setSavingCell(null));
      };

      /* ── Save a JSON/object field ── */
      const commitJsonEdit = (rowId, col, val) => {
        setJsonModal(null);
        firebase.firestore().collection(dbCol).doc(rowId).update({ [col]: val })
          .then(() => {
            setDbRows(prev => prev.map(r => r.__id === rowId ? { ...r, [col]: val } : r));
            toast(`Updated ${col}`);
          })
          .catch(e => toast(e.message, 'error'));
      };

      /* ── Delete a row ── */
      const deleteRow = (rowId) => {
        if (!window.confirm(`Delete document ${rowId} from ${dbCol}?`)) return;
        setDeletingRow(rowId);
        firebase.firestore().collection(dbCol).doc(rowId).delete()
          .then(() => { setDbRows(prev => prev.filter(r => r.__id !== rowId)); toast('Document deleted.', 'warning'); })
          .catch(e => toast(e.message, 'error'))
          .finally(() => setDeletingRow(null));
      };

      /* ── Insert new row ── */
      const insertRow = (row) => {
        setNewRowModal(false);
        setDbRows(prev => [...prev, row]);
        const cols = new Set(['__id', ...dbCols]);
        Object.keys(row).forEach(k => cols.add(k));
        setDbCols([...cols]);
        toast('Document inserted!');
      };

      // pendingEdits reserved for future batch-save UX

      return (
        <div className="admin-content dbx-root">

          {/* Collection selector tabs */}
          <div className="dbx-collections">
            {COLLECTIONS.map(c => (
              <button key={c.key}
                className={`dbx-col-btn${dbCol === c.key ? ' active' : ''}`}
                onClick={() => setDbCol(c.key)}>
                <i className={`fas ${c.icon}`}></i>
                <span>{c.label}</span>
                {dbCol === c.key && dbRows.length > 0 &&
                  <span className="dbx-col-count">{dbRows.length}</span>}
              </button>
            ))}
          </div>

          {/* Toolbar */}
          <div className="dbx-toolbar">
            <div className="dbx-toolbar-left">
              <span className="dbx-coll-name"><i className="fas fa-database"></i> {dbCol}</span>
              <span className="dbx-meta">{displayRows.length} rows &nbsp;&middot;&nbsp; {dbCols.length} cols</span>
              <span className="dbx-meta" style={{ color: '#10b981', fontStyle: 'italic' }}>
                <i className="fas fa-pencil-alt" style={{ marginRight: 4, fontSize: 9 }}></i>
                Click any cell to edit
              </span>
            </div>
            <div className="dbx-toolbar-right">
              <button className="dbx-btn dbx-btn-insert" onClick={() => setNewRowModal(true)} title="Insert new document">
                <i className="fas fa-plus"></i> Insert Row
              </button>
              <div className="dbx-search-wrap">
                <i className="fas fa-search"></i>
                <input className="dbx-search" placeholder="Filter rows\u2026"
                  value={dbSearch} onChange={e => setDbSearch(e.target.value)} />
                {dbSearch && <button className="dbx-search-clear" onClick={() => setDbSearch('')}><i className="fas fa-times"></i></button>}
              </div>
              <button className="dbx-refresh-btn" onClick={() => fetchCollection(dbCol)} title="Refresh">
                <i className={`fas fa-sync-alt${dbLoading ? ' fa-spin' : ''}`}></i>
              </button>
            </div>
          </div>

          {/* Table */}
          <div className="dbx-table-wrap">
            {dbLoading ? (
              <div className="dbx-loading">
                <div className="dbx-spinner"></div>
                <span>Fetching <strong>{dbCol}</strong> from Firestore…</span>
              </div>
            ) : (
              <table className="dbx-table">
                <thead>
                  <tr>
                    <th className="dbx-th dbx-th-rownum">#</th>
                    <th className="dbx-th dbx-th-actions">Actions</th>
                    {dbCols.map(col => (
                      <th key={col}
                        className={`dbx-th${sortCol === col ? ' sorted' : ''}`}
                        onClick={() => handleSort(col)}>
                        <span className="dbx-th-inner">
                          {col === '__id' ? <><i className="fas fa-key"></i>&#8201;id</> : col}
                          <i className={`fas dbx-sort-icon fa-sort${sortCol === col ? (sortAsc ? '-up' : '-down') : ''}`}></i>
                        </span>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {displayRows.length === 0 ? (
                    <tr><td colSpan={dbCols.length + 2} className="dbx-empty">No documents in <strong>{dbCol}</strong></td></tr>
                  ) : displayRows.map((row, ri) => {
                    const isDeleting = deletingRow === row.__id;
                    return (
                      <tr key={row.__id || ri} className={`dbx-tr${isDeleting ? ' dbx-tr-deleting' : ''}`}>
                        <td className="dbx-td dbx-td-rownum">{ri + 1}</td>
                        {/* Actions column */}
                        <td className="dbx-td dbx-td-actions">
                          <button
                            className="dbx-action-btn dbx-action-delete"
                            onClick={() => deleteRow(row.__id)}
                            disabled={isDeleting}
                            title="Delete document">
                            {isDeleting
                              ? <i className="fas fa-spinner fa-spin"></i>
                              : <i className="fas fa-trash-alt"></i>}
                          </button>
                        </td>
                        {dbCols.map(col => {
                          const raw = fmt(row[col]);
                          const isNull = row[col] === null || row[col] === undefined;
                          const isEditing = editCell && editCell.rowId === row.__id && editCell.col === col;
                          const isSaving = savingCell && savingCell.rowId === row.__id && savingCell.col === col;
                          const isId = col === '__id';
                          const isObjectVal = isObj(row[col]);

                          if (isEditing && !isId) {
                            return (
                              <td key={col} className="dbx-td dbx-td-editing">
                                <DbCellEditor
                                  value={isObjectVal ? JSON.stringify(row[col]) : String(row[col] ?? '')}
                                  onSave={v => commitCellEdit(row.__id, col, v)}
                                  onCancel={() => setEditCell(null)}
                                />
                              </td>
                            );
                          }

                          return (
                            <td key={col}
                              className={`dbx-td${isId ? ' dbx-td-id' : ''}${isNull ? ' dbx-null' : ''}${isSaving ? ' dbx-td-saving' : ''}${isObjectVal ? ' dbx-td-obj' : ''}`}
                              title={raw.length > 36 ? raw : undefined}
                              onClick={() => {
                                if (isId) return;
                                if (isObjectVal) {
                                  setJsonModal({ rowId: row.__id, col, value: row[col] });
                                } else {
                                  setEditCell({ rowId: row.__id, col });
                                }
                              }}>
                              {isSaving
                                ? <span className="dbx-saving-indicator"><i className="fas fa-spinner fa-spin"></i></span>
                                : isNull
                                  ? <span className="dbx-null-label">NULL</span>
                                  : isObjectVal
                                    ? <span className="dbx-obj-chip"><i className="fas fa-code"></i> {truncate(raw, 28)}</span>
                                    : truncate(raw)}
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>

          {/* JSON Modal */}
          {jsonModal && (
            <DbJsonModal
              field={jsonModal.col}
              value={jsonModal.value}
              onSave={val => commitJsonEdit(jsonModal.rowId, jsonModal.col, val)}
              onClose={() => setJsonModal(null)}
            />
          )}

          {/* New Row Modal */}
          {newRowModal && (
            <DbNewRowModal
              cols={dbCols}
              collectionName={dbCol}
              onSave={insertRow}
              onClose={() => setNewRowModal(false)}
            />
          )}
        </div>
      );
    }

    /* ============================================================
       ADMIN PAGE
       ============================================================ */
    function AdminPage({ lang, setPage, user }) {
      const [activeTab, setActiveTab] = React.useState('dashboard');
      const [users, setUsers] = React.useState([]);
      const [jobs, setJobs] = React.useState([]);
      const [applications, setApplications] = React.useState([]);
      const [categories, setCategories] = React.useState([]);
      const [skills, setSkills] = React.useState([]);
      const [disputes, setDisputes] = React.useState([]);
      const [verifications, setVerifications] = React.useState([]);
      
      const fetchDisputes = () => {
        firebase.firestore().collection('applications').where('status', '==', 'disputed').get().then(snap => {
          setDisputes(snap.docs.map(doc => Object.assign({ id: doc.id }, doc.data())));
        });
      };

      const handleResolveDispute = (appId, resolution) => {
        firebase.firestore().collection('applications').doc(appId).update({
          status: 'accepted', // or resolution
          resolvedAt: new Date().toISOString(),
          adminResolution: resolution
        }).then(() => {
          showToast('Dispute resolved.');
          setDisputes(prev => prev.filter(d => d.id !== appId));
        });
      };
      const [loading, setLoading] = React.useState(false);
      const [toast, setToast] = React.useState(null);
      const [userSearch, setUserSearch] = React.useState('');
      const [jobSearch, setJobSearch] = React.useState('');
      const [newCat, setNewCat] = React.useState('');
      const [newSkill, setNewSkill] = React.useState({ name: '', category: '' });
      const [siteSettings, setSiteSettings] = React.useState({
        maintenanceMode: false,
        newRegistrations: true,
        jobPostingEnabled: true,
        emailNotifications: true,
        autoSeed: true,
      });
      const [editingJob, setEditingJob] = React.useState(null);
      const [editingUser, setEditingUser] = React.useState(null);

      const showToast = (msg, type = 'success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3500);
      };

      const handleApproveVerification = (userId) => {
        window.UserDB.approveVerification(userId).then(() => {
          showToast('Verification approved!');
          setVerifications(prev => prev.filter(v => v.userId !== userId));
          setUsers(prev => prev.map(u => u.id === userId ? { ...u, isVerified: true } : u));
        }).catch(err => showToast('Error: ' + err.message, 'error'));
      };

      const loadData = React.useCallback(() => {
        setLoading(true);
        Promise.all([
          window.UserDB.listUsers(),
          window.UserDB.listJobs(),
          window.UserDB.listCategories(),
          window.UserDB.listSkills(),
          window.UserDB.listPendingVerifications(),
        ]).then(([u, j, c, s, v]) => {
          setUsers(u);
          setJobs(j);
          setCategories(c);
          setSkills(s);
          if (v.ok) setVerifications(v.list);
          setLoading(false);
        }).catch(() => setLoading(false));
        // Load all applications
        firebase.firestore().collection('applications').get()
          .then(snap => setApplications(snap.docs.map(d => Object.assign({ id: d.id }, d.data()))))
          .catch(() => {});
        // Load disputes
        firebase.firestore().collection('applications').where('status', '==', 'disputed').get()
          .then(snap => setDisputes(snap.docs.map(d => Object.assign({ id: d.id }, d.data()))));
      }, []);

      React.useEffect(() => { loadData(); }, [loadData]);

      if (!user || user.role !== 'admin') {
        return (
          <div className="admin-access-denied">
            <div className="admin-denied-icon"><i className="fas fa-lock"></i></div>
            <h2>Access Restricted</h2>
            <p>This area is only accessible to administrators.</p>
            <button className="btn-primary" onClick={() => setPage('home')}><i className="fas fa-home"></i> Go Home</button>
          </div>
        );
      }

      const filteredUsers = users.filter(u =>
        (u.name || '').toLowerCase().includes(userSearch.toLowerCase()) ||
        (u.email || '').toLowerCase().includes(userSearch.toLowerCase()) ||
        (u.role || '').toLowerCase().includes(userSearch.toLowerCase())
      );

      const filteredJobs = jobs.filter(j =>
        (j.title || '').toLowerCase().includes(jobSearch.toLowerCase()) ||
        (j.category || '').toLowerCase().includes(jobSearch.toLowerCase())
      );

      const stats = [
        { icon: 'fa-users', label: 'Total Users', value: users.length, color: '#6c63ff', sub: `${users.filter(u => u.role === 'freelancer').length} freelancers · ${users.filter(u => u.role === 'client').length} clients` },
        { icon: 'fa-briefcase', label: 'Total Jobs', value: jobs.length, color: '#f59e0b', sub: `${jobs.filter(j => j.type === 'local').length} local · ${jobs.filter(j => j.type === 'intl').length} intl` },
        { icon: 'fa-file-alt', label: 'Applications', value: applications.length, color: '#10b981', sub: `${applications.filter(a => a.status === 'pending').length} pending` },
        { icon: 'fa-layer-group', label: 'Categories', value: categories.length, color: '#ef4444', sub: `${skills.length} skills registered` },
      ];

      const handleDeleteUser = (uid) => {
        if (!window.confirm('Delete this user from Firestore? (Auth account remains.)')) return;
        firebase.firestore().collection('users').doc(uid).delete()
          .then(() => { setUsers(prev => prev.filter(u => u.id !== uid)); showToast('User deleted from Firestore.'); })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      };

      const handleChangeRole = (uid, newRole) => {
        firebase.firestore().collection('users').doc(uid).update({ role: newRole })
          .then(() => { setUsers(prev => prev.map(u => u.id === uid ? { ...u, role: newRole } : u)); showToast(`Role updated to ${newRole}.`); })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      };

      const handleDeleteJob = (jid) => {
        if (!window.confirm('Delete this job posting?')) return;
        firebase.firestore().collection('jobs').doc(jid).delete()
          .then(() => { setJobs(prev => prev.filter(j => j.id !== jid)); showToast('Job deleted.'); })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      };

      const handleToggleFeatured = (uid, currentStatus) => {
        const newStatus = !currentStatus;
        firebase.firestore().collection('users').doc(uid).update({ isFeatured: newStatus })
          .then(() => {
            setUsers(prev => prev.map(u => u.id === uid ? { ...u, isFeatured: newStatus } : u));
            showToast(newStatus ? 'User is now featured!' : 'User featured status removed.');
          })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      };

      const handleGrantBadge = (uid, currentBadges) => {
        const badgeName = window.prompt('Enter badge name (e.g. English Expert, Top Rated):');
        if (!badgeName) return;
        firebase.firestore().collection('users').doc(uid).update({
          badges: firebase.firestore.FieldValue.arrayUnion(badgeName)
        }).then(() => {
          setUsers(prev => prev.map(u => u.id === uid ? { ...u, badges: [...(u.badges || []), badgeName] } : u));
          showToast('Badge granted!');
        }).catch(err => showToast('Error: ' + err.message, 'error'));
      };

      const handleUpdateJob = (jid, data) => {
        firebase.firestore().collection('jobs').doc(jid).update(data)
          .then(() => { setJobs(prev => prev.map(j => j.id === jid ? { ...j, ...data } : j)); setEditingJob(null); showToast('Job updated.'); })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      };

      const handleUpdateAppStatus = (docId, status) => {
        firebase.firestore().collection('applications').doc(docId).update({ status })
          .then(() => { setApplications(prev => prev.map(a => a.id === docId ? { ...a, status } : a)); showToast(`Application ${status}.`); })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      };

      const handleAddCategory = () => {
        if (!newCat.trim()) return;
        const id = 'cat-' + Date.now();
        firebase.firestore().collection('categories').doc(id).set({ id, name: newCat.trim(), description: '' })
          .then(() => { setCategories(prev => [...prev, { id, name: newCat.trim(), description: '' }]); setNewCat(''); showToast('Category added.'); })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      };

      const handleDeleteCategory = (cid) => {
        firebase.firestore().collection('categories').doc(cid).delete()
          .then(() => { setCategories(prev => prev.filter(c => c.id !== cid)); showToast('Category deleted.'); })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      };

      const handleAddSkill = () => {
        if (!newSkill.name.trim() || !newSkill.category.trim()) return;
        const id = 'sk-' + Date.now();
        firebase.firestore().collection('skills').doc(id).set({ id, name: newSkill.name.trim(), category: newSkill.category.trim() })
          .then(() => { setSkills(prev => [...prev, { id, name: newSkill.name.trim(), category: newSkill.category.trim() }]); setNewSkill({ name: '', category: '' }); showToast('Skill added.'); })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      };

      const handleDeleteSkill = (sid) => {
        firebase.firestore().collection('skills').doc(sid).delete()
          .then(() => { setSkills(prev => prev.filter(s => s.id !== sid)); showToast('Skill deleted.'); })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      };

      const handleReseedJobs = () => {
        if (!window.confirm('This will overwrite all jobs in Firestore with seed data. Continue?')) return;
        const batch = firebase.firestore().batch();
        (window.DB_SEED_JOBS || []).forEach((job, i) => {
          const ref = firebase.firestore().collection('jobs').doc('job-' + (i + 1));
          batch.set(ref, job);
        });
        batch.commit().then(() => { showToast('Jobs re-seeded successfully.'); loadData(); })
          .catch(err => showToast('Seed error: ' + err.message, 'error'));
      };

      const handleWipeApplications = () => {
        if (!window.confirm('DANGER: Delete ALL applications from Firestore?')) return;
        firebase.firestore().collection('applications').get()
          .then(snap => {
            const batch = firebase.firestore().batch();
            snap.docs.forEach(d => batch.delete(d.ref));
            return batch.commit();
          })
          .then(() => { setApplications([]); showToast('All applications wiped.', 'warning'); })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      };

      const sidebarItems = [
        { key: 'dashboard', icon: 'fa-tachometer-alt', label: 'Dashboard' },
        { key: 'users', icon: 'fa-users', label: 'Users' },
        { key: 'verifications', icon: 'fa-check-double', label: 'Verifications' },
        { key: 'disputes', icon: 'fa-exclamation-triangle', label: 'Disputes' },
        { key: 'revenue', icon: 'fa-chart-line', label: 'Revenue & Finance' },
        { key: 'jobs', icon: 'fa-briefcase', label: 'Jobs' },
        { key: 'applications', icon: 'fa-file-alt', label: 'Applications' },
        { key: 'taxonomy', icon: 'fa-layer-group', label: 'Categories & Skills' },
        { key: 'db-explorer', icon: 'fa-table', label: 'DB Explorer' },
        { key: 'db', icon: 'fa-database', label: 'DB Tools' },
        { key: 'settings', icon: 'fa-cog', label: 'Site Settings' },
      ];

      return (
        <div className="admin-page">
          {/* Toast */}
          {toast && (
            <div className={`admin-toast admin-toast-${toast.type}`}>
              <i className={`fas fa-${toast.type === 'error' ? 'times-circle' : toast.type === 'warning' ? 'exclamation-triangle' : 'check-circle'}`}></i>
              {toast.msg}
            </div>
          )}

          {/* Sidebar */}
          <aside className="admin-sidebar">
            <div className="admin-sidebar-logo">
              <i className="fas fa-shield-alt"></i>
              <span>Admin Panel</span>
            </div>
            <nav className="admin-sidebar-nav">
              {sidebarItems.map(item => (
                <button
                  key={item.key}
                  className={`admin-nav-item${activeTab === item.key ? ' active' : ''}`}
                  onClick={() => setActiveTab(item.key)}
                >
                  <i className={`fas ${item.icon}`}></i>
                  <span>{item.label}</span>
                </button>
              ))}
            </nav>
            <div className="admin-sidebar-footer">
              <button className="admin-nav-item" onClick={() => setPage('home')}>
                <i className="fas fa-arrow-left"></i>
                <span>Back to Site</span>
              </button>
            </div>
          </aside>

          {/* Main Content */}
          <main className="admin-main">
            <div className="admin-topbar">
              <div>
                <h1 className="admin-page-title">
                  {sidebarItems.find(s => s.key === activeTab)?.label}
                </h1>
                <p className="admin-page-sub">NileLancers Administration</p>
              </div>
              <div className="admin-topbar-actions">
                <button className="admin-refresh-btn" onClick={loadData} title="Refresh data">
                  <i className={`fas fa-sync-alt${loading ? ' fa-spin' : ''}`}></i>
                </button>
                <div className="admin-user-badge">
                  <i className="fas fa-user-shield"></i>
                  {user.name}
                </div>
              </div>
            </div>

            {/* ── DASHBOARD ── */}
            {activeTab === 'dashboard' && (
              <div className="admin-content">
                <div className="admin-stats-grid">
                  {stats.map((s, i) => (
                    <div key={i} className="admin-stat-card" style={{ '--stat-color': s.color }}>
                      <div className="admin-stat-icon"><i className={`fas ${s.icon}`}></i></div>
                      <div className="admin-stat-body">
                        <div className="admin-stat-value">{s.value}</div>
                        <div className="admin-stat-label">{s.label}</div>
                        <div className="admin-stat-sub">{s.sub}</div>
                      </div>
                    </div>
                  ))}
                </div>

                <div className="admin-dash-grid">
                  <div className="admin-panel">
                    <div className="admin-panel-header"><i className="fas fa-users"></i> Recent Users</div>
                    <div className="admin-panel-body">
                      {users.slice(0, 5).map(u => (
                        <div key={u.id} className="admin-list-row">
                          <div className="admin-avatar">{(u.name?.[0] || '?').toUpperCase()}</div>
                          <div className="admin-list-info">
                            <div className="admin-list-name">{u.name}</div>
                            <div className="admin-list-sub">{u.email}</div>
                          </div>
                          <span className={`admin-role-badge admin-role-${u.role}`}>{u.role}</span>
                        </div>
                      ))}
                      {users.length === 0 && <div className="admin-empty">No users yet</div>}
                    </div>
                  </div>

                  <div className="admin-panel">
                    <div className="admin-panel-header"><i className="fas fa-briefcase"></i> Recent Services</div>
                    <div className="admin-panel-body">
                      {jobs.slice(0, 5).map(j => (
                        <div key={j.id} className="admin-list-row">
                          <div className="admin-job-icon" style={{ color: j.color || '#6c63ff' }}><i className={`fas ${j.icon || 'fa-briefcase'}`}></i></div>
                          <div className="admin-list-info">
                            <div className="admin-list-name">{j.title}</div>
                            <div className="admin-list-sub">{j.category} · {j.budget?.toLocaleString()} EGP</div>
                          </div>
                          <span className={`job-type-badge job-type-${j.type}`}>{j.type}</span>
                        </div>
                      ))}
                      {jobs.length === 0 && <div className="admin-empty">No jobs yet</div>}
                    </div>
                  </div>

                  <div className="admin-panel">
                    <div className="admin-panel-header"><i className="fas fa-file-alt"></i> Recent Applications</div>
                    <div className="admin-panel-body">
                      {applications.slice(0, 5).map(a => (
                        <div key={a.id} className="admin-list-row">
                          <div className="admin-avatar" style={{ background: 'var(--glass-border)' }}><i className="fas fa-file-alt"></i></div>
                          <div className="admin-list-info">
                            <div className="admin-list-name">Job: {a.jobId}</div>
                            <div className="admin-list-sub">User: {a.userId}</div>
                          </div>
                          <span className={`admin-status-badge admin-status-${a.status}`}>{a.status}</span>
                        </div>
                      ))}
                      {applications.length === 0 && <div className="admin-empty">No applications yet</div>}
                    </div>
                  </div>

                  <div className="admin-panel admin-panel-quick">
                    <div className="admin-panel-header"><i className="fas fa-bolt"></i> Quick Actions</div>
                    <div className="admin-panel-body admin-quick-actions">
                      <button className="admin-action-btn" onClick={() => setActiveTab('users')}><i className="fas fa-users"></i> Manage Users</button>
                      <button className="admin-action-btn" onClick={() => setActiveTab('jobs')}><i className="fas fa-briefcase"></i> Manage Jobs</button>
                      <button className="admin-action-btn" onClick={() => setActiveTab('applications')}><i className="fas fa-file-alt"></i> View Applications</button>
                      <button className="admin-action-btn" onClick={() => setActiveTab('taxonomy')}><i className="fas fa-tags"></i> Categories & Skills</button>
                      <button className="admin-action-btn" onClick={() => setActiveTab('db')}><i className="fas fa-database"></i> DB Tools</button>
                      <button className="admin-action-btn" onClick={() => setActiveTab('settings')}><i className="fas fa-cog"></i> Site Settings</button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ── USERS ── */}
            {activeTab === 'users' && (
              <div className="admin-content">
                <div className="admin-toolbar">
                  <div className="admin-search-wrap">
                    <i className="fas fa-search"></i>
                    <input className="admin-search" placeholder="Search users by name, email, role…" value={userSearch} onChange={e => setUserSearch(e.target.value)} />
                  </div>
                  <span className="admin-count">{filteredUsers.length} users</span>
                </div>
                <div className="admin-table-wrap">
                  <table className="admin-table">
                    <thead>
                      <tr>
                        <th>User</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Joined</th>
                        <th>Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredUsers.map(u => (
                        <tr key={u.id}>
                          <td>
                            <div className="admin-table-user">
                              <div className="admin-avatar sm">{(u.name?.[0] || '?').toUpperCase()}</div>
                              <div>
                                <div className="admin-table-name">{u.name}</div>
                                <div className="admin-table-sub">@{u.username}</div>
                                <div style={{ display: 'flex', gap: '4px', marginTop: '4px', flexWrap: 'wrap' }}>
                                  {(u.badges || []).map((b, i) => (
                                    <span key={i} style={{ fontSize: '9px', background: '#6c63ff22', color: '#6c63ff', padding: '1px 5px', borderRadius: '4px' }}>{b}</span>
                                  ))}
                                </div>
                              </div>
                            </div>
                          </td>
                          <td className="admin-table-sub">{u.email}</td>
                          <td>
                            <select
                              className={`admin-role-select admin-role-${u.role}`}
                              value={u.role}
                              onChange={e => handleChangeRole(u.id, e.target.value)}
                            >
                              <option value="freelancer">Freelancer</option>
                              <option value="client">Client</option>
                              <option value="admin">Admin</option>
                            </select>
                          </td>
                          <td className="admin-table-sub">{u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '—'}</td>
                          <td>
                            <div className="admin-table-actions">
                              <button 
                                className="admin-btn" 
                                onClick={() => handleGrantBadge(u.id, u.badges || [])} 
                                title="Grant Badge"
                                style={{ color: '#6c63ff' }}
                              >
                                <i className="fas fa-award"></i>
                              </button>
                              <button 
                                className={`admin-btn ${u.isFeatured ? 'admin-btn-warning' : ''}`} 
                                onClick={() => handleToggleFeatured(u.id, u.isFeatured)} 
                                title="Toggle Featured"
                                style={{ color: u.isFeatured ? 'var(--gold)' : '' }}
                              >
                                <i className={`fas fa-star`}></i>
                              </button>
                              <button className="admin-btn admin-btn-danger" onClick={() => handleDeleteUser(u.id)} title="Delete user">
                                <i className="fas fa-trash"></i>
                              </button>
                            </div>
                          </td>
                        </tr>
                      ))}
                      {filteredUsers.length === 0 && (
                        <tr><td colSpan="5" className="admin-empty">No users found</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* ── VERIFICATIONS ── */}
            {activeTab === 'verifications' && (
              <div className="admin-content">
                <div className="admin-toolbar">
                  <h2 style={{ fontSize: '18px', fontWeight: 800 }}>Pending Verification Requests</h2>
                  <span className="admin-count">{verifications.length} pending</span>
                </div>
                <div className="admin-table-wrap">
                  <table className="admin-table">
                    <thead>
                      <tr>
                        <th>User</th>
                        <th>ID Photo</th>
                        <th>Submitted</th>
                        <th>Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {verifications.map(v => {
                        const u = users.find(usr => usr.id === v.userId);
                        return (
                          <tr key={v.userId}>
                            <td>
                              <div className="admin-table-user">
                                <div className="admin-avatar sm">{(u?.name?.[0] || '?').toUpperCase()}</div>
                                <div>
                                  <div className="admin-table-name">{u?.name || 'Unknown'}</div>
                                  <div className="admin-table-sub">{u?.email}</div>
                                </div>
                              </div>
                            </td>
                            <td>
                              <a href={v.idPhoto} target="_blank" rel="noopener noreferrer" className="admin-btn" style={{ fontSize: '11px', padding: '4px 8px' }}>
                                <i className="fas fa-image"></i> View ID
                              </a>
                            </td>
                            <td className="admin-table-sub">{new Date(v.timestamp).toLocaleString()}</td>
                            <td>
                              <button className="btn-primary" style={{ padding: '6px 12px', fontSize: '12px' }} onClick={() => handleApproveVerification(v.userId)}>
                                <i className="fas fa-check"></i> Approve
                              </button>
                            </td>
                          </tr>
                        );
                      })}
                      {verifications.length === 0 && (
                        <tr><td colSpan="4" className="admin-empty">No pending verifications</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* ── DISPUTES ── */}
            {activeTab === 'disputes' && (
              <div className="admin-content">
                <div className="admin-toolbar">
                  <h2 style={{ fontSize: '18px', fontWeight: 800 }}>Project Disputes</h2>
                  <span className="admin-count">{disputes.length} active</span>
                </div>
                <div className="admin-table-wrap">
                  <table className="admin-table">
                    <thead>
                      <tr>
                        <th>Project / Application ID</th>
                        <th>Reporter</th>
                        <th>Reason</th>
                        <th>Date</th>
                        <th>Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {disputes.map(d => {
                        const reporter = users.find(u => u.id === d.disputeOpenedBy);
                        return (
                          <tr key={d.id}>
                            <td>
                              <div style={{ fontWeight: 800, fontSize: '13px' }}>{d.jobTitle || 'Application'}</div>
                              <div className="admin-table-sub" style={{ fontFamily: 'monospace' }}>{d.id}</div>
                            </td>
                            <td>
                              <div className="admin-table-name">{reporter?.name || 'Unknown'}</div>
                              <div className="admin-table-sub">{reporter?.role}</div>
                            </td>
                            <td style={{ maxWidth: '250px' }}>
                              <div style={{ fontSize: '12px', whiteSpace: 'normal' }}>{d.disputeReason}</div>
                            </td>
                            <td className="admin-table-sub">{new Date(d.disputeAt).toLocaleDateString()}</td>
                            <td>
                              <div className="admin-table-actions">
                                <button className="admin-btn admin-btn-success" title="Resolve & Keep Active" onClick={() => handleResolveDispute(d.id, 'Resolved - Keep Active')}>
                                  <i className="fas fa-check"></i>
                                </button>
                                <button className="admin-btn admin-btn-danger" title="Resolve & Cancel" onClick={() => handleResolveDispute(d.id, 'Resolved - Cancelled')}>
                                  <i className="fas fa-times"></i>
                                </button>
                                <button className="admin-btn admin-btn-primary" title="Go to Workroom" onClick={() => setPage('workroom', { appId: d.id })}>
                                  <i className="fas fa-external-link-alt"></i>
                                </button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                      {disputes.length === 0 && (
                        <tr><td colSpan="5" className="admin-empty">No active disputes</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* ── REVENUE ── */}
            {activeTab === 'revenue' && (() => {
              const totalSpent = users.reduce((acc, u) => acc + (u.totalSpent || 0), 0);
              const totalEarnings = users.reduce((acc, u) => acc + (u.totalEarnings || 0), 0);
              const profit = totalSpent - totalEarnings;
              const profitMargin = totalSpent > 0 ? (profit / totalSpent * 100).toFixed(1) : 0;

              return (
                <div className="admin-content">
                  <div className="admin-toolbar">
                    <h2 style={{ fontSize: '18px', fontWeight: 800 }}>Financial Overview</h2>
                  </div>
                  
                  <div className="admin-stats-grid" style={{ marginBottom: '30px' }}>
                    <div className="admin-stat-card">
                      <div className="admin-stat-icon" style={{ background: '#10b98118', color: '#10b981' }}><i className="fas fa-money-bill-wave"></i></div>
                      <div className="admin-stat-info">
                        <div className="admin-stat-label">Total Revenue (Gross)</div>
                        <div className="admin-stat-value">{totalSpent.toLocaleString()} EGP</div>
                      </div>
                    </div>
                    <div className="admin-stat-card">
                      <div className="admin-stat-icon" style={{ background: '#f59e0b18', color: '#f59e0b' }}><i className="fas fa-hand-holding-usd"></i></div>
                      <div className="admin-stat-info">
                        <div className="admin-stat-label">Total Payouts</div>
                        <div className="admin-stat-value">{totalEarnings.toLocaleString()} EGP</div>
                      </div>
                    </div>
                    <div className="admin-stat-card">
                      <div className="admin-stat-icon" style={{ background: '#6c63ff18', color: '#6c63ff' }}><i className="fas fa-university"></i></div>
                      <div className="admin-stat-info">
                        <div className="admin-stat-label">Net Platform Profit</div>
                        <div className="admin-stat-value">{profit.toLocaleString()} EGP</div>
                      </div>
                    </div>
                  </div>

                  <div className="admin-panel">
                    <div className="admin-panel-header"><i className="fas fa-chart-pie"></i> Profit Margin Analysis</div>
                    <div className="admin-panel-body">
                      <div style={{ marginBottom: '10px', fontSize: '14px', display: 'flex', justifyContent: 'space-between' }}>
                        <span>Platform Commission ({profitMargin}%)</span>
                        <span>{profit.toLocaleString()} EGP</span>
                      </div>
                      <div style={{ height: '20px', background: 'rgba(255,255,255,0.05)', borderRadius: '10px', overflow: 'hidden' }}>
                        <div style={{ width: `${profitMargin}%`, height: '100%', background: 'var(--gold)' }}></div>
                      </div>
                      <p style={{ marginTop: '20px', fontSize: '12px', color: 'var(--text-muted)' }}>
                        Note: Profit is calculated as the difference between client spending and freelancer earnings. This represents the total commission earned by the platform.
                      </p>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* ── JOBS ── */}
            {activeTab === 'jobs' && (
              <div className="admin-content">
                {editingJob ? (
                  <div className="admin-edit-form">
                    <div className="admin-edit-header">
                      <h3>Edit Job: {editingJob.title}</h3>
                      <button className="admin-btn admin-btn-outline" onClick={() => setEditingJob(null)}>✕ Cancel</button>
                    </div>
                    {[
                      { key: 'title', label: 'Title', type: 'text' },
                      { key: 'category', label: 'Category', type: 'text' },
                      { key: 'budget', label: 'Budget (EGP)', type: 'number' },
                      { key: 'deadline', label: 'Deadline', type: 'date' },
                      { key: 'days', label: 'Duration (days)', type: 'number' },
                    ].map(f => (
                      <div key={f.key} className="admin-form-group">
                        <label className="admin-form-label">{f.label}</label>
                        <input
                          className="admin-form-input"
                          type={f.type}
                          value={editingJob[f.key] || ''}
                          onChange={e => setEditingJob(prev => ({ ...prev, [f.key]: f.type === 'number' ? Number(e.target.value) : e.target.value }))}
                        />
                      </div>
                    ))}
                    <div className="admin-form-group">
                      <label className="admin-form-label">Type</label>
                      <select className="admin-form-input" value={editingJob.type} onChange={e => setEditingJob(prev => ({ ...prev, type: e.target.value }))}>
                        <option value="local">Local</option>
                        <option value="intl">International</option>
                      </select>
                    </div>
                    <div className="admin-form-group">
                      <label className="admin-form-label">Description</label>
                      <textarea className="admin-form-input" rows="3" value={editingJob.description || ''} onChange={e => setEditingJob(prev => ({ ...prev, description: e.target.value }))}></textarea>
                    </div>
                    <button className="btn-primary" onClick={() => handleUpdateJob(editingJob.id, editingJob)}>
                      <i className="fas fa-save"></i> Save Changes
                    </button>
                  </div>
                ) : (
                  <>
                    <div className="admin-toolbar">
                      <div className="admin-search-wrap">
                        <i className="fas fa-search"></i>
                        <input className="admin-search" placeholder="Search jobs by title or category…" value={jobSearch} onChange={e => setJobSearch(e.target.value)} />
                      </div>
                      <span className="admin-count">{filteredJobs.length} jobs</span>
                    </div>
                    <div className="admin-table-wrap">
                      <table className="admin-table">
                        <thead>
                          <tr>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Budget</th>
                            <th>Type</th>
                            <th>Deadline</th>
                            <th>Actions</th>
                          </tr>
                        </thead>
                        <tbody>
                          {filteredJobs.map(j => (
                            <tr key={j.id}>
                              <td>
                                <div className="admin-table-user">
                                  <div className="admin-job-icon sm" style={{ color: j.color || '#6c63ff' }}><i className={`fas ${j.icon || 'fa-briefcase'}`}></i></div>
                                  <div className="admin-table-name">{j.title}</div>
                                </div>
                              </td>
                              <td className="admin-table-sub">{j.category}</td>
                              <td className="admin-table-name">{j.budget?.toLocaleString()} EGP</td>
                              <td><span className={`job-type-badge job-type-${j.type}`}>{j.type}</span></td>
                              <td className="admin-table-sub">{j.deadline || '—'}</td>
                              <td>
                                <div className="admin-table-actions">
                                  <button className="admin-btn admin-btn-primary" onClick={() => setEditingJob({ ...j })} title="Edit job">
                                    <i className="fas fa-edit"></i>
                                  </button>
                                  <button className="admin-btn admin-btn-danger" onClick={() => handleDeleteJob(j.id)} title="Delete job">
                                    <i className="fas fa-trash"></i>
                                  </button>
                                </div>
                              </td>
                            </tr>
                          ))}
                          {filteredJobs.length === 0 && (
                            <tr><td colSpan="6" className="admin-empty">No jobs found</td></tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </>
                )}
              </div>
            )}

            {/* ── APPLICATIONS ── */}
            {activeTab === 'applications' && (
              <div className="admin-content">
                <div className="admin-toolbar">
                  <span className="admin-count">{applications.length} total applications</span>
                </div>
                <div className="admin-table-wrap">
                  <table className="admin-table">
                    <thead>
                      <tr>
                        <th>Application ID</th>
                        <th>Job ID</th>
                        <th>User ID</th>
                        <th>Applied</th>
                        <th>Status</th>
                        <th>Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {applications.map(a => (
                        <tr key={a.id}>
                          <td className="admin-table-sub" style={{ fontFamily: 'monospace', fontSize: '11px' }}>{a.id}</td>
                          <td className="admin-table-sub">{a.jobId}</td>
                          <td className="admin-table-sub">{a.userId}</td>
                          <td className="admin-table-sub">{a.appliedAt ? new Date(a.appliedAt).toLocaleDateString() : '—'}</td>
                          <td><span className={`admin-status-badge admin-status-${a.status}`}>{a.status}</span></td>
                          <td>
                            <div className="admin-table-actions">
                              <button className="admin-btn admin-btn-success" onClick={() => handleUpdateAppStatus(a.id, 'accepted')} title="Accept"><i className="fas fa-check"></i></button>
                              <button className="admin-btn admin-btn-warning" onClick={() => handleUpdateAppStatus(a.id, 'pending')} title="Pending"><i className="fas fa-clock"></i></button>
                              <button className="admin-btn admin-btn-danger" onClick={() => handleUpdateAppStatus(a.id, 'rejected')} title="Reject"><i className="fas fa-times"></i></button>
                            </div>
                          </td>
                        </tr>
                      ))}
                      {applications.length === 0 && (
                        <tr><td colSpan="6" className="admin-empty">No applications yet</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* ── TAXONOMY ── */}
            {activeTab === 'taxonomy' && (
              <div className="admin-content">
                <div className="admin-taxonomy-grid">
                  <div className="admin-panel">
                    <div className="admin-panel-header"><i className="fas fa-layer-group"></i> Categories</div>
                    <div className="admin-panel-body">
                      <div className="admin-add-row">
                        <input className="admin-form-input" placeholder="New category name…" value={newCat} onChange={e => setNewCat(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAddCategory()} />
                        <button className="admin-btn admin-btn-primary" onClick={handleAddCategory}><i className="fas fa-plus"></i> Add</button>
                      </div>
                      <div className="admin-tag-list">
                        {categories.map(c => (
                          <div key={c.id} className="admin-taxonomy-tag">
                            <span>{c.name}</span>
                            <button onClick={() => handleDeleteCategory(c.id)}><i className="fas fa-times"></i></button>
                          </div>
                        ))}
                        {categories.length === 0 && <div className="admin-empty">No categories</div>}
                      </div>
                    </div>
                  </div>

                  <div className="admin-panel">
                    <div className="admin-panel-header"><i className="fas fa-tags"></i> Skills</div>
                    <div className="admin-panel-body">
                      <div className="admin-add-row">
                        <input className="admin-form-input" placeholder="Skill name…" value={newSkill.name} onChange={e => setNewSkill(s => ({ ...s, name: e.target.value }))} />
                        <select className="admin-form-input" value={newSkill.category} onChange={e => setNewSkill(s => ({ ...s, category: e.target.value }))}>
                          <option value="">Category…</option>
                          {categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                        </select>
                        <button className="admin-btn admin-btn-primary" onClick={handleAddSkill}><i className="fas fa-plus"></i> Add</button>
                      </div>
                      <div className="admin-tag-list">
                        {skills.map(s => (
                          <div key={s.id} className="admin-taxonomy-tag">
