    function ApplicationsPage({ lang, user, setPage }) {
      const dir = lang === 'ar' ? 'rtl' : 'ltr';
      const isClient = user?.role === 'client' || user?.role === 'admin';

      /* ── Shared: my own submitted applications ── */
      const [myApps,      setMyApps]      = React.useState([]);
      const [jobMap,      setJobMap]      = React.useState({});
      const [withdrawing, setWithdrawing] = React.useState(null);

      /* ── Client: incoming applications on posted jobs ── */
      const [clientApps,   setClientApps]   = React.useState([]);
      const [myPostedJobs, setMyPostedJobs] = React.useState([]);
      const [activeJobId,  setActiveJobId]  = React.useState(null);
      const [updating,     setUpdating]     = React.useState(null);
      const [msgModal,     setMsgModal]     = React.useState(null);
      const [msgText,      setMsgText]      = React.useState('');
      const [deletingJob,  setDeletingJob]  = React.useState(null);
      const [checkoutApp,  setCheckoutApp]  = React.useState(null);
      const [checkoutState, setCheckoutState] = React.useState('form');
      const [cardDetails,  setCardDetails]  = React.useState({ number: '', expiry: '', cvv: '', name: '' });
      const [paymentMethod, setPaymentMethod] = React.useState('card');
      const [walletNumber, setWalletNumber] = React.useState('');
      const [instapayId, setInstapayId] = React.useState('');

      /* ── Review state ── */
      const [reviewModal, setReviewModal] = React.useState(null);
      const [rating, setRating] = React.useState(5);
      const [comment, setComment] = React.useState('');
      const [savingReview, setSavingReview] = React.useState(false);

      const openReviewModal = (app) => {
        setReviewModal(app);
        setRating(5);
        setComment('');
      };

      const handleReview = () => {
        if (!reviewModal) return;
        setSavingReview(true);
        const app = reviewModal;
        window.UserDB.addReview(app.userId, user.id, rating, comment, app.jobId).then(() => {
          window.UserDB.updateApplicationStatus(app.id, 'completed', comment).then(() => {
            setSavingReview(false);
            setReviewModal(null);
            setClientApps(prev => prev.map(a => a.id === app.id ? Object.assign({}, a, { status: 'completed' }) : a));
            const job = myPostedJobs.find(j => j.id === app.jobId);
            window.UserDB.addNotification(app.userId, 'success', `Project "${job?.title}" completed! Review: ${rating}★`, 'profile');
          });
        });
      };

      const [loading, setLoading] = React.useState(true);

      /* ── Tab state ── */
      const [activeTab, setActiveTab] = React.useState('received');

      React.useEffect(() => {
        if (!user) { setLoading(false); return; }
        if (isClient) {
          Promise.all([
            window.UserDB.listApplicationsForClient(user.id),
            window.UserDB.listMyPostedJobs(user.id),
            window.UserDB.listMyApplications(user.id),
            window.UserDB.listJobs()
          ]).then(([apps, postedJobs, myOwnApps, allJobs]) => {
            setClientApps(apps);
            setMyPostedJobs(postedJobs);
            if (postedJobs.length) setActiveJobId(postedJobs[0].id);
            const map = {};
            allJobs.forEach(j => { map[j.id] = j; });
            setMyApps(myOwnApps);
            setJobMap(map);
            setLoading(false);
          }).catch(() => setLoading(false));
        } else {
          Promise.all([
            window.UserDB.listMyApplications(user.id),
            window.UserDB.listJobs()
          ]).then(([apps, allJobs]) => {
            const map = {};
            allJobs.forEach(j => { map[j.id] = j; });
            setMyApps(apps);
            setJobMap(map);
            setLoading(false);
          }).catch(() => setLoading(false));
        }
      }, [user]);

      /* ── Withdraw (freelancer) ── */
      const handleWithdraw = (app) => {
        setWithdrawing(app.jobId);
        window.UserDB.withdrawApplication(app.jobId, user.id).then(res => {
          setWithdrawing(null);
          if (res.ok) setMyApps(prev => prev.filter(a => a.jobId !== app.jobId));
        });
      };

      /* ── Accept / Reject (client) ── */
      const handleRespond = async (app, status, message) => {
        if (status === 'accepted') {
          setCheckoutApp({ app, message });
          setCheckoutState('form');
          setPaymentMethod('card');
          setCardDetails({ number: '', expiry: '', cvv: '', name: '' });
          setWalletNumber('');
          setInstapayId('');
          return;
        }

        setUpdating(app.id);
        window.UserDB.updateApplicationStatus(app.id, status, message || '').then(res => {
          setUpdating(null);
          if (res.ok) {
            setClientApps(prev => prev.map(a =>
              a.id === app.id ? Object.assign({}, a, { status, clientMessage: message || a.clientMessage }) : a
            ));
            // Send Notification
            const job = myPostedJobs.find(j => j.id === app.jobId);
            const noteType = status === 'accepted' ? 'success' : 'info';
            const noteMsg = status === 'accepted'
              ? (lang === 'en' ? `Application for "${job?.title}" was ACCEPTED!` : `تم قبول طلبك لوظيفة "${job?.title}"!`)
              : (lang === 'en' ? `Application for "${job?.title}" was rejected.` : `تم رفض طلبك لوظيفة "${job?.title}".`);
            window.UserDB.addNotification(app.userId, noteType, noteMsg, 'applications');
          }
        });
      };

      const handleRealPayment = async (e) => {
        e.preventDefault();
        setCheckoutState('processing');
        
        try {
          const job = myPostedJobs.find(j => j.id === checkoutApp.app.jobId);
          const response = await fetch('/create-checkout-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              application: checkoutApp.app,
              jobTitle: job?.title || 'Freelance Service',
              budget: checkoutApp.app.bidAmount || job?.budget || 500
            }),
          });

          const session = await response.json();
          if (session.url) {
            // Redirect to Stripe Checkout
            window.location.href = session.url;
          } else {
            throw new Error(session.error || 'Failed to create checkout session');
          }
        } catch (error) {
          console.error('Stripe Error:', error);
          alert(lang === 'en' ? 'Payment Error: ' + error.message : 'خطأ في الدفع: ' + error.message);
          setCheckoutState('form');
        }
      };

      const openMsgModal = (app, action) => { setMsgModal({ app, action }); setMsgText(''); };
      const confirmMsg   = () => {
        if (!msgModal) return;
        handleRespond(msgModal.app, msgModal.action, msgText);
        setMsgModal(null);
      };

      /* ── Delete job (client) ── */
      const handleDeleteJob = (e, jobId, jobTitle) => {
        e.stopPropagation();
        if (!window.confirm(
          lang === 'en'
            ? `Delete "${jobTitle}"? This will also remove all its applications. This cannot be undone.`
            : `هل تريد حذف "${jobTitle}"؟ سيتم حذف جميع الطلبات المرتبطة به. لا يمكن التراجع.`
        )) return;
        setDeletingJob(jobId);
        window.UserDB.deleteJob(jobId).then(res => {
          setDeletingJob(null);
          if (res.ok) {
            setMyPostedJobs(prev => prev.filter(j => j.id !== jobId));
            setClientApps(prev => prev.filter(a => a.jobId !== jobId));
            setActiveJobId(prev => prev === jobId
              ? (myPostedJobs.find(j => j.id !== jobId)?.id || null)
              : prev
            );
          }
        });
      };

      /* ── Job groups for client sidebar ── */
      const jobGroups = React.useMemo(() => {
        const appsByJob = {};
        clientApps.forEach(app => {
          if (!appsByJob[app.jobId]) appsByJob[app.jobId] = [];
          appsByJob[app.jobId].push(app);
        });
        return myPostedJobs.map(job => ({
          jobId:    job.id,
          jobTitle: job.title,
          jobIcon:  job.icon,
          jobColor: job.color,
          apps:     appsByJob[job.id] || []
        }));
      }, [clientApps, myPostedJobs]);

      const activeGroup = jobGroups.find(g => g.jobId === activeJobId) || jobGroups[0];

      /* ── Not logged in ── */
      if (!user) return (
        <div className="auth-page" dir={dir}>
          <div style={{ textAlign: 'center' }}>
            <i className="fas fa-lock" style={{ fontSize: '64px', color: 'var(--gold)', marginBottom: '24px', display: 'block' }}></i>
            <h2 style={{ marginBottom: '12px' }}>{lang === 'en' ? 'Login Required' : 'يجب تسجيل الدخول'}</h2>
            <button className="btn-primary" onClick={() => setPage('login')}>
              <i className="fas fa-sign-in-alt"></i>{lang === 'en' ? 'Login' : 'تسجيل الدخول'}
            </button>
          </div>
        </div>
      );

      /* ── Status badge ── */
      const StatusBadge = ({ status }) => (
        <span className={`app-status-badge app-status-${status || 'pending'}`}>
          {status === 'accepted' ? (lang === 'en' ? '✓ Accepted' : '✓ مقبول')
            : status === 'rejected' ? (lang === 'en' ? '✗ Rejected' : '✗ مرفوض')
            : status === 'completed' ? (lang === 'en' ? '★ Completed' : '★ مكتمل')
            : (lang === 'en' ? '⏳ Pending' : '⏳ قيد الانتظار')}
        </span>
      );

      /* ── Tab definitions ── */
      const tabs = [
        {
          key:   'received',
          label: lang === 'en' ? 'Applications Received' : 'الطلبات الواردة',
          icon:  'fa-inbox',
          count: isClient ? clientApps.filter(a => a.status === 'pending').length : 0
        },
        {
          key:   'made',
          label: lang === 'en' ? 'Applications Made' : 'طلباتي المرسلة',
          icon:  'fa-paper-plane',
          count: myApps.length
        }
      ];

      /* ── Tab: My Sent Applications (both roles) ── */
      const MyApplicationsTab = () => loading ? (
        <div style={{ textAlign: 'center', padding: '60px' }}>
          <span className="spinner" style={{ width: '40px', height: '40px', borderWidth: '4px', display: 'inline-block' }}></span>
        </div>
      ) : myApps.length === 0 ? (
        <div className="no-jobs">
          <i className="fas fa-inbox"></i>
          <h3>{lang === 'en' ? 'No Applications Yet' : 'لا توجد طلبات مُرسلة'}</h3>
          <p>{lang === 'en' ? 'Browse services and hit Apply Now to get started.' : 'تصفح الخدمات واضغط على قدم الآن للبدء.'}</p>
          <button className="btn-primary" style={{ marginTop: '20px' }} onClick={() => setPage('jobs')}>
            <i className="fas fa-search"></i>{lang === 'en' ? 'Browse Services' : 'تصفح الخدمات'}
          </button>
        </div>
      ) : (
        <div className="apps-list">
          {myApps.map((app, i) => {
            const job  = jobMap[app.jobId];
            const busy = withdrawing === app.jobId;
            return (
              <div key={app.id || i} className="app-card">
                <div className="app-card-icon" style={{ background: job ? `${job.color}18` : 'rgba(255,215,0,0.1)', color: job?.color || 'var(--gold)' }}>
                  <i className={`fas ${job?.icon || 'fa-briefcase'}`}></i>
                </div>
                <div className="app-card-body">
                  <div className="app-card-title">{job?.title || app.jobId}</div>
                  <div className="app-card-meta">
                    {job?.category && <span><i className="fas fa-tag"></i>{job.category}</span>}
                    {app.appliedAt && <span><i className="fas fa-clock"></i>{new Date(app.appliedAt).toLocaleDateString()}</span>}
                  </div>
                  {app.clientMessage && (
                    <div className="app-client-msg">
                      <i className="fas fa-comment-dots"></i>
                      <span>{app.clientMessage}</span>
                    </div>
                  )}
                </div>
                <div className="app-card-right">
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', alignItems: 'flex-end' }}>
                    <StatusBadge status={app.status} />
                    {app.status === 'accepted' && (
                      <button className="btn-secondary" style={{ fontSize: '11px', padding: '4px 8px' }} onClick={() => setPage('workroom', { appId: app.id })}>
                        <i className="fas fa-rocket"></i> {lang === 'en' ? 'Workroom' : 'الغرفة'}
                      </button>
                    )}
                  </div>
                  <button className="app-withdraw-btn" onClick={() => handleWithdraw(app)} disabled={busy}>
                    {busy
                      ? <span className="spinner" style={{ borderTopColor: '#e74c3c' }}></span>
                      : (lang === 'en' ? 'Withdraw' : 'سحب الطلب')}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      );

      /* ── Tab: Received Applications (client / admin only) ── */
      const ReceivedApplicationsTab = () => {
        if (!isClient) return (
          <div className="no-jobs">
            <i className="fas fa-user-tie"></i>
            <h3>{lang === 'en' ? 'Client Account Required' : 'مطلوب حساب عميل'}</h3>
            <p>{lang === 'en'
              ? 'Only clients can post jobs and receive applications. Switch your account type in Settings to get started.'
              : 'فقط العملاء يمكنهم نشر الوظائف واستقبال الطلبات. غيّر نوع حسابك من الإعدادات للبدء.'}</p>
            <button className="btn-primary" style={{ marginTop: '20px' }} onClick={() => setPage('settings')}>
              <i className="fas fa-cog"></i>{lang === 'en' ? 'Switch to Client' : 'التبديل لعميل'}
            </button>
          </div>
        );

        if (loading) return (
          <div style={{ textAlign: 'center', padding: '60px' }}>
            <span className="spinner" style={{ width: '40px', height: '40px', borderWidth: '4px', display: 'inline-block' }}></span>
          </div>
        );

        if (myPostedJobs.length === 0) return (
          <div className="no-jobs">
            <i className="fas fa-inbox"></i>
            <h3>{lang === 'en' ? 'No Jobs Posted Yet' : 'لم تنشر أي وظائف بعد'}</h3>
            <p>{lang === 'en'
              ? "Post a service to start receiving applications from freelancers."
              : 'انشر خدمة لاستقبال طلبات المستقلين.'}</p>
            <button className="btn-primary" style={{ marginTop: '20px' }} onClick={() => setPage('post-job')}>
              <i className="fas fa-plus"></i>{lang === 'en' ? 'Post a Service' : 'نشر خدمة'}
            </button>
          </div>
        );

        return (
          <div className="client-apps-layout">
            {/* Sidebar: job list */}
            <div className="client-apps-sidebar">
              <div className="client-apps-sidebar-title">{lang === 'en' ? 'Your Posted Jobs' : 'خدماتك المنشورة'}</div>
              {jobGroups.map(g => {
                const pending  = g.apps.filter(a => a.status === 'pending').length;
                const isActive = g.jobId === (activeGroup?.jobId);
                return (
                  <div
                    key={g.jobId}
                    className={`client-job-tab${isActive ? ' active' : ''}`}
                    onClick={() => setActiveJobId(g.jobId)}
                  >
                    <div className="client-job-tab-icon" style={{ background: `${g.jobColor}18`, color: g.jobColor }}>
                      <i className={`fas ${g.jobIcon || 'fa-briefcase'}`}></i>
                    </div>
                    <div className="client-job-tab-info">
                      <div className="client-job-tab-name">{g.jobTitle}</div>
                      <div className="client-job-tab-count">{g.apps.length} {lang === 'en' ? 'applicant(s)' : 'متقدم'}</div>
                    </div>
                    {pending > 0 && <span className="client-job-badge">{pending}</span>}
                    <button
                      className="client-job-delete-btn"
                      onClick={e => handleDeleteJob(e, g.jobId, g.jobTitle)}
                      disabled={deletingJob === g.jobId}
                      title={lang === 'en' ? 'Delete job' : 'حذف الوظيفة'}
                    >
                      {deletingJob === g.jobId
                        ? <span className="spinner" style={{ borderTopColor: '#ef4444', width: '12px', height: '12px' }}></span>
                        : <i className="fas fa-trash-alt"></i>}
                    </button>
                  </div>
                );
              })}
            </div>

            {/* Main: applicant cards */}
            <div className="client-apps-main">
              {activeGroup ? (
                <>
                  <div className="client-apps-header">
                    <div>
                      <div className="client-apps-job-title">{activeGroup.jobTitle}</div>
                      <div className="client-apps-job-sub">
                        {activeGroup.apps.length} {lang === 'en' ? 'total' : 'إجمالي'} &nbsp;·&nbsp;
                        {activeGroup.apps.filter(a => a.status === 'pending').length} {lang === 'en' ? 'pending' : 'قيد الانتظار'}
                      </div>
                    </div>
                    <button
                      className="applicant-btn reject"
                      style={{ fontSize: '12px', padding: '7px 14px' }}
                      onClick={e => handleDeleteJob(e, activeGroup.jobId, activeGroup.jobTitle)}
                      disabled={deletingJob === activeGroup.jobId}
                    >
                      {deletingJob === activeGroup.jobId
                        ? <span className="spinner" style={{ borderTopColor: '#ef4444' }}></span>
                        : <><i className="fas fa-trash-alt"></i>{lang === 'en' ? 'Delete Job' : 'حذف الوظيفة'}</>}
                    </button>
                  </div>

                  {activeGroup.apps.length === 0 ? (
                    <div className="no-jobs" style={{ padding: '60px 0' }}>
                      <i className="fas fa-user-slash"></i>
                      <h3>{lang === 'en' ? 'No Applicants Yet' : 'لا يوجد متقدمون بعد'}</h3>
                    </div>
                  ) : (
                    <div className="applicant-list">
                      {activeGroup.apps.map(app => {
                        const busy = updating === app.id;
                        return (
                          <div key={app.id} className={`applicant-card applicant-status-${app.status || 'pending'}`}>
                            <div className="applicant-avatar">
                              {(app.applicantName || 'U')[0].toUpperCase()}
                            </div>
                            <div className="applicant-info">
                              <div className="applicant-name" style={{ cursor: 'pointer', color: 'var(--gold)' }} onClick={() => setPage('profile', { viewUserId: app.userId })}>
                                {app.applicantName}
                              </div>
                              <div className="applicant-meta">
                                {app.applicantEmail && <span><i className="fas fa-envelope"></i>{app.applicantEmail}</span>}
                                {app.appliedAt && <span><i className="fas fa-clock"></i>{new Date(app.appliedAt).toLocaleDateString()}</span>}
                              </div>
                              {app.clientMessage && (
                                <div className="app-client-msg" style={{ marginTop: '6px' }}>
                                  <i className="fas fa-comment-dots"></i>
                                  <span>{lang === 'en' ? 'Your message: ' : 'رسالتك: '}{app.clientMessage}</span>
                                </div>
                              )}
                            </div>
                            <div className="applicant-actions">
                              <button className="applicant-btn chat" style={{ marginRight: dir==='rtl'?'0':'8px', marginLeft: dir==='rtl'?'8px':'0' }} onClick={() => setPage('messages', { targetId: app.userId })}>
                                <i className="fas fa-comment-dots"></i>
                              </button>
                              <StatusBadge status={app.status} />
                              {app.status === 'accepted' && (
                                <>
                                  <button className="applicant-btn accept" style={{ background: 'var(--gold)', color: '#000', borderColor: 'var(--gold)' }} onClick={() => openReviewModal(app)}>
                                    <i className="fas fa-star"></i>{lang === 'en' ? 'Review' : 'تقييم'}
                                  </button>
                                  <button className="applicant-btn chat" onClick={() => setPage('workroom', { appId: app.id })}>
                                    <i className="fas fa-rocket"></i>{lang === 'en' ? 'Workroom' : 'الغرفة'}
                                  </button>
                                </>
                              )}
                              {app.status !== 'accepted' && (
                                <button className="applicant-btn accept" disabled={busy} onClick={() => openMsgModal(app, 'accepted')}>
                                  {busy ? <span className="spinner" style={{ borderTopColor: '#10b981' }}></span>
                                    : <><i className="fas fa-check"></i>{lang === 'en' ? 'Accept' : 'قبول'}</>}
                                </button>
                              )}
                              {app.status !== 'rejected' && (
                                <button className="applicant-btn reject" disabled={busy} onClick={() => openMsgModal(app, 'rejected')}>
                                  {busy ? <span className="spinner" style={{ borderTopColor: '#ef4444' }}></span>
                                    : <><i className="fas fa-times"></i>{lang === 'en' ? 'Reject' : 'رفض'}</>}
                                </button>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </>
              ) : null}
            </div>
          </div>
        );
      };

      /* ── Main render ── */
      return (
        <div className="jobs-page" dir={dir}>

          {/* Mock Checkout Modal */}
          <style>{`
            .fade-in { animation: fadeIn 0.3s ease-out forwards; }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
            .wallet-modal-overlay::-webkit-scrollbar { display: none; }
          `}</style>
          {checkoutApp && (
            <div className="wallet-modal-overlay" style={{ zIndex: 9999 }}>
              <div className="wallet-modal" style={{ maxWidth: '480px', padding: 0, overflow: 'hidden' }}>
                {checkoutState === 'success' ? (
                  <div style={{ padding: '40px', textAlign: 'center' }}>
                    <div style={{ fontSize: '64px', color: '#10b981', marginBottom: '20px' }}>
                      <i className="fas fa-check-circle"></i>
                    </div>
                    <h2 style={{ marginBottom: '12px' }}>{lang === 'en' ? 'Payment Successful!' : 'تم الدفع بنجاح!'}</h2>
                    {paymentMethod === 'fawry' ? (
                       <p style={{ color: 'var(--text-secondary)', marginBottom: '24px' }}>
                         {lang === 'en' ? 'Fawry Reference Number: ' : 'رقم فوري المرجعي: '} <strong style={{ color: 'var(--gold)' }}>94832{Math.floor(Math.random() * 10000)}</strong><br/><br/>
                         {lang === 'en' ? 'Please pay at any Fawry terminal within 48 hours to fund the project.' : 'يرجى الدفع عبر أي ماكينة فوري خلال 48 ساعة.'}
                       </p>
                    ) : (
                       <p style={{ color: 'var(--text-secondary)', marginBottom: '24px' }}>
                         {lang === 'en' ? 'The application has been accepted and funded securely.' : 'تم قبول الطلب وإيداع المبلغ بأمان.'}
                       </p>
                    )}
                    <button className="btn-primary" onClick={() => setCheckoutApp(null)}>
                      {lang === 'en' ? 'Done' : 'تم'}
                    </button>
                  </div>
                ) : (
                  <>
                    <div style={{ background: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)', padding: '30px 24px', color: '#fff', position: 'relative' }}>
                      <button className="wallet-modal-close" onClick={() => setCheckoutApp(null)} style={{ position: 'absolute', top: '16px', right: '16px', color: '#fff' }}>
                        <i className="fas fa-times"></i>
                      </button>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                        <div>
                          <div style={{ fontSize: '13px', color: 'rgba(255,255,255,0.7)', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '4px' }}>
                            {lang === 'en' ? 'Secure Checkout' : 'دفع آمن'}
                          </div>
                          <div style={{ fontSize: '24px', fontWeight: 800 }}>NilePay</div>
                        </div>
                        <i className="fas fa-shield-alt" style={{ fontSize: '32px', color: 'var(--gold)' }}></i>
                      </div>

                      {(() => {
                        const job = myPostedJobs.find(j => j.id === checkoutApp.app.jobId);
                        const budget = job?.budget || 0;
                        const jobType = job?.type?.toLowerCase() === 'intl' ? 'International' : 'Local';
                        const currencyEn = jobType === 'International' ? 'USD' : 'EGP';
                        const currencyAr = jobType === 'International' ? 'دولار' : 'ج.م';
                        const commissionRate = jobType === 'International' ? 0.15 : 0.10;
                        const commissionAmount = budget * commissionRate;
                        const freelancerEarnings = budget - commissionAmount;

                        return (
                          <>
                            <div style={{ fontSize: '14px', color: 'rgba(255,255,255,0.8)' }}>
                              {lang === 'en' ? 'Total to pay' : 'المبلغ المطلوب'}
                            </div>
                            <div style={{ fontSize: '36px', fontWeight: 900, color: 'var(--gold)' }}>
                              {budget.toLocaleString()} {lang === 'en' ? currencyEn : currencyAr}
                            </div>
                            
                            <div style={{ marginTop: '16px', padding: '12px', background: 'rgba(0,0,0,0.3)', borderRadius: '8px', fontSize: '13px' }}>
                              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px', color: 'rgba(255,255,255,0.9)' }}>
                                <span>{lang === 'en' ? 'Freelancer Earnings' : 'أرباح المستقل'}</span>
                                <strong>{freelancerEarnings.toLocaleString()} {lang === 'en' ? currencyEn : currencyAr}</strong>
                              </div>
                              <div style={{ display: 'flex', justifyContent: 'space-between', color: 'rgba(255,255,255,0.6)' }}>
                                <span>{lang === 'en' ? `Platform Fee (${jobType} Tier - ${commissionRate * 100}%)` : `عمولة المنصة (${jobType === 'International' ? 'دولي' : 'محلي'} - ${commissionRate * 100}%)`}</span>
                                <span>{commissionAmount.toLocaleString()} {lang === 'en' ? currencyEn : currencyAr}</span>
                              </div>
                            </div>
                          </>
                        );
                      })()}
                    </div>
                    
                    <div style={{ padding: '24px' }}>
                      <div style={{ display: 'flex', gap: '8px', overflowX: 'auto', paddingBottom: '12px', marginBottom: '16px', borderBottom: '1px solid var(--border)' }}>
                        {[
                          { id: 'card', icon: 'fa-credit-card', label: lang === 'en' ? 'Card' : 'بطاقة' },
                          { id: 'wallet', icon: 'fa-mobile-alt', label: lang === 'en' ? 'Wallets' : 'محافظ' },
                          { id: 'instapay', icon: 'fa-paper-plane', label: 'InstaPay' },
                          { id: 'fawry', icon: 'fa-barcode', label: lang === 'en' ? 'Fawry' : 'فوري' },
                          { id: 'paypal', icon: 'fab fa-paypal', label: 'PayPal' },
                        ].map(pm => (
                          <button key={pm.id} onClick={() => setPaymentMethod(pm.id)} style={{
                            padding: '8px 12px', borderRadius: '8px', fontSize: '12px', fontWeight: 700, border: 'none', cursor: 'pointer', flexShrink: 0,
                            background: paymentMethod === pm.id ? 'var(--gold)' : 'var(--card-bg)',
                            color: paymentMethod === pm.id ? '#000' : 'var(--text-secondary)',
                            border: paymentMethod === pm.id ? '1px solid var(--gold)' : '1px solid var(--border)',
                          }}>
                            <i className={`${pm.icon}`} style={{ marginRight: '6px' }}></i>{pm.label}
                          </button>
                        ))}
                      </div>

                      <form onSubmit={handleRealPayment}>
                        
                        {/* Card Form */}
                        {paymentMethod === 'card' && (
                          <div className="fade-in">
                            <div className="form-group">
                              <label className="form-label">{lang === 'en' ? 'Card Number' : 'رقم البطاقة'}</label>
                              <div className="input-icon-wrap">
                                <i className="fas fa-credit-card input-icon"></i>
                                <input required className="form-input" placeholder="0000 0000 0000 0000" maxLength="19" 
                                  value={cardDetails.number} onChange={e => setCardDetails({...cardDetails, number: e.target.value})} />
                              </div>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                              <div className="form-group">
                                <label className="form-label">{lang === 'en' ? 'Expiry Date' : 'تاريخ الانتهاء'}</label>
                                <input required className="form-input" placeholder="MM/YY" maxLength="5"
                                  value={cardDetails.expiry} onChange={e => setCardDetails({...cardDetails, expiry: e.target.value})} />
                              </div>
                              <div className="form-group">
                                <label className="form-label">CVV</label>
                                <input required className="form-input" placeholder="123" maxLength="4" type="password"
                                  value={cardDetails.cvv} onChange={e => setCardDetails({...cardDetails, cvv: e.target.value})} />
                              </div>
                            </div>
                            <div className="form-group">
                              <label className="form-label">{lang === 'en' ? 'Name on Card' : 'الاسم على البطاقة'}</label>
                              <input required className="form-input" placeholder={lang === 'en' ? 'John Doe' : 'الاسم بالكامل'}
                                value={cardDetails.name} onChange={e => setCardDetails({...cardDetails, name: e.target.value})} />
                            </div>
                          </div>
                        )}

                        {/* E-Wallet Form */}
                        {paymentMethod === 'wallet' && (
                          <div className="fade-in">
                            <div style={{ textAlign: 'center', marginBottom: '16px' }}>
                              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Vodafone_logo.svg/1024px-Vodafone_logo.svg.png" style={{ height: '30px', margin: '0 8px', objectFit: 'contain' }} alt="Vodafone" />
                              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Orange_logo.svg/1024px-Orange_logo.svg.png" style={{ height: '30px', margin: '0 8px', objectFit: 'contain' }} alt="Orange" />
                              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Etisalat_logo.svg/1024px-Etisalat_logo.svg.png" style={{ height: '30px', margin: '0 8px', objectFit: 'contain' }} alt="Etisalat" />
                            </div>
                            <div className="form-group">
                              <label className="form-label">{lang === 'en' ? 'Wallet Mobile Number' : 'رقم المحفظة الإلكترونية'}</label>
                              <div className="input-icon-wrap">
                                <i className="fas fa-mobile-alt input-icon"></i>
                                <input required className="form-input" type="tel" placeholder="01X XXXX XXXX" maxLength="11" 
                                  value={walletNumber} onChange={e => setWalletNumber(e.target.value)} />
                              </div>
                              <p style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '8px' }}>
                                {lang === 'en' ? 'A payment request will be sent to your wallet app.' : 'سيتم إرسال طلب دفع إلى تطبيق المحفظة الخاص بك للتأكيد.'}
                              </p>
                            </div>
                          </div>
                        )}

                        {/* InstaPay Form */}
                        {paymentMethod === 'instapay' && (
                          <div className="fade-in">
                            <div style={{ textAlign: 'center', marginBottom: '16px' }}>
                              <div style={{ background: '#00254D', color: '#fff', padding: '8px 16px', borderRadius: '8px', display: 'inline-block', fontWeight: 900 }}>instapay</div>
                            </div>
                            <div className="form-group">
                              <label className="form-label">{lang === 'en' ? 'Payment Address (IPA)' : 'عنوان الدفع (IPA)'}</label>
                              <div className="input-icon-wrap">
                                <i className="fas fa-at input-icon"></i>
                                <input required className="form-input" placeholder="username@instapay" 
                                  value={instapayId} onChange={e => setInstapayId(e.target.value)} />
                              </div>
                              <p style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '8px' }}>
                                {lang === 'en' ? 'Approve the transaction from your InstaPay app.' : 'قم بالموافقة على المعاملة من داخل تطبيق إنستاباي.'}
                              </p>
                            </div>
                          </div>
                        )}

                        {/* Fawry Form */}
                        {paymentMethod === 'fawry' && (
                          <div className="fade-in" style={{ textAlign: 'center', padding: '10px 0' }}>
                            <div style={{ background: '#fce300', color: '#000', padding: '8px 16px', borderRadius: '8px', display: 'inline-block', fontWeight: 900, fontSize: '24px', marginBottom: '16px' }}>Fawry</div>
                            <p style={{ color: 'var(--text-secondary)', fontSize: '14px', lineHeight: '1.6' }}>
                              {lang === 'en' 
                                ? 'Click below to generate a reference number. You can pay at any Fawry POS machine within 48 hours.' 
                                : 'اضغط بالأسفل لإنشاء رقم مرجعي. يمكنك الدفع من أي ماكينة فوري خلال 48 ساعة لدعم المشروع.'}
                            </p>
                          </div>
                        )}

                        {/* PayPal Form */}
                        {paymentMethod === 'paypal' && (
                          <div className="fade-in" style={{ textAlign: 'center', padding: '10px 0' }}>
                            <i className="fab fa-paypal" style={{ fontSize: '48px', color: '#00457C', marginBottom: '16px' }}></i>
                            <p style={{ color: 'var(--text-secondary)', fontSize: '14px', lineHeight: '1.6' }}>
                              {lang === 'en' 
                                ? 'You will be redirected to PayPal to complete your purchase securely.' 
                                : 'سيتم توجيهك إلى موقع PayPal لإتمام عملية الشراء بأمان.'}
                            </p>
                          </div>
                        )}
                        
                        <button type="submit" className="btn-primary" style={{ width: '100%', marginTop: '12px', height: '48px' }} disabled={checkoutState === 'processing'}>
                          {checkoutState === 'processing' 
                            ? <><span className="spinner"></span>{lang === 'en' ? ' Processing...' : ' جاري التنفيذ...'}</> 
                            : (paymentMethod === 'fawry' 
                                ? <><i className="fas fa-barcode" style={{ marginRight: '8px' }}></i>{lang === 'en' ? 'Generate Code' : 'إنشاء كود فوري'}</>
                                : <><i className="fas fa-lock" style={{ marginRight: '8px' }}></i>{lang === 'en' ? 'Pay Now' : 'ادفع الآن'}</>
                              )
                          }
                        </button>
                      </form>
                    </div>
                  </>
                )}
              </div>
            </div>
          )}

          {/* Accept/Reject message modal */}
          {msgModal && (
            <div className="wallet-modal-overlay" onClick={e => e.target === e.currentTarget && setMsgModal(null)}>
              <div className="wallet-modal" style={{ maxWidth: '460px' }}>
                <div className="wallet-modal-header" style={{ '--modal-accent': msgModal.action === 'accepted' ? '#10b981' : '#ef4444' }}>
                  <div className="wallet-modal-icon">
                    <i className={`fas fa-${msgModal.action === 'accepted' ? 'check' : 'times'}`}></i>
                  </div>
                  <div>
                    <div className="wallet-modal-title">
                      {msgModal.action === 'accepted'
                        ? (lang === 'en' ? 'Accept Application' : 'قبول الطلب')
                        : (lang === 'en' ? 'Reject Application' : 'رفض الطلب')}
                    </div>
                    <div className="wallet-modal-sub">{msgModal.app.applicantName}</div>
                  </div>
                  <button className="wallet-modal-close" onClick={() => setMsgModal(null)}>
                    <i className="fas fa-times"></i>
                  </button>
                </div>
                <div className="wallet-modal-body">
                  <label className="wallet-amount-label">
                    {lang === 'en' ? 'Message to applicant (optional)' : 'رسالة للمتقدم (اختياري)'}
                  </label>
                  <textarea
                    className="settings-input settings-textarea"
                    rows="4"
                    placeholder={msgModal.action === 'accepted'
                      ? (lang === 'en' ? 'e.g. Great profile! Please reach out to discuss next steps…' : 'مثال: ملفك الشخصي رائع! تواصل معنا للمتابعة...')
                      : (lang === 'en' ? 'e.g. Thank you for applying. We went with another candidate…' : 'مثال: شكراً على التقديم. اخترنا مرشحاً آخر...')}
                    value={msgText}
                    onChange={e => setMsgText(e.target.value)}
                    style={{ paddingLeft: '14px', marginTop: '8px', width: '100%' }}
                  />
                  <div className="wallet-modal-footer">
                    <button className="wallet-back-btn" onClick={() => setMsgModal(null)}>
                      {lang === 'en' ? 'Cancel' : 'إلغاء'}
                    </button>
                    <button
                      className="btn-primary"
                      style={{
                        background: msgModal.action === 'accepted' ? 'linear-gradient(135deg,#10b981,#059669)' : 'rgba(239,68,68,0.15)',
                        color: msgModal.action === 'accepted' ? '#fff' : '#ef4444',
                        border: msgModal.action === 'rejected' ? '1px solid rgba(239,68,68,0.3)' : 'none'
                      }}
                      onClick={confirmMsg}
                    >
                      <i className={`fas fa-${msgModal.action === 'accepted' ? 'check' : 'times'}`}></i>
                      {msgModal.action === 'accepted'
                        ? (lang === 'en' ? 'Confirm Accept' : 'تأكيد القبول')
                        : (lang === 'en' ? 'Confirm Reject' : 'تأكيد الرفض')}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Review Modal */}
          {reviewModal && (
            <div className="modal-overlay" style={{ zIndex: 1001 }}>
              <div className="modal" style={{ maxWidth: '400px' }}>
                <h3 style={{ color: 'var(--gold)' }}>{lang === 'en' ? 'Rate Freelancer' : 'تقييم المستقل'}</h3>
                <p style={{ fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '20px' }}>
                  {lang === 'en' ? `How was your experience with ${reviewModal.applicantName}?` : `كيف كانت تجربتك مع ${reviewModal.applicantName}؟`}
                </p>
                
                <div style={{ display: 'flex', justifyContent: 'center', gap: '10px', fontSize: '28px', marginBottom: '20px' }}>
                  {[1,2,3,4,5].map(s => (
                    <i key={s} 
                       className={`${s <= rating ? 'fas' : 'far'} fa-star`} 
                       style={{ color: 'var(--gold)', cursor: 'pointer' }}
                       onClick={() => setRating(s)}></i>
                  ))}
                </div>

                <div className="form-group">
                  <label className="form-label">{lang === 'en' ? 'Your Comment' : 'تعليقك'}</label>
                  <textarea className="form-input" 
                            style={{ minHeight: '80px' }}
                            value={comment} 
                            onChange={e => setComment(e.target.value)}
                            placeholder={lang === 'en' ? 'Share your feedback...' : 'اكتب رأيك هنا...'}></textarea>
                </div>

                <div className="modal-btns">
                  <button className="btn-secondary" onClick={() => setReviewModal(null)}>{lang === 'en' ? 'Cancel' : 'إلغاء'}</button>
                  <button className="btn-primary" onClick={handleReview} disabled={savingReview}>
                    {savingReview ? <span className="spinner"></span> : (lang === 'en' ? 'Submit Review' : 'إرسال التقييم')}
                  </button>
                </div>
              </div>
            </div>
          )}

          <div className="container" style={{ maxWidth: '1100px', paddingTop: '40px', paddingBottom: '60px' }}>

            {/* Page header */}
            <div className="section-header" style={{ marginBottom: '32px' }}>
              <span className="tag"><i className="fas fa-file-alt"></i>{lang === 'en' ? 'Application Manager' : 'مدير الطلبات'}</span>
              <h1 style={{ fontSize: '2rem' }}>
                {lang === 'en'
                  ? <><span style={{ color: 'var(--gold)' }}>Applications</span> Manager</>
                  : <><span style={{ color: 'var(--gold)' }}>مدير</span> الطلبات</>}
              </h1>
              <p>{lang === 'en'
                ? 'Track incoming applications and manage the services you have applied to.'
                : 'تابع الطلبات الواردة وإدارة الخدمات التي تقدمت إليها.'}</p>
            </div>

            {/* Tab bar */}
            <div className="app-mgr-tabs" dir={dir}>
              {tabs.map(t => (
                <button
                  key={t.key}
                  id={`app-tab-${t.key}`}
                  className={`app-mgr-tab${activeTab === t.key ? ' active' : ''}`}
                  onClick={() => setActiveTab(t.key)}
                >
                  <i className={`fas ${t.icon}`}></i>
                  <span>{t.label}</span>
                  {t.count > 0 && <span className="app-mgr-tab-badge">{t.count}</span>}
                </button>
              ))}
            </div>

            {/* Tab content */}
            <div className="app-mgr-content">
              {activeTab === 'received' ? <ReceivedApplicationsTab /> : <MyApplicationsTab />}
            </div>

          </div>
        </div>
      );
    }

    /* ============================================================
       PLACEHOLDER PAGE  (wallet only)
       ============================================================ */
    function PlaceholderPage({ lang, setPage, pageKey }) {
      const info = {
        wallet: { en: 'My Wallet', ar: 'محفظتي', icon: 'fa-wallet' },
      }[pageKey] || { en: 'Coming Soon', ar: 'قريباً', icon: 'fa-tools' };

      return (
        <div className="auth-page" dir={lang === 'ar' ? 'rtl' : 'ltr'}>
          <div style={{ textAlign: 'center' }}>
            <i className={`fas ${info.icon}`} style={{ fontSize: '64px', color: 'var(--gold)', marginBottom: '24px', display: 'block' }}></i>
            <h2 style={{ fontSize: '28px', fontWeight: 900, marginBottom: '12px' }}>{lang === 'en' ? info.en : info.ar}</h2>
            <p style={{ color: 'var(--text-secondary)', marginBottom: '28px' }}>
              {lang === 'en' ? 'This feature is coming soon!' : 'هذه الميزة ستكون متاحة قريباً!'}
            </p>
            <button className="btn-primary" onClick={() => setPage('home')}>
              <i className="fas fa-home"></i>{lang === 'en' ? 'Back to Home' : 'العودة للرئيسية'}
            </button>
          </div>
        </div>
      );
    }

    /* ============================================================
       SETTINGS PAGE
       ============================================================ */
    function SettingsPage({ lang, setPage, theme, setTheme, setLang, user, setUser }) {
      const dir = lang === 'ar' ? 'rtl' : 'ltr';

      /* ── State ── */
      const [activeTab, setActiveTab] = React.useState('account');
      const [verifStatus, setVerifStatus] = React.useState(null);

      React.useEffect(() => {
        if (user) {
          return window.UserDB.getVerificationStatus(user.id, (status) => {
            setVerifStatus(status);
          });
        }
      }, [user]);

      const fileInputRef = React.useRef(null);
      const handleVerifySubmit = () => {
        fileInputRef.current?.click();
      };

      const handleFileChange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setSaving(true);
        try {
          const url = await window.UserDB.uploadFile(file, `verifications/${user.id}`);
          await window.UserDB.submitVerification(user.id, url);
          alert(lang === 'en' ? 'Verification request submitted!' : 'تم تقديم طلب التوثيق!');
        } catch (err) {
          alert('Upload error: ' + err.message);
        } finally {
          setSaving(false);
        }
      };
      const [toast, setToast] = React.useState(null);
      const [saving, setSaving] = React.useState(false);

      /* Profile form */
      const [profile, setProfile] = React.useState({
        name:              user?.name             || '',
        username:          user?.username          || '',
        phone:             user?.phone             || '',
        location:          user?.location          || '',
        bio:               user?.bio               || '',
        yearsOfExperience: user?.yearsOfExperience || '',
      });

      /* Account type */
      const [accountType, setAccountType] = React.useState(user?.role === 'client' ? 'client' : 'freelancer');

      /* Password form */
      const [passwords, setPasswords] = React.useState({ current: '', newPw: '', confirm: '' });
      const [pwError, setPwError] = React.useState('');
      const [showPw, setShowPw] = React.useState({ current: false, newPw: false, confirm: false });

      /* Notification prefs */
      const [notifs, setNotifs] = React.useState({
        emailApplications:  true,
        emailMessages:      true,
        emailJobs:          false,
        emailMarketing:     false,
        pushApplications:   true,
        pushMessages:       true,
      });

      /* Privacy prefs */
      const [privacy, setPrivacy] = React.useState({
        profileVisible:   true,
        showEmail:        false,
        showPhone:        false,
        showOnlineStatus: true,
        allowMessages:    true,
      });

      const showToast = (msg, type = 'success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3200);
      };

      if (!user) {
        return (
          <div className="settings-page" dir={dir}>
            <div className="settings-not-logged-in">
              <i className="fas fa-lock"></i>
              <h2>Please log in to access settings</h2>
              <button className="btn-primary" onClick={() => setPage('login')}>
                <i className="fas fa-sign-in-alt"></i> Log In
              </button>
            </div>
          </div>
        );
      }

      /* ── Handlers ── */
      const handleSaveProfile = () => {
        setSaving(true);
        window.UserDB.updateProfile(user.id, {
          name:              profile.name.trim(),
          username:          profile.username.trim().toLowerCase(),
          phone:             profile.phone.trim(),
          location:          profile.location.trim(),
          bio:               profile.bio.trim(),
          yearsOfExperience: profile.yearsOfExperience ? Number(profile.yearsOfExperience) : null,
        }).then(res => {
          setSaving(false);
          if (res.ok) {
            setUser(prev => ({ ...prev, ...profile }));
            showToast('Profile updated successfully.');
          } else {
            showToast('Failed to save: ' + res.error, 'error');
          }
        });
      };

      const handleSaveAccountType = () => {
        /* Admins stay admin — only switch between freelancer / client */
        const newRole = (user.role === 'admin') ? 'admin' : accountType;
        setSaving(true);
        window.UserDB.updateProfile(user.id, { role: newRole }).then(res => {
          setSaving(false);
          if (res.ok) {
            setUser(prev => ({ ...prev, role: newRole }));
            showToast(`Account type switched to ${newRole}.`);
          } else {
            showToast('Failed to update: ' + res.error, 'error');
          }
        });
      };

      const handleChangePassword = () => {
        setPwError('');
        if (!passwords.newPw) { setPwError('New password is required.'); return; }
        if (passwords.newPw.length < 6) { setPwError('Password must be at least 6 characters.'); return; }
        if (passwords.newPw !== passwords.confirm) { setPwError('Passwords do not match.'); return; }
        /* Firebase reauthenticate + update password */
        const firebaseUser = firebase.auth().currentUser;
        if (!firebaseUser) { setPwError('Not authenticated. Please log in again.'); return; }
        setSaving(true);
        const cred = firebase.auth.EmailAuthProvider.credential(user.email, passwords.current);
        firebaseUser.reauthenticateWithCredential(cred)
          .then(() => firebaseUser.updatePassword(passwords.newPw))
          .then(() => {
            setSaving(false);
            setPasswords({ current: '', newPw: '', confirm: '' });
            showToast('Password changed successfully.');
          })
          .catch(err => {
            setSaving(false);
            if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
              setPwError('Current password is incorrect.');
            } else {
              setPwError(err.message);
            }
          });
      };

      const handleDeleteAccount = () => {
        if (!window.confirm('Are you sure you want to permanently delete your account? This cannot be undone.')) return;
        const firebaseUser = firebase.auth().currentUser;
        if (!firebaseUser) return;
        firebase.firestore().collection('users').doc(user.id).delete()
          .then(() => firebaseUser.delete())
          .then(() => { window.UserDB.logout(); setUser(null); setPage('home'); })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      };

      const tabs = [
        { key: 'account',       icon: 'fa-user-circle',    label: 'Account Type' },
        { key: 'profile',       icon: 'fa-id-card',        label: 'Profile Info' },
        { key: 'security',      icon: 'fa-shield-alt',     label: 'Security' },
        { key: 'verification',  icon: 'fa-check-double',   label: 'Verification' },
        { key: 'notifications', icon: 'fa-bell',           label: 'Notifications' },
        { key: 'privacy',       icon: 'fa-user-lock',      label: 'Privacy' },
        { key: 'preferences',   icon: 'fa-sliders-h',      label: 'Preferences' },
        { key: 'danger',        icon: 'fa-exclamation-triangle', label: 'Danger Zone' },
      ];

      const Toggle = ({ value, onChange }) => (
        <button className={`settings-toggle${value ? ' on' : ''}`} onClick={() => onChange(!value)}>
          <span className="settings-toggle-thumb"></span>
        </button>
      );

      return (
        <div className="settings-page" dir={dir}>
          {/* Toast */}
          {toast && (
            <div className={`admin-toast admin-toast-${toast.type}`}>
              <i className={`fas fa-${toast.type === 'error' ? 'times-circle' : 'check-circle'}`}></i>
              {toast.msg}
            </div>
          )}

          {/* Hero */}
          <div className="settings-hero">
            <div className="hero-bg-grid"></div>
            <div className="container">
              <span className="tag"><i className="fas fa-cog"></i>{lang === 'en' ? 'Your Account' : 'حسابك'}</span>
              <h1 className="settings-hero-title">
                {lang === 'en' ? 'Account Settings' : 'إعدادات الحساب'}
              </h1>
              <p className="settings-hero-sub">
                {lang === 'en'
                  ? 'Manage your profile, security, notifications, and preferences.'
                  : 'أدر ملفك الشخصي والأمان والإشعارات والتفضيلات.'}
              </p>
            </div>
          </div>

          <div className="container settings-body">
            {/* Sidebar tabs */}
            <aside className="settings-sidebar">
              <div className="settings-user-card">
                <div className="settings-avatar">{(user.name?.[0] || 'U').toUpperCase()}</div>
                <div className="settings-user-name">{user.name}</div>
                <div className="settings-user-email">{user.email}</div>
                <span className={`admin-role-badge admin-role-${user.role}`}>{user.role}</span>
              </div>
              <nav className="settings-nav">
                {tabs.map(t => (
                  <button
                    key={t.key}
                    className={`settings-nav-item${activeTab === t.key ? ' active' : ''}${t.key === 'danger' ? ' danger' : ''}`}
                    onClick={() => setActiveTab(t.key)}
                  >
                    <i className={`fas ${t.icon}`}></i>
                    <span>{t.label}</span>
                  </button>
                ))}
              </nav>
            </aside>

            {/* Main panel */}
            <main className="settings-main">

              {/* ─── ACCOUNT TYPE ─── */}
              {activeTab === 'account' && (
                <div className="settings-section">
                  <div className="settings-section-header">
                    <i className="fas fa-user-circle"></i>
                    <div>
                      <h2>Account Type</h2>
                      <p>Choose how you use NileLancers. You can switch at any time.</p>
                    </div>
                  </div>

                  {user.role === 'admin' && (
                    <div className="settings-info-banner">
                      <i className="fas fa-shield-alt"></i>
                      Your account has administrator privileges. The role shown below reflects your public-facing account type.
                    </div>
                  )}

                  <div className="settings-account-types">
                    <div
                      className={`settings-type-card${accountType === 'freelancer' ? ' selected' : ''}`}
                      onClick={() => setAccountType('freelancer')}
                    >
                      <div className="settings-type-icon" style={{ background: 'rgba(255,215,0,0.1)', color: 'var(--gold)' }}>
                        <i className="fas fa-laptop-code"></i>
                      </div>
                      <div className="settings-type-radio"></div>
                      <h3>Freelancer</h3>
                      <p>Offer your skills, apply to job listings, and get hired by clients.</p>
                      <ul className="settings-type-perks">
                        <li><i className="fas fa-check"></i> Browse &amp; apply to jobs</li>
                        <li><i className="fas fa-check"></i> Build a public profile</li>
                        <li><i className="fas fa-check"></i> Receive client messages</li>
                        <li><i className="fas fa-check"></i> Track your applications</li>
                      </ul>
                    </div>

                    <div
                      className={`settings-type-card${accountType === 'client' ? ' selected' : ''}`}
                      onClick={() => setAccountType('client')}
                    >
                      <div className="settings-type-icon" style={{ background: 'rgba(0,116,217,0.12)', color: '#60baff' }}>
                        <i className="fas fa-briefcase"></i>
                      </div>
                      <div className="settings-type-radio"></div>
                      <h3>Client</h3>
                      <p>Post job listings, find top talent, and manage your projects.</p>
                      <ul className="settings-type-perks">
                        <li><i className="fas fa-check"></i> Post unlimited job listings</li>
                        <li><i className="fas fa-check"></i> Browse freelancer profiles</li>
                        <li><i className="fas fa-check"></i> Manage applicants</li>
                        <li><i className="fas fa-check"></i> Hire with confidence</li>
                      </ul>
                    </div>
                  </div>

                  <div className="settings-actions">
                    <button className="btn-primary" onClick={handleSaveAccountType} disabled={saving}>
                      {saving ? <><span className="spinner"></span> Saving…</> : <><i className="fas fa-save"></i> Save Account Type</>}
                    </button>
                  </div>
                </div>
              )}

              {/* ─── PROFILE INFO ─── */}
              {activeTab === 'profile' && (
                <div className="settings-section">
                  <div className="settings-section-header">
                    <i className="fas fa-id-card"></i>
                    <div><h2>Profile Information</h2><p>Update your public profile details.</p></div>
                  </div>

                  <div className="settings-form-grid">
                    {[
                      { key: 'name',     label: 'Full Name',     type: 'text',   placeholder: 'Your full name',   icon: 'fa-user' },
                      { key: 'username', label: 'Username',      type: 'text',   placeholder: '@username',         icon: 'fa-at' },
                      { key: 'phone',    label: 'Phone Number',  type: 'tel',    placeholder: '+20 123 456 7890',  icon: 'fa-phone' },
                      { key: 'location', label: 'Location',      type: 'text',   placeholder: 'City, Country',     icon: 'fa-map-marker-alt' },
                      { key: 'yearsOfExperience', label: 'Years of Experience', type: 'number', placeholder: '0', icon: 'fa-award' },
                    ].map(f => (
                      <div key={f.key} className="settings-form-group">
                        <label className="settings-form-label">{f.label}</label>
                        <div className="settings-input-wrap">
                          <i className={`fas ${f.icon} settings-input-icon`}></i>
                          <input
                            className="settings-input"
                            type={f.type}
                            value={profile[f.key]}
                            placeholder={f.placeholder}
                            onChange={e => setProfile(p => ({ ...p, [f.key]: e.target.value }))}
                          />
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="settings-form-group" style={{ marginTop: '4px' }}>
                    <label className="settings-form-label">Bio</label>
                    <textarea
                      className="settings-input settings-textarea"
                      placeholder="Tell clients and freelancers a bit about yourself…"
                      rows={4}
                      value={profile.bio}
                      onChange={e => setProfile(p => ({ ...p, bio: e.target.value }))}
                    />
                    <div className="settings-char-count">{profile.bio.length} / 500</div>
                  </div>

                  <div className="settings-actions">
                    <button className="btn-primary" onClick={handleSaveProfile} disabled={saving}>
                      {saving ? <><span className="spinner"></span> Saving…</> : <><i className="fas fa-save"></i> Save Profile</>}
                    </button>
                  </div>
                </div>
              )}

              {/* ─── SECURITY ─── */}
              {activeTab === 'security' && (
                <div className="settings-section">
                  <div className="settings-section-header">
                    <i className="fas fa-shield-alt"></i>
                    <div><h2>Security</h2><p>Change your password and manage your session.</p></div>
                  </div>

                  <div className="settings-security-info">
                    <div className="settings-security-row">
                      <div className="settings-security-icon"><i className="fas fa-envelope"></i></div>
                      <div>
                        <div className="settings-security-label">Email Address</div>
                        <div className="settings-security-value">{user.email}</div>
                      </div>
                      <span className="settings-verified-badge"><i className="fas fa-check-circle"></i> Verified</span>
                    </div>
                    <div className="settings-security-row">
                      <div className="settings-security-icon"><i className="fas fa-calendar-alt"></i></div>
                      <div>
                        <div className="settings-security-label">Member Since</div>
                        <div className="settings-security-value">{user.createdAt ? new Date(user.createdAt).toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' }) : '—'}</div>
                      </div>
                    </div>
                  </div>

                  <h3 className="settings-sub-title">Change Password</h3>
                  {pwError && <div className="settings-error">{pwError}</div>}

                  {[
                    { key: 'current', label: 'Current Password', placeholder: 'Enter current password' },
                    { key: 'newPw',   label: 'New Password',      placeholder: 'Min. 6 characters' },
                    { key: 'confirm', label: 'Confirm New Password', placeholder: 'Repeat new password' },
                  ].map(f => (
                    <div key={f.key} className="settings-form-group">
                      <label className="settings-form-label">{f.label}</label>
                      <div className="settings-input-wrap">
                        <i className="fas fa-lock settings-input-icon"></i>
                        <input
                          className="settings-input"
                          type={showPw[f.key] ? 'text' : 'password'}
                          value={passwords[f.key]}
                          placeholder={f.placeholder}
                          onChange={e => { setPasswords(p => ({ ...p, [f.key]: e.target.value })); setPwError(''); }}
                        />
                        <button className="settings-pw-eye" onClick={() => setShowPw(s => ({ ...s, [f.key]: !s[f.key] }))}>
                          <i className={`fas fa-eye${showPw[f.key] ? '-slash' : ''}`}></i>
                        </button>
                      </div>
                    </div>
                  ))}

                  <div className="settings-actions">
                    <button className="btn-primary" onClick={handleChangePassword} disabled={saving}>
                      {saving ? <><span className="spinner"></span> Saving…</> : <><i className="fas fa-key"></i> Change Password</>}
                    </button>
                  </div>
                </div>
              )}

              {/* ─── IDENTITY VERIFICATION ─── */}
              {activeTab === 'verification' && (
                <div className="settings-section">
                  <div className="settings-section-header">
                    <i className="fas fa-check-double"></i>
                    <div><h2>Identity Verification</h2><p>Get the blue checkmark to boost trust.</p></div>
                  </div>

                  {user.isVerified ? (
                    <div style={{ textAlign: 'center', padding: '40px 20px', background: 'rgba(16,185,129,0.05)', borderRadius: '12px', border: '1px dashed #10b981' }}>
                      <i className="fas fa-check-circle" style={{ fontSize: '48px', color: '#10b981', marginBottom: '16px' }}></i>
                      <h3 style={{ color: '#10b981' }}>Verified Account</h3>
                      <p style={{ fontSize: '14px', color: 'var(--text-secondary)' }}>
                        Your identity has been verified successfully.
                      </p>
                    </div>
                  ) : verifStatus?.status === 'pending' ? (
                    <div style={{ textAlign: 'center', padding: '40px 20px', background: 'rgba(241,196,15,0.05)', borderRadius: '12px', border: '1px dashed #f1c40f' }}>
                      <i className="fas fa-clock" style={{ fontSize: '48px', color: '#f1c40f', marginBottom: '16px' }}></i>
                      <h3 style={{ color: '#f1c40f' }}>Verification Pending</h3>
                      <p style={{ fontSize: '14px', color: 'var(--text-secondary)' }}>
                        Our team is reviewing your ID. This usually takes 24-48 hours.
                      </p>
                    </div>
                  ) : (
                    <div style={{ padding: '24px', background: 'rgba(255,255,255,0.02)', borderRadius: '12px', border: '1px solid var(--border)' }}>
                      <h4 style={{ marginBottom: '12px', fontWeight: 800 }}>Get the Blue Checkmark</h4>
                      <p style={{ fontSize: '14px', color: 'var(--text-secondary)', marginBottom: '24px', lineHeight: '1.6' }}>
                        Verified users gain more trust from clients and appear higher in search results. Upload a clear photo of your ID or Passport to start.
                      </p>
                      <input type="file" ref={fileInputRef} style={{ display: 'none' }} accept="image/*" onChange={handleFileChange} />
                      <button className="btn-primary" onClick={handleVerifySubmit} disabled={saving}>
                        {saving ? <><span className="spinner"></span> {lang === 'en' ? 'Uploading...' : 'جاري الرفع...'}</> : <><i className="fas fa-upload"></i> {lang === 'en' ? 'Upload ID Photo' : 'رفع صورة الهوية'}</>}
                      </button>
                    </div>
                  )}
                </div>
              )}

              {/* ─── NOTIFICATIONS ─── */}
              {activeTab === 'notifications' && (

                  <div className="settings-section-header">
                    <i className="fas fa-bell"></i>
                    <div><h2>Notifications</h2><p>Choose what you want to be notified about.</p></div>
