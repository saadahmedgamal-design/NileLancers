  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ============================================================
       HEADER
       ============================================================ */
    function Header({ page, setPage, lang, setLang, theme, setTheme, user, setUser, currency, setCurrency, unreadMessages = 0, unreadNotifications = 0 }) {
      const [scrolled, setScrolled] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);
      const [dropOpen, setDropOpen] = useState(false);
      const dir = lang === 'ar' ? 'rtl' : 'ltr';
      const t = window.TRANSLATIONS[lang].nav;

      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 40);
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      useEffect(() => {
        document.documentElement.lang = lang;
        document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.setAttribute('data-theme', theme);
      }, [lang, theme]);

      const nav = (p) => { setPage(p); setMenuOpen(false); setDropOpen(false); window.scrollTo(0, 0); };

      const navLinks = [
        { label: t.home, page: 'home' },
        { label: t.services, page: 'jobs' },
        { label: lang === 'en' ? 'About Us' : 'من نحن', page: 'about' },
        { label: lang === 'en' ? 'Contact' : 'تواصل', page: 'contact' },
      ];

      return (
        <header className={`header${scrolled ? ' scrolled' : ''}`}>
          <nav className="nav" dir={dir}>
            <div className="nav-logo" onClick={() => nav('home')}>
              <i className="fas fa-water nav-logo-img"></i>
              <span className="nav-logo-text">NileLancers</span>
            </div>
            <div className="nav-search-wrap" style={{ flex: 1, maxWidth: '400px', margin: '0 20px', position: 'relative' }}>
               <i className="fas fa-search" style={{ position: 'absolute', left: '15px', top: '50%', transform: 'translateY(-50%)', color: 'var(--text-muted)', fontSize: '14px' }}></i>
               <input 
                 className="nav-search-input" 
                 placeholder={lang === 'en' ? 'Search jobs...' : 'ابحث عن وظائف...'} 
                 style={{ width: '100%', padding: '10px 15px 10px 40px', borderRadius: '30px', border: '1px solid var(--border)', background: 'rgba(255,255,255,0.05)', color: '#fff', fontSize: '14px' }}
                 onKeyDown={e => {
                   if (e.key === 'Enter' && e.target.value) {
                     setPage('jobs', { query: e.target.value });
                     e.target.value = '';
                   }
                 }}
               />
            </div>
            <div className="nav-links">
              {navLinks.map((l, i) => (
                <span key={i} className={`nav-link${page === l.page ? ' active' : ''}`} onClick={() => nav(l.page)}>{l.label}</span>
              ))}
              {user && (
                <span className={`nav-link${page === 'dashboard' ? ' active' : ''}`} onClick={() => nav('dashboard')}>{lang === 'en' ? 'Dashboard' : 'لوحة التحكم'}</span>
              )}
              {user?.role === 'freelancer' ? (
                <span className={`nav-link${page === 'applications' ? ' active' : ''}`} onClick={() => nav('applications')}>{t.applications}</span>
              ) : (
                <span className={`nav-link${page === 'post-job' ? ' active' : ''}`} onClick={() => nav('post-job')}>{t.post_job}</span>
              )}
            </div>
            <div className="nav-actions">
              <button className="nav-icon-btn" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} title="Toggle theme">
                <i className={`fas fa-${theme === 'dark' ? 'sun' : 'moon'}`}></i>
              </button>
              <button className="lang-btn" onClick={() => setCurrency(currency === 'EGP' ? 'USD' : 'EGP')} title="Toggle currency">
                {currency === 'EGP' ? 'EGP' : '$ USD'}
              </button>
              <button className="lang-btn" onClick={() => setLang(lang === 'en' ? 'ar' : 'en')}>
                {lang === 'en' ? 'ع' : 'EN'}
              </button>
              {user && (
                <>
                  <button className="nav-icon-btn" onClick={() => nav('messages')} style={{ position: 'relative' }}>
                    <i className="fas fa-envelope"></i>
                    {unreadMessages > 0 && <span className="nav-badge">{unreadMessages}</span>}
                  </button>
                  <button className="nav-icon-btn" onClick={() => nav('notifications')} style={{ position: 'relative' }}>
                    <i className="fas fa-bell"></i>
                    {unreadNotifications > 0 && <span className="nav-badge">{unreadNotifications}</span>}
                  </button>
                </>
              )}
              {user ? (
                <div style={{ position: 'relative' }}>
                  <div className="avatar-btn" onClick={() => setDropOpen(!dropOpen)}>
                    {(user.name?.[0] || 'U').toUpperCase()}
                  </div>
                  {dropOpen && (
                    <div className="dropdown" dir={dir}>
                      <div className="dropdown-header">
                        <div style={{ fontWeight: 800, fontSize: '14px', display: 'flex', alignItems: 'center' }}>
                          {user.name}
                          {user.isVerified && <i className="fas fa-check-circle" style={{ color: '#3897f0', marginLeft: '6px', fontSize: '12px' }} title="Verified"></i>}
                        </div>
                        <small>{user.email}</small>
                      </div>
                      {[
                        { icon: 'tachometer-alt', label: lang === 'en' ? 'Dashboard' : 'لوحة التحكم', page: 'dashboard' },
                        { icon: 'user', label: t.my_profile, page: 'profile' },
                        { icon: 'envelope', label: t.messages, page: 'messages', count: unreadMessages },
                        { icon: 'bell', label: t.notifications, page: 'notifications', count: unreadNotifications },
                        { icon: 'file-alt', label: t.applications, page: 'applications' },
                        { icon: 'bookmark', label: lang === 'en' ? 'Saved Jobs' : 'الوظائف المحفوظة', page: 'saved-jobs' },
                        { icon: 'wallet', label: t.wallet, page: 'wallet' },
                        { icon: 'cog', label: t.settings, page: 'settings' },
                        ...(user?.role === 'admin' ? [{ icon: 'shield-alt', label: t.admin || 'Admin Panel', page: 'admin' }] : []),
                      ].map((item) => (
                        <div key={item.page} className="dropdown-item" onClick={() => nav(item.page)}>
                          <i className={`fas fa-${item.icon}`}></i>{item.label}
                          {item.count > 0 && <span style={{ marginLeft: 'auto', background: '#e74c3c', color: '#fff', fontSize: '10px', padding: '2px 6px', borderRadius: '10px' }}>{item.count}</span>}
                        </div>

    /* ============================================================
       HERO SECTION
       ============================================================ */
    function HeroSection({ lang, setPage }) {
      const t = window.TRANSLATIONS[lang];
      const dir = lang === 'ar' ? 'rtl' : 'ltr';
      const [typed, setTyped] = useState('');
      const wordRef = useRef(0);
      const charRef = useRef(0);
      const delRef = useRef(false);

      const enWords = ['Freelancers', 'Designers', 'Developers', 'Marketers'];
      const arWords = [
        'المستقلين',
        'المصممين',
        'المطورين',
        'المسوقين'
      ];
      const words = lang === 'en' ? enWords : arWords;

      useEffect(() => {
        charRef.current = 0; wordRef.current = 0; delRef.current = false;
        const tick = () => {
          const word = words[wordRef.current];
          if (!delRef.current) {
            charRef.current++;
            setTyped(word.slice(0, charRef.current));
            if (charRef.current === word.length) { delRef.current = true; setTimeout(tick, 1800); return; }
          } else {
            charRef.current--;
            setTyped(word.slice(0, charRef.current));
            if (charRef.current === 0) { delRef.current = false; wordRef.current = (wordRef.current + 1) % words.length; }
          }
          setTimeout(tick, delRef.current ? 60 : 90);
        };
        const id = setTimeout(tick, 400);
        return () => clearTimeout(id);
      }, [lang]);

      const heroTitle = lang === 'en'
        ? <><span>Elevate Your </span><span className="highlight">Freelance</span><br /><span>Career with </span><span className="highlight">NileLancers</span></>
        : <><span>مستقبل </span><span className="highlight">العمل الحر</span><br /><span>يبدأ مع </span><span className="highlight">نايل</span></>;

      const floatItems = [
        { icon: 'fa-briefcase', label: lang === 'en' ? 'Active Projects' : 'مشاريع نشطة', value: '1,247' },
        { icon: 'fa-users', label: lang === 'en' ? 'Online Freelancers' : 'مستقلون متاحون', value: '342', badge: '+12' },
        { icon: 'fa-dollar-sign', label: lang === 'en' ? 'Avg. Earning' : 'متوسط الأرباح', value: '$3,200' },
      ];

      return (
        <section className="hero" dir={dir}>
          <div className="hero-bg-grid"></div>
          <div className="container">
            <div className="hero-content">
              <div className="hero-tag">
                <span className="tag"><i className="fas fa-star"></i>{t.home.future}</span>
              </div>
              <h1 className="hero-title">{heroTitle}</h1>
              <p className="hero-desc">{t.hero.desc}</p>
              <div className="hero-btns">
                <button className="btn-primary" onClick={() => setPage('signup')}>
                  <i className="fas fa-rocket"></i>{t.hero.btn_start}
                </button>
                <button className="btn-secondary" onClick={() => setPage('jobs')}>
                  <i className="fas fa-search"></i>{t.hero.btn_hire}
                </button>
              </div>
              <div className="hero-stats">
                {[
                  { value: '12K+', label: t.home.stats.projects },
                  { value: '3K+', label: t.home.stats.talent },
                  { value: '$8M+', label: t.home.stats.paid },
                ].map((s, i) => (
                  <div key={i} className="hero-stat">
                    <div className="hero-stat-value">{s.value}</div>
                    <div className="hero-stat-label">{s.label}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div className="hero-floating-card">
            {floatItems.map((item, i) => (
              <div key={i} className="hero-card-row">
                <div className="hero-card-icon"><i className={`fas ${item.icon}`}></i></div>
                <div>
                  <div className="hero-card-label">{item.label}</div>
                  <div className="hero-card-value">
                    {item.value}
                    {item.badge && <span className="hero-card-badge" style={{ marginLeft: '8px' }}>{item.badge}</span>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    /* ============================================================
       CHATBOT
       ============================================================ */
    function Chatbot({ lang }) {
      const [open, setOpen] = useState(false);
      const [messages, setMessages] = useState([
        { role: 'bot', text: lang === 'en' ? 'Hi! How can I help you today?' : 'مرحباً! كيف يمكنني مساعدتك؟' }
      ]);
      const [input, setInput] = useState('');
      const bottomRef = useRef(null);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

      const send = () => {
        if (!input.trim()) return;
        const reply = window.CHATBOT_REPLIES(input);
        setMessages(prev => [...prev, { role: 'user', text: input }, { role: 'bot', text: reply }]);
        setInput('');
      };

      return (
        <>
          {open && (
            <div className="chatbot-window">
              <div className="chatbot-header">
                <span className="chatbot-header-title">
                  <i className="fas fa-robot" style={{ marginRight: '8px' }}></i>
                  {lang === 'en' ? 'NileBot' : 'نايل بوت'}
                </span>
                <button className="chatbot-close" onClick={() => setOpen(false)}>
                  <i className="fas fa-times"></i>
                </button>
              </div>
              <div className="chatbot-messages">
                {messages.map((m, i) => (
                  <div key={i} className={`chat-msg chat-msg-${m.role}`}>{m.text}</div>
                ))}
                <div ref={bottomRef}></div>
              </div>
              <div className="chatbot-input">
                <input
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && send()}
                  placeholder={lang === 'en' ? 'Type a message...' : 'اكتب رسالة...'}
                />
                <button className="chatbot-send" onClick={send}>
                  <i className="fas fa-paper-plane"></i>
                </button>
              </div>
            </div>
          )}
          <button className="chatbot-trigger" onClick={() => setOpen(!open)} title="Chat with NileBot">
            <i className={`fas fa-${open ? 'times' : 'comments'}`}></i>
          </button>
        </>
      );
    }

    /* ============================================================
       LOGIN PAGE
       ============================================================ */
    function LoginPage({ lang, setPage, setUser }) {
      const t = window.TRANSLATIONS[lang].auth;
      const dir = lang === 'ar' ? 'rtl' : 'ltr';
      const [email, setEmail] = useState('');
      const [pass, setPass] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!email || !pass) {
          setError(lang === 'en' ? 'Please fill in all fields.' : 'يرجى ملء جميع الحقول.');
          return;
        }
        setLoading(true);
        window.UserDB.login({ email, password: pass }).then((result) => {
          setLoading(false);
          if (result.ok) {
            setUser(result.user);
            setPage('home');
          } else {
            if (result.error === 'not_found') {
              setError(lang === 'en' ? '❌ No account found with this email.' : '❌ لا يوجد حساب بهذا البريد الإلكتروني.');
            } else {
              setError(lang === 'en' ? '❌ Incorrect password.' : '❌ كلمة المرور غير صحيحة.');
            }
          }
        });
      };

      return (
        <div className="auth-page" dir={dir}>
          <div className="auth-card">
            <div className="auth-logo"><h1>NileLancers</h1></div>
            <div className="auth-header">
              <h2>{t.login_title}</h2>
              <p>{t.login_sub}</p>
            </div>
            {error && <div className="auth-error">{error}</div>}
            <form onSubmit={handleSubmit}>
              <div className="form-group">
                <label className="form-label">{t.email}</label>
                <div className="input-icon-wrap">
                  <i className="fas fa-envelope input-icon"></i>
                  <input className="form-input" type="email" value={email}
                    onChange={e => { setEmail(e.target.value); setError(''); }}
                    placeholder="you@example.com" />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">{t.password}</label>
                <div className="input-icon-wrap">
                  <i className="fas fa-lock input-icon"></i>
                  <input className="form-input" type="password" value={pass}
                    onChange={e => { setPass(e.target.value); setError(''); }}
                    placeholder="Enter password" />
                </div>
              </div>
              <span className="forgot-link" onClick={() => setPage('forgot-password')}>{t.forgot_password}</span>
              <button className="btn-auth btn-auth-primary" type="submit" disabled={loading}>
                {loading
                  ? <><span className="spinner"></span>{lang === 'en' ? ' Logging in...' : ' جاري الدخول...'}</>
                  : t.login_btn}
              </button>
            </form>
            <div className="auth-switch">
              {t.new_user}{' '}
              <span className="auth-switch-link" onClick={() => setPage('signup')}>{t.signup}</span>
            </div>
          </div>
        </div>
      );
    }


    /* ============================================================
       SIGNUP PAGE
       ============================================================ */
    function SignupPage({ lang, setPage, setUser }) {
      const t = window.TRANSLATIONS[lang].auth;
      const dir = lang === 'ar' ? 'rtl' : 'ltr';
      const [form, setForm] = useState({ name: '', username: '', email: '', password: '', role: 'freelancer', phone: '', location: '', bio: '', yearsOfExperience: '', companyName: '', hourlyRate: '', portfolioUrl: '', availabilityStatus: 'Available' });
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const handleSubmit = (e) => {
        e.preventDefault();
        const { name, username, email, password } = form;
        if (!name || !username || !email || !password) {
          setError(lang === 'en' ? 'Please fill in all fields.' : 'يرجى ملء جميع الحقول.');
          return;
        }
        if (password.length < 6) {
          setError(lang === 'en' ? 'Password must be at least 6 characters.' : 'كلمة المرور يجب أن تكون 6 أحرف على الأقل.');
          return;
        }
        setLoading(true);
        window.UserDB.register({ 
          name, username, email, password, 
          role: form.role, 
          phone: form.phone, 
          location: form.location, 
          bio: form.bio, 
          yearsOfExperience: form.yearsOfExperience,
          companyName: form.companyName,
          hourlyRate: form.hourlyRate,
          portfolioUrl: form.portfolioUrl,
          availabilityStatus: form.availabilityStatus
        }).then((result) => {
          setLoading(false);
          if (result.ok) {
            setUser(result.user);
            setPage('home');
          } else {
            if (result.error === 'email_taken') {
              setError(lang === 'en' ? '❌ This email is already registered.' : '❌ هذا البريد الإلكتروني مسجل بالفعل.');
            } else if (result.error === 'username_taken') {
              setError(lang === 'en' ? '❌ This username is already taken.' : '❌ اسم المستخدم هذا محجوز بالفعل.');
            } else if (result.error === 'auth_disabled') {
              setError('❌ Email/Password sign-in is not enabled. Go to Firebase Console → Authentication → Sign-in method → Email/Password → Enable.');
            } else if (result.error === 'permission_denied') {
              setError('❌ Firestore permission denied. Go to Firebase Console → Firestore → Rules and set to test mode.');
            } else if (result.error === 'weak_password') {
              setError(lang === 'en' ? '❌ Password must be at least 6 characters.' : '❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل.');
            } else {
              setError('❌ ' + (result.message || 'Registration failed. Check the browser console (F12) for details.'));
            }
          }
        });
      };

      const fields = [
        { key: 'name', label: t.name, icon: 'fa-user', type: 'text', ph: lang === 'en' ? 'Your full name' : 'اسمك الكامل' },
        { key: 'username', label: t.username, icon: 'fa-at', type: 'text', ph: lang === 'en' ? 'unique_username' : 'اسم_المستخدم' },
        { key: 'email', label: t.email, icon: 'fa-envelope', type: 'email', ph: 'you@example.com' },
        { key: 'password', label: t.password, icon: 'fa-lock', type: 'password', ph: 'Min. 6 characters' },
      ];

      return (
        <div className="auth-page" dir={dir}>
          <div className="auth-card" style={{ maxWidth: '520px' }}>
            <div className="auth-logo"><h1>NileLancers</h1></div>
            <div className="auth-header">
              <h2>{t.signup_title}</h2>
              <p>{t.signup_sub}</p>
            </div>
            {error && <div className="auth-error">{error}</div>}
            <div className="role-selector">
              {[
                { key: 'freelancer', icon: 'fa-laptop-code', label: t.i_want_to_work },
                { key: 'client', icon: 'fa-building', label: t.i_want_to_hire },
              ].map(r => (
                <div key={r.key} className={`role-card${form.role === r.key ? ' selected' : ''}`} onClick={() => set('role', r.key)}>
                  <i className={`fas ${r.icon}`}></i>
                  <span>{r.label}</span>
                </div>
              ))}
            </div>
            <form onSubmit={handleSubmit}>
              {fields.map(field => (
                <div className="form-group" key={field.key}>
                  <label className="form-label">{field.label}</label>
                  <div className="input-icon-wrap">
                    <i className={`fas ${field.icon} input-icon`}></i>
                    <input className="form-input" type={field.type} value={form[field.key]}
                      onChange={e => { set(field.key, e.target.value); setError(''); }}
                      placeholder={field.ph} />
                  </div>
                </div>
              ))}
              
              {form.role === 'client' && (
                <div className="form-group">
                  <label className="form-label">{t.company_name}</label>
                  <div className="input-icon-wrap">
                    <i className="fas fa-building input-icon"></i>
                    <input className="form-input" type="text" value={form.companyName || ''}
                      onChange={e => { set('companyName', e.target.value); setError(''); }}
                      placeholder={lang === 'en' ? 'Company Name (Optional)' : 'اسم الشركة (اختياري)'} />
                  </div>
                </div>
              )}

              {form.role === 'freelancer' && (
                <>
                  <div className="form-group">
                    <label className="form-label">{t.hourly_rate}</label>
                    <div className="input-icon-wrap">
                      <i className="fas fa-dollar-sign input-icon"></i>
                      <input className="form-input" type="number" min="1" value={form.hourlyRate || ''}
                        onChange={e => { set('hourlyRate', e.target.value); setError(''); }}
                        placeholder={lang === 'en' ? 'e.g. 25' : 'مثال: 25'} />
                    </div>
                  </div>
                  <div className="form-group">
                    <label className="form-label">{t.portfolio_url}</label>
                    <div className="input-icon-wrap">
                      <i className="fas fa-link input-icon"></i>
                      <input className="form-input" type="url" value={form.portfolioUrl || ''}
                        onChange={e => { set('portfolioUrl', e.target.value); setError(''); }}
                        placeholder="https://" />
                    </div>
                  </div>
                  <div className="form-group">
                    <label className="form-label">{t.availability}</label>
                    <div className="input-icon-wrap">
                      <i className="fas fa-clock input-icon"></i>
                      <select className="form-input" value={form.availabilityStatus || 'Available'}
                        onChange={e => { set('availabilityStatus', e.target.value); setError(''); }}
                        style={{ appearance: 'none' }}>
                        <option value="Available">{t.available}</option>
                        <option value="Busy">{t.busy}</option>
                        <option value="Not Available">{t.not_available}</option>
                      </select>
                    </div>
                  </div>
                </>
              )}
              <button className="btn-auth btn-auth-primary" type="submit" disabled={loading}>
                {loading
                  ? <><span className="spinner"></span>{lang === 'en' ? ' Creating...' : ' إنشاء الحساب...'}</>
                  : t.signup_btn}
              </button>
            </form>
            <div className="auth-switch">
              {t.existing_user}{' '}
              <span className="auth-switch-link" onClick={() => setPage('login')}>{t.signin}</span>
            </div>
          </div>
        </div>
      );
    }

    /* ============================================================

    /* ============================================================
       JOBS PAGE
       ============================================================ */
    function JobsPage({ lang, user, setPage, params, formatPrice }) {
      const t = window.TRANSLATIONS[lang].services_page;
      const dir = lang === 'ar' ? 'rtl' : 'ltr';

      const [allJobs,    setAllJobs]    = useState([]);
      const [loadingJobs,setLoadingJobs]= useState(true);
      const [applied,    setApplied]    = useState([]); /* array of jobIds */
      const [applying,   setApplying]   = useState(null); /* jobId being toggled */

      /* Load jobs */
      useEffect(() => {
        if (window.UserDB && window.UserDB.listJobs) {
          window.UserDB.listJobs().then(jobs => {
            setAllJobs(jobs); setLoadingJobs(false);
          });
        }
      }, []);

      /* Load existing applications for this user */
      useEffect(() => {
        if (user && window.UserDB && window.UserDB.listMyApplications) {
          window.UserDB.listMyApplications(user.id).then(apps => {
            setApplied(apps.map(a => a.jobId));
          });
        }
      }, [user]);

      /* Load saved job IDs for this user */
      const [saved,   setSaved]   = useState([]);  /* array of jobIds */
      const [saving,  setSaving]  = useState(null); /* jobId being toggled */
      useEffect(() => {
        if (user && window.UserDB && window.UserDB.getSavedJobIds) {
          window.UserDB.getSavedJobIds(user.id).then(ids => setSaved(ids));
        }
      }, [user]);

      const toggleSave = (e, jobId) => {
        e.stopPropagation();
        if (!user) { setPage('login'); return; }
        if (saving === jobId) return;
        setSaving(jobId);
        const isSaved = saved.includes(jobId);
        const action = isSaved
          ? window.UserDB.unsaveJob(jobId, user.id)
          : window.UserDB.saveJob(jobId, user.id);
        action.then(res => {
          setSaving(null);
          if (res.ok) {
            setSaved(prev => isSaved ? prev.filter(id => id !== jobId) : [...prev, jobId]);
          }
        });
      };

      const enCats = ['All', 'Web Development', 'Design', 'Marketing', 'Mobile Development', 'Writing', 'Other'];
      const arCats = ['الكل', 'تطوير المواقع', 'التصميم', 'التسويق', 'تطوير التطبيقات', 'الكتابة', 'أخرى'];
      const catMap = { 'الكل': 'All', 'تطوير المواقع': 'Web Development', 'التصميم': 'Design', 'التسويق': 'Marketing', 'تطوير التطبيقات': 'Mobile Development', 'الكتابة': 'Writing', 'أخرى': 'Other' };
      const cats = lang === 'en' ? enCats : arCats;

      const [query, setQuery]         = useState(params?.query || '');
      useEffect(() => { if (params?.query) setQuery(params.query); }, [params]);
      const [activeCat, setActiveCat] = useState(cats[0]);
      const [minBudget, setMinBudget] = useState('');
      const [maxBudget, setMaxBudget] = useState('');
      const [jobType, setJobType]     = useState('All'); /* All, Local, Intl */

      const filtered = allJobs.filter(job => {
        const catKey = lang === 'ar' ? (catMap[activeCat] || activeCat) : activeCat;
        const catMatch = catKey === 'All' || activeCat === cats[0] || job.category === catKey;
        const q = query.toLowerCase();
        const qMatch = !q || job.title.toLowerCase().includes(q) || job.skills.some(s => s.toLowerCase().includes(q)) || job.category.toLowerCase().includes(q);
        
        const matchesMin = minBudget === '' || job.budget >= Number(minBudget);
        const matchesMax = maxBudget === '' || job.budget <= Number(maxBudget);
        const matchesType = jobType === 'All' || 
                           (jobType === 'Local' && job.type === 'local') || 
                           (jobType === 'Intl' && job.type === 'intl');
                           
        return catMatch && qMatch && matchesMin && matchesMax && matchesType;
      });

      const toggleApply = (jobId) => {
        if (!user) { setPage('login'); return; }
        if (applying === jobId) return; /* prevent double click */
        setApplying(jobId);
        const isApplied = applied.includes(jobId);
        const action = isApplied
          ? window.UserDB.withdrawApplication(jobId, user.id)
          : window.UserDB.applyToJob(jobId, user.id);
        action.then(res => {
          setApplying(null);
          if (res.ok) {
            setApplied(prev => isApplied ? prev.filter(id => id !== jobId) : [...prev, jobId]);
          }
        });
      };

      return (
        <div className="jobs-page" dir={dir}>
          <div className="container">
            <div className="jobs-hero">
              <span className="tag" style={{ marginBottom: '16px', display: 'inline-flex' }}>
                <i className="fas fa-briefcase"></i>{lang === 'en' ? 'Opportunities' : 'الفرص'}
              </span>
              <h1><span style={{ color: 'var(--gold)' }}>{t.title_main}</span> {t.title_sub}</h1>
              <p>{t.desc}</p>
              <div className="search-bar">
                <i className="fas fa-search" style={{ padding: '14px 16px', color: 'var(--text-muted)' }}></i>
                <input value={query} onChange={e => setQuery(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && e.target.blur()}
                  placeholder={t.search_placeholder} />
                <button className="search-btn">{lang === 'en' ? 'Search' : 'بحث'}</button>
              </div>
            </div>

            <div className="jobs-filters" style={{ justifyContent: 'center', marginBottom: '16px' }}>
              {cats.map(cat => (
                <button key={cat} className={`filter-chip${activeCat === cat ? ' active' : ''}`}
                  onClick={() => setActiveCat(cat)}>{cat}</button>
              ))}
            </div>

            {/* Advanced Filters */}
            <div className="jobs-filters" style={{ justifyContent: 'center', gap: '15px', marginBottom: '40px', flexWrap: 'wrap' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                <span style={{ fontSize: '12px', fontWeight: 700, color: 'var(--text-muted)' }}>{lang === 'en' ? 'Budget:' : 'الميزانية:'}</span>
                <input className="form-input" style={{ width: '100px', height: '36px', fontSize: '13px' }} 
                       type="number" placeholder={lang === 'en' ? 'Min' : 'الأقل'} value={minBudget} onChange={e => setMinBudget(e.target.value)} />
                <input className="form-input" style={{ width: '100px', height: '36px', fontSize: '13px' }} 
                       type="number" placeholder={lang === 'en' ? 'Max' : 'الأكثر'} value={maxBudget} onChange={e => setMaxBudget(e.target.value)} />
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                <span style={{ fontSize: '12px', fontWeight: 700, color: 'var(--text-muted)' }}>{lang === 'en' ? 'Type:' : 'النوع:'}</span>
                <select className="form-input" style={{ width: '130px', height: '36px', fontSize: '13px', appearance: 'none' }} 
                        value={jobType} onChange={e => setJobType(e.target.value)}>
                  <option value="All">{lang === 'en' ? 'All Types' : 'الكل'}</option>
                  <option value="Local">{lang === 'en' ? 'Local (Egypt)' : 'محلي (مصر)'}</option>
                  <option value="Intl">{lang === 'en' ? 'International' : 'دولي'}</option>
                </select>
              </div>
              <button className="btn-secondary" style={{ height: '36px', fontSize: '12px' }} 
                      onClick={() => { setMinBudget(''); setMaxBudget(''); setJobType('All'); }}>
                {lang === 'en' ? 'Clear' : 'مسح'}
              </button>
            </div>

            {loadingJobs ? (
              <div style={{ textAlign: 'center', padding: '80px 24px' }}>
                <span className="spinner" style={{ width: '40px', height: '40px', borderWidth: '4px', display: 'inline-block', marginBottom: '16px' }}></span>
                <p style={{ color: 'var(--text-muted)' }}>{lang === 'en' ? 'Loading services...' : 'جاري تحميل الخدمات...'}</p>
              </div>
            ) : filtered.length === 0 ? (
              <div className="no-jobs">
                <i className="fas fa-search-minus"></i>
                <h3>{t.no_jobs_found}</h3>
                <p>{t.no_jobs_desc}</p>
                <button className="btn-primary" style={{ marginTop: '20px' }}
                  onClick={() => { setQuery(''); setActiveCat(cats[0]); }}>
                  {t.reset_filters}
                </button>
              </div>
            ) : (
              <div className="jobs-grid-full">
                {filtered.map(job => {
                  const isApplied  = applied.includes(job.id);
                  const isBusy     = applying === job.id;
                  return (
                    <div key={job.id} className="job-card">
                      <div className="job-card-header">
                        <div className="job-card-icon" style={{ background: `${job.color}18`, color: job.color }}>
                          <i className={`fas ${job.icon}`}></i>
                        </div>
                        <div style={{ flex: 1 }}>
                          <div className="job-card-title">{job.title}</div>
                          <div className="job-card-category">{job.category}</div>
                        </div>
                        <span className={`job-type-badge job-type-${job.type}`}>
                          {job.type === 'local' ? (lang === 'en' ? 'LOCAL' : 'محلي') : (lang === 'en' ? 'INTL' : 'دولي')}
                        </span>
                      </div>
                      <p style={{ fontSize: '13px', color: 'var(--text-secondary)', lineHeight: '1.6', marginBottom: '12px' }}>{job.description}</p>
                      <div className="job-skills">
                        {job.skills.map(skill => <span key={skill} className="job-skill">{skill}</span>)}
                      </div>
                      {/* Deadline + Days meta */}
                      {(job.deadline || job.days) && (
                        <div className="job-meta-row">
                          {job.days     && <span className="job-meta-chip"><i className="fas fa-clock"></i>{job.days} {lang === 'en' ? 'days' : 'يوم'}</span>}
                          {job.deadline && <span className="job-meta-chip"><i className="fas fa-calendar-alt"></i>{job.deadline}</span>}
                        </div>
                      )}
                      <div className="job-card-footer">
                        <div>
                          <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginBottom: '2px', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                            {lang === 'en' ? 'Budget' : 'الميزانية'}
                          </div>
                          <span className="job-budget">{formatPrice(job.budget)}</span>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                          <button
                            className={`job-save-btn${saved.includes(job.id) ? ' saved' : ''}`}
                            onClick={e => toggleSave(e, job.id)}
                            disabled={saving === job.id}
                            title={saved.includes(job.id) ? 'Remove from saved' : 'Save job'}
                          >
                            <i className={`fa${saved.includes(job.id) ? 's' : 'r'} fa-bookmark`}></i>
                          </button>
                          <button onClick={() => toggleApply(job.id)} disabled={isBusy} style={{
                            padding: '8px 18px', borderRadius: '50px', fontWeight: 700, fontSize: '12px',
                            border: 'none', cursor: isBusy ? 'wait' : 'pointer', letterSpacing: '0.5px',
                            background: isApplied ? 'rgba(46,204,113,0.12)' : 'linear-gradient(135deg,var(--gold),var(--gold-light))',
                            color: isApplied ? '#2ecc71' : '#0a0a0f', transition: 'all 0.2s', opacity: isBusy ? 0.6 : 1,
                          }}>
                            {isBusy
                              ? <span className="spinner" style={{ borderTopColor: isApplied ? '#2ecc71' : '#0a0a0f' }}></span>
                              : (isApplied ? (lang === 'en' ? '✓ Applied' : '✓ تم التقديم') : (lang === 'en' ? 'Apply Now' : 'قدم الآن'))}
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }


    /* ============================================================
       PROFILE PAGE
       ============================================================ */
    function ProfilePage({ lang, user, setUser, setPage, viewUserId }) {
      const dir = lang === 'ar' ? 'rtl' : 'ltr';
      const [viewUser, setViewUser] = useState(null);
      const [loading, setLoading] = useState(false);
      const [editing, setEditing] = useState(false);
      const isMe = !viewUserId || viewUserId === user?.id;

      const [editForm, setEditForm] = useState({
        name: '', phone: '', location: '', bio: '', yearsOfExperience: '',
        companyName: '', hourlyRate: '', portfolioUrl: '', availabilityStatus: 'Available'
      });
      const [saving, setSaving] = useState(false);
      const [saveMsg, setSaveMsg] = useState('');
      const setF = (k, v) => setEditForm(f => ({ ...f, [k]: v }));

      const [reviews, setReviews] = useState([]);
      const [avgRating, setAvgRating] = useState(0);

      useEffect(() => {
        if (!user && !viewUserId) return;
        if (isMe) {
          setViewUser(user);
          setEditForm({
            name: user?.name || '', phone: user?.phone || '',
            location: user?.location || '', bio: user?.bio || '',
            yearsOfExperience: user?.yearsOfExperience || '',
            companyName: user?.companyName || '',
            hourlyRate: user?.hourlyRate || '',
            portfolioUrl: user?.portfolioUrl || '',
            availabilityStatus: user?.availabilityStatus || 'Available'
          });
        } else {
          setLoading(true);
          window.UserDB.getUserById(viewUserId).then(res => {
            setLoading(false);
            if (res.ok) setViewUser(res.user);
          });
        }
      }, [user, viewUserId]);

      useEffect(() => {
        const id = viewUserId || user?.id;
        if (!id) return;
        return window.UserDB.subscribeToReviews(id, (list) => {
          setReviews(list);
          if (list.length > 0) {
            const sum = list.reduce((a, b) => a + b.rating, 0);
            setAvgRating((sum / list.length).toFixed(1));
          } else {
            setAvgRating(0);
          }
        });
      }, [user, viewUserId]);

      if (!user && !viewUserId) {
        return (
          <div className="profile-page" dir={dir}>
            <div className="container" style={{ textAlign: 'center', padding: '80px 24px' }}>
              <i className="fas fa-lock" style={{ fontSize: '64px', color: 'var(--gold)', marginBottom: '24px', display: 'block' }}></i>
              <h2 style={{ marginBottom: '12px' }}>{lang === 'en' ? 'Login Required' : 'يجب تسجيل الدخول'}</h2>
              <p style={{ color: 'var(--text-secondary)', marginBottom: '28px' }}>
                {lang === 'en' ? 'Please log in to view your profile.' : 'يرجى تسجيل الدخول لعرض ملفك الشخصي.'}
              </p>
              <button className="btn-primary" onClick={() => setPage('login')}>
                <i className="fas fa-sign-in-alt"></i>{lang === 'en' ? 'Login' : 'تسجيل الدخول'}
              </button>
            </div>
          </div>
        );
      }

      if (loading) return <div className="profile-page"><div className="container" style={{textAlign:'center', padding:'100px'}}><span className="spinner"></span></div></div>;
      if (!viewUser) return <div className="profile-page"><div className="container" style={{textAlign:'center', padding:'100px'}}>User not found</div></div>;

      const handleSave = () => {
        setSaving(true);
        const data = {
          name: editForm.name.trim() || user.name,
          phone: editForm.phone.trim(),
          location: editForm.location.trim(),
          bio: editForm.bio.trim(),
          yearsOfExperience: editForm.yearsOfExperience ? Number(editForm.yearsOfExperience) : null
        };
        if (user.role === 'client') {
          data.companyName = editForm.companyName.trim();
        } else {
          data.hourlyRate = editForm.hourlyRate ? Number(editForm.hourlyRate) : null;
          data.portfolioUrl = editForm.portfolioUrl.trim();
          data.availabilityStatus = editForm.availabilityStatus;
        }
        window.UserDB.updateProfile(user.id, data).then(res => {
          setSaving(false);
          if (res.ok) {
            setUser(u => Object.assign({}, u, data));
            setEditing(false);
            setSaveMsg(lang === 'en' ? '✓ Profile updated' : '✓ تم التحديث');
            setTimeout(() => setSaveMsg(''), 3000);
          } else {
            setSaveMsg('❌ ' + (res.error || 'Failed'));
          }
        });
      };

      const stats = [
        { label: lang === 'en' ? 'PROJECTS' : 'المشاريع', value: reviews.length > 0 ? reviews.length + 5 : '24' }, // Mocking base projects + real reviews
        { label: lang === 'en' ? 'SUCCESS RATE' : 'معدل النجاح', value: '100%' },
        { label: lang === 'en' ? 'EARNINGS' : 'الأرباح', value: '$12,400' },
        { label: lang === 'en' ? 'REVIEWS' : 'التقييمات', value: `${avgRating} ★ (${reviews.length})` },
      ];

      const quickLinks = [
        { icon: 'fa-file-alt', color: 'var(--gold)', label: lang === 'en' ? 'My Applications' : 'طلباتي', sub: lang === 'en' ? 'View all' : 'عرض الكل', page: 'applications' },
        { icon: 'fa-bookmark', color: '#0074D9', label: lang === 'en' ? 'Saved Jobs' : 'وظائف محفوظة', sub: lang === 'en' ? 'Browse' : 'تصفح', page: 'jobs' },
        { icon: 'fa-wallet', color: '#2ecc71', label: lang === 'en' ? 'My Wallet' : 'محفظتي', sub: lang === 'en' ? 'Balance: 0 EGP' : 'الرصيد: 0 جنيه', page: 'wallet' },
        { icon: 'fa-cog', color: '#9b59b6', label: lang === 'en' ? 'Settings' : 'الإعدادات', sub: lang === 'en' ? 'Manage account' : 'إدارة حسابك', page: 'settings' },
      ];

      const [showInviteModal, setShowInviteModal] = useState(false);
      const [myJobs, setMyJobs] = useState([]);

      const handleInvite = (jobId) => {
        const job = myJobs.find(j => j.id === jobId);
        window.UserDB.addNotification(viewUser.id, 'info', `${user.name} invited you to apply for: ${job.title}`, 'jobs', jobId);
        setShowInviteModal(false);
        alert(lang === 'en' ? 'Invitation sent!' : 'تم إرسال الدعوة!');
      };

      useEffect(() => {
        if (user?.role === 'client' && !isMe) {
          window.UserDB.listMyPostedJobs(user.id).then(setMyJobs);
        }
      }, [user, isMe]);

      return (
        <div className="profile-page" dir={dir}>
          {showInviteModal && (
            <div className="modal-overlay" onClick={() => setShowInviteModal(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <h3>{lang === 'en' ? 'Invite to Job' : 'دعوة لمشروع'}</h3>
                <div style={{ display: 'grid', gap: '10px', marginTop: '20px' }}>
                  {myJobs.length === 0 ? (
                    <p style={{ color: 'var(--text-muted)' }}>{lang === 'en' ? 'No active jobs to invite to.' : 'لا توجد وظائف نشطة حالياً.'}</p>
                  ) : (
                    myJobs.map(j => (
                      <button key={j.id} className="btn-secondary" style={{ textAlign: 'left', padding: '12px' }} onClick={() => handleInvite(j.id)}>
                        <div style={{ fontWeight: 800 }}>{j.title}</div>
                        <div style={{ fontSize: '11px', opacity: 0.7 }}>{j.budget} EGP</div>
                      </button>
                    ))
                  )}
                </div>
                <button className="btn-primary" style={{ width: '100%', marginTop: '20px' }} onClick={() => setShowInviteModal(false)}>
                  {lang === 'en' ? 'Close' : 'إغلاق'}
                </button>
              </div>
            </div>
          )}
          <div className="container">
            <div className="profile-card">
              <div className="profile-avatar">{(viewUser.name?.[0] || 'U').toUpperCase()}</div>
              <div style={{ flex: 1 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '15px' }}>
                   <div>
                      <h2 style={{ fontSize: '24px', fontWeight: 800, marginBottom: '4px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                        {viewUser.name}
                        {viewUser.isVerified && <i className="fas fa-check-circle" style={{ color: '#3897f0', fontSize: '18px' }} title="Verified Account"></i>}
                        {viewUser.isFeatured && <i className="fas fa-star" style={{ color: 'var(--gold)', fontSize: '18px' }} title="Featured Freelancer"></i>}
                      </h2>
                      <p className="profile-role">@{viewUser.username || viewUser.email?.split('@')[0]}</p>
                      <div style={{ display: 'flex', gap: '8px', marginTop: '10px', flexWrap: 'wrap' }}>
                        {(viewUser.badges || []).map((b, i) => (
                          <span key={i} style={{ fontSize: '11px', fontWeight: 800, background: 'rgba(255,255,255,0.05)', color: 'var(--gold)', padding: '4px 12px', borderRadius: '20px', border: '1px solid var(--gold)' }}>
                            <i className="fas fa-award" style={{ marginRight: '5px' }}></i>{b}
                          </span>
                        ))}
                      </div>
                   </div>
                    <div style={{ display: 'flex', gap: '10px' }}>
                      {!isMe && user && (
                         <>
                           {user.role === 'client' && (
                             <button className="btn-secondary" onClick={() => setShowInviteModal(true)}>
                               <i className="fas fa-paper-plane"></i> {lang === 'en' ? 'Invite' : 'دعوة'}
                             </button>
                           )}
                           <button className="btn-primary" onClick={() => setPage('messages', { targetId: viewUser.id })}>
                              <i className="fas fa-envelope"></i> {lang === 'en' ? 'Message' : 'مراسلة'}
                           </button>
                         </>
                      )}
                      {isMe && !editing && (
                         <button className="btn-secondary" onClick={() => setEditing(true)}>
                            <i className="fas fa-edit"></i> {lang === 'en' ? 'Edit Profile' : 'تعديل الحساب'}
                         </button>
                      )}
                   </div>
                </div>

                <span className={`profile-tag profile-tag-${viewUser.role || 'freelancer'}`}>
                  <i className={`fas fa-${viewUser.role === 'client' ? 'building' : 'laptop-code'}`}></i>
                  {viewUser.role === 'client' ? (lang === 'en' ? 'Client' : 'صاحب عمل') : (lang === 'en' ? 'Freelancer' : 'مستقل')}
                </span>

                <div className="profile-extra-info">
                  {viewUser.location && <span className="profile-info-chip"><i className="fas fa-map-marker-alt"></i>{viewUser.location}</span>}
                  {viewUser.phone    && <span className="profile-info-chip"><i className="fas fa-phone"></i>{viewUser.phone}</span>}
                  {viewUser.yearsOfExperience != null && viewUser.yearsOfExperience !== '' && (
                    <span className="profile-info-chip"><i className="fas fa-briefcase"></i>{viewUser.yearsOfExperience} {lang === 'en' ? 'yrs exp.' : 'سنة خبرة'}</span>
                  )}
                  {viewUser.role === 'client' && viewUser.companyName && (
                    <span className="profile-info-chip"><i className="fas fa-building"></i>{viewUser.companyName}</span>
                  )}
                  {viewUser.role === 'freelancer' && viewUser.hourlyRate && (
                    <span className="profile-info-chip"><i className="fas fa-dollar-sign"></i>{viewUser.hourlyRate} {lang === 'en' ? 'EGP/hr' : 'ج.م/ساعة'}</span>
                  )}
                  {viewUser.role === 'freelancer' && viewUser.portfolioUrl && (
                    <span className="profile-info-chip"><a href={viewUser.portfolioUrl} target="_blank" rel="noopener noreferrer" style={{color: 'inherit', textDecoration: 'none'}}><i className="fas fa-link"></i>{lang === 'en' ? 'Portfolio' : 'معرض الأعمال'}</a></span>
                  )}
                  {viewUser.role === 'freelancer' && viewUser.availabilityStatus && (
                    <span className={`profile-info-chip`} style={{ color: viewUser.availabilityStatus === 'Available' ? '#2ecc71' : (viewUser.availabilityStatus === 'Busy' ? '#f1c40f' : '#e74c3c') }}>
                      <i className="fas fa-clock"></i>{viewUser.availabilityStatus === 'Available' ? (lang === 'en' ? 'Available' : 'متاح') : viewUser.availabilityStatus === 'Busy' ? (lang === 'en' ? 'Busy' : 'مشغول') : (lang === 'en' ? 'Not Available' : 'غير متاح')}
                    </span>
                  )}
                </div>
                {viewUser.bio && <p style={{ fontSize: '13px', color: 'var(--text-secondary)', lineHeight: '1.6', marginTop: '8px', maxWidth: '480px' }}>{viewUser.bio}</p>}

                <div className="profile-stats-row">
                  {stats.map((s, i) => (
                    <div key={i} className="profile-stat">
                      <small>{s.label}</small>
                      <strong dangerouslySetInnerHTML={{ __html: s.value }}></strong>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Edit Profile Form (Only for owner) */}
            {isMe && editing && (
              <div className="profile-edit-card">
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
                  <h3 style={{ fontSize: '16px', fontWeight: 800, color: 'var(--gold)', margin:0 }}>
                    <i className="fas fa-user-edit" style={{ marginRight: '8px' }}></i>
                    {lang === 'en' ? 'Edit Profile' : 'تعديل الملف الشخصي'}
                  </h3>
                  <button className="btn-secondary" style={{padding:'4px 12px', fontSize:'11px'}} onClick={() => setEditing(false)}>
                    {lang === 'en' ? 'Cancel' : 'إلغاء'}
                  </button>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px,1fr))', gap: '14px' }}>
                  {[
                    { key: 'name', icon: 'fa-user', label: lang === 'en' ? 'Full Name' : 'الاسم الكامل', type: 'text' },
                    { key: 'phone', icon: 'fa-phone', label: lang === 'en' ? 'Phone' : 'الهاتف', type: 'tel' },
                    { key: 'location', icon: 'fa-map-marker-alt', label: lang === 'en' ? 'Location' : 'الموقع', type: 'text' },
                    { key: 'yearsOfExperience', icon: 'fa-briefcase', label: lang === 'en' ? 'Years of Exp.' : 'سنوات الخبرة', type: 'number' },
                    ...(user.role === 'client' ? [{ key: 'companyName', icon: 'fa-building', label: lang === 'en' ? 'Company Name' : 'اسم الشركة', type: 'text' }] : []),
                    ...(user.role === 'freelancer' ? [
                      { key: 'hourlyRate', icon: 'fa-dollar-sign', label: lang === 'en' ? 'Hourly Rate' : 'سعر الساعة', type: 'number' },
                      { key: 'portfolioUrl', icon: 'fa-link', label: lang === 'en' ? 'Portfolio URL' : 'رابط الأعمال', type: 'url' },
                    ] : []),
                  ].map(f => (
                    <div key={f.key} className="form-group" style={{ marginBottom: 0 }}>
                      <label className="form-label">{f.label}</label>
                      <div className="input-icon-wrap">
                        <i className={`fas ${f.icon} input-icon`}></i>
                        <input className="form-input" type={f.type} value={editForm[f.key] || ''}
                          onChange={e => setF(f.key, e.target.value)} />
                      </div>
                    </div>
                  ))}
                  {user.role === 'freelancer' && (
                    <div className="form-group" style={{ marginBottom: 0 }}>
                      <label className="form-label">{lang === 'en' ? 'Availability' : 'حالة التفرغ'}</label>
                      <div className="input-icon-wrap">
                        <i className="fas fa-clock input-icon"></i>
                        <select className="form-input" value={editForm.availabilityStatus || 'Available'}
                          onChange={e => setF('availabilityStatus', e.target.value)}
                          style={{ appearance: 'none' }}>
                          <option value="Available">{lang === 'en' ? 'Available' : 'متاح'}</option>
                          <option value="Busy">{lang === 'en' ? 'Busy' : 'مشغول'}</option>
                          <option value="Not Available">{lang === 'en' ? 'Not Available' : 'غير متاح'}</option>
                        </select>
                      </div>
                    </div>
                  )}
                </div>
                <div className="form-group" style={{ marginTop: '14px' }}>
                  <label className="form-label">{lang === 'en' ? 'Bio' : 'نبذة شخصية'}</label>
                  <textarea className="form-input" value={editForm.bio}
                    onChange={e => setF('bio', e.target.value)}
                    placeholder={lang === 'en' ? 'Tell freelancers / clients about yourself...' : 'اكتب نبذة عنك...'}
                    style={{ minHeight: '80px', paddingLeft: '16px' }} />
                </div>
                <div style={{display:'flex', alignItems:'center', gap:'15px', marginTop:'14px'}}>
                   <button className="btn-primary" onClick={handleSave} disabled={saving}>
                     {saving ? <><span className="spinner"></span>{lang === 'en' ? ' Saving...' : ' جاري الحفظ...'}</> : <><i className="fas fa-save"></i>{lang === 'en' ? 'Save Changes' : 'حفظ التغييرات'}</>}
                   </button>
                   {saveMsg && <span style={{ fontSize: '13px', color: saveMsg.startsWith('✓') ? '#2ecc71' : '#e74c3c', fontWeight: 700 }}>{saveMsg}</span>}
                </div>
              </div>
            )}

            {/* Portfolio Gallery Section */}
            <div className="profile-edit-card" style={{ marginTop: '24px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                <h3 style={{ fontSize: '16px', fontWeight: 800, color: 'var(--gold)', marginBottom: 0 }}>
                  <i className="fas fa-briefcase" style={{ marginRight: '8px' }}></i>
                  {lang === 'en' ? 'Portfolio Gallery' : 'معرض الأعمال'}
                </h3>
                {isMe && <button className="btn-secondary" style={{ fontSize: '12px', padding: '6px 12px' }}>
                  <i className="fas fa-plus"></i>{lang === 'en' ? 'Add Project' : 'إضافة مشروع'}
                </button>}
              </div>
              
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: '16px' }}>
                {[1,2,3].map(i => (
                  <div key={i} className="job-card" style={{ padding: 0, overflow: 'hidden' }}>
                    <img src={`https://picsum.photos/seed/${i + (viewUserId || 'me')}/400/300`} style={{ width: '100%', height: '140px', objectFit: 'cover', display: 'block' }} alt="Project" />
                    <div style={{ padding: '12px' }}>
                      <div style={{ fontWeight: 700, fontSize: '14px', marginBottom: '4px' }}>
                        {lang === 'en' ? `Project Alpha ${i}` : `مشروع ألفا ${i}`}
                      </div>
                      <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>
                        {lang === 'en' ? 'UI/UX Design • Web Development' : 'تصميم واجهات • تطوير ويب'}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Quick Links Grid (Restore if needed or keep existing) */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(280px,1fr))', gap: '20px', marginTop: '24px' }}>
              {quickLinks.map((item, i) => (
                <div key={i} className="job-card" style={{ cursor: 'pointer' }} onClick={() => setPage(item.page)}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
                    <div style={{ width: '48px', height: '48px', borderRadius: '12px', background: `${item.color}18`, color: item.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '20px', flexShrink: 0 }}>
                      <i className={`fas ${item.icon}`}></i>
                    </div>
                    <div>
                      <div style={{ fontWeight: 800, marginBottom: '4px' }}>{item.label}</div>
                      <div style={{ fontSize: '12px', color: 'var(--text-muted)' }}>{item.sub}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Reviews Section */}
            <div className="profile-edit-card" style={{ marginTop: '24px' }}>
              <h3 style={{ fontSize: '16px', fontWeight: 800, color: 'var(--gold)', marginBottom: '20px' }}>
                <i className="fas fa-star" style={{ marginRight: '8px' }}></i>
                {lang === 'en' ? 'Client Reviews' : 'تقييمات العملاء'}
              </h3>
              {reviews.length === 0 ? (
                <p style={{ color: 'var(--text-secondary)', fontSize: '13px' }}>{lang === 'en' ? 'No reviews yet.' : 'لا توجد تقييمات بعد.'}</p>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                  {reviews.map((r, i) => (
                    <div key={i} style={{ padding: '16px', background: 'rgba(255,255,255,0.03)', borderRadius: '12px', border: '1px solid rgba(255,255,255,0.05)' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
                        <div style={{ color: 'var(--gold)', fontWeight: 700 }}>
                          {'★'.repeat(r.rating)}{'☆'.repeat(5 - r.rating)}
                        </div>
                        <small style={{ color: 'var(--text-secondary)' }}>{new Date(r.timestamp).toLocaleDateString()}</small>
                      </div>
                      <p style={{ fontSize: '13px', lineHeight: '1.5' }}>{r.comment}</p>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }


    /* ============================================================
       POST JOB PAGE
       ============================================================ */
    function PostJobPage({ lang, user, setPage }) {
      const dir = lang === 'ar' ? 'rtl' : 'ltr';

      const CAT_META = {
        'Web Development':    { icon: 'fa-laptop-code', color: '#0074D9' },
        'Design':             { icon: 'fa-paint-brush',  color: '#e74c3c' },
        'Marketing':          { icon: 'fa-chart-line',   color: '#f1c40f' },
        'Mobile Development': { icon: 'fa-mobile-alt',   color: '#2ecc71' },
        'Writing':            { icon: 'fa-pen-nib',      color: '#e67e22' },
        'Other':              { icon: 'fa-briefcase',    color: '#9b59b6' },
      };

      const [categories, setCategories] = useState(Object.keys(CAT_META));
      const [allSkills,  setAllSkills]  = useState([]);

      useEffect(() => {
        if (window.UserDB) {
          window.UserDB.listCategories().then(cats => {
            if (cats && cats.length) setCategories(cats.map(c => c.name));
          });
          window.UserDB.listSkills().then(skills => {
            if (skills && skills.length) setAllSkills(skills.map(s => s.name));
          });
        }
      }, []);

      const [form, setForm] = useState({
        title: '', category: 'Web Development', type: 'local',
        budget: '', description: '', skillsRaw: '', deadline: '', days: ''
      });
      const [selectedSkills, setSelectedSkills] = useState([]);
      const [loading, setLoading] = useState(false);
      const [done, setDone]       = useState(false);
      const [error, setError]     = useState('');
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const toggleSkill = (name) => {
        setSelectedSkills(prev =>
          prev.includes(name) ? prev.filter(s => s !== name) : [...prev, name]
        );
      };

      /* — Role guards — */
      if (!user) {
        return (
          <div className="auth-page" dir={dir}>
            <div style={{ textAlign: 'center' }}>
              <i className="fas fa-lock" style={{ fontSize: '64px', color: 'var(--gold)', marginBottom: '24px', display: 'block' }}></i>
              <h2 style={{ marginBottom: '12px' }}>{lang === 'en' ? 'Login Required' : 'يجب تسجيل الدخول'}</h2>
              <p style={{ color: 'var(--text-secondary)', marginBottom: '28px' }}>
                {lang === 'en' ? 'Please log in to post a service.' : 'يرجى تسجيل الدخول لنشر خدمة.'}
              </p>
              <button className="btn-primary" onClick={() => setPage('login')}>
                <i className="fas fa-sign-in-alt"></i>{lang === 'en' ? 'Login' : 'تسجيل الدخول'}
              </button>
            </div>
          </div>
        );
      }

      if (user.role !== 'client' && user.role !== 'admin') {
        return (
          <div className="auth-page" dir={dir}>
            <div style={{ textAlign: 'center', maxWidth: '420px' }}>
              {/* Role icon */}
              <div style={{
                width: '88px', height: '88px', borderRadius: '50%',
                background: 'rgba(255,215,0,0.1)', border: '2px solid rgba(255,215,0,0.25)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                margin: '0 auto 24px', fontSize: '36px', color: 'var(--gold)'
              }}>
                <i className="fas fa-user-tie"></i>
              </div>
              <h2 style={{ marginBottom: '12px' }}>
                {lang === 'en' ? 'Client Account Required' : 'مطلوب حساب عميل'}
              </h2>
              <p style={{ color: 'var(--text-secondary)', marginBottom: '8px', lineHeight: '1.7' }}>
                {lang === 'en'
                  ? 'Posting services is reserved for clients. You are currently signed in as a '
                  : 'نشر الخدمات مخصص للعملاء. أنت مسجل حالياً بحساب '}
                <strong style={{ color: 'var(--gold)' }}>
                  {user.role === 'admin' ? (lang === 'en' ? 'admin' : 'مشرف') : (lang === 'en' ? 'freelancer' : 'مستقل')}
                </strong>
                {lang === 'en' ? '.' : '.'}
              </p>
              {user.role !== 'admin' && (
                <p style={{ color: 'var(--text-muted)', fontSize: '13px', marginBottom: '28px' }}>
                  {lang === 'en'
                    ? 'You can switch your account type to Client in Settings.'
                    : 'يمكنك تغيير نوع حسابك إلى عميل من الإعدادات.'}
                </p>
              )}
              <div style={{ display: 'flex', gap: '12px', justifyContent: 'center', flexWrap: 'wrap', marginTop: user.role === 'admin' ? '28px' : '0' }}>
                {user.role !== 'admin' && (
                  <button className="btn-primary" onClick={() => setPage('settings')}>
                    <i className="fas fa-cog"></i>
                    {lang === 'en' ? 'Switch to Client' : 'التبديل لعميل'}
                  </button>
                )}
                <button className="btn-secondary" onClick={() => setPage('jobs')}>
                  <i className="fas fa-search"></i>
                  {lang === 'en' ? 'Browse Services' : 'تصفح الخدمات'}
                </button>
              </div>
            </div>
          </div>
        );
      }

      /* — Success screen — */
      if (done) {
        return (
          <div className="auth-page" dir={dir}>
            <div className="auth-card" style={{ textAlign: 'center', maxWidth: '520px' }}>
              <div style={{ fontSize: '64px', color: '#2ecc71', marginBottom: '20px' }}>
                <i className="fas fa-check-circle"></i>
              </div>
              <h2 style={{ marginBottom: '12px' }}>{lang === 'en' ? 'Service Posted!' : 'تم نشر الخدمة!'}</h2>
              <p style={{ color: 'var(--text-secondary)', marginBottom: '28px' }}>
                {lang === 'en' ? 'Your service is now live and visible to all freelancers.' : 'خدمتك الآن مرئية لجميع المستقلين.'}
              </p>
              <div style={{ display: 'flex', gap: '12px', justifyContent: 'center', flexWrap: 'wrap' }}>
                <button className="btn-primary" onClick={() => setPage('jobs')}>
                  <i className="fas fa-search"></i>{lang === 'en' ? 'Browse Services' : 'تصفح الخدمات'}
                </button>
                <button className="btn-secondary" onClick={() => { setDone(false); setForm({ title: '', category: 'Web Development', type: 'local', budget: '', description: '', skillsRaw: '' }); }}>
                  <i className="fas fa-plus"></i>{lang === 'en' ? 'Post Another' : 'نشر خدمة أخرى'}
                </button>
              </div>
            </div>
          </div>
        );
      }

      const handleSubmit = (e) => {
        e.preventDefault();
        const { title, category, type, budget, description, deadline, days } = form;
        if (!title || !budget || !description) {
          setError(lang === 'en' ? 'Please fill in all required fields.' : 'يرجى ملء جميع الحقول المطلوبة.');
          return;
        }
        /* skills come from tag picker; fallback to comma input */
        const skills = selectedSkills.length > 0
          ? selectedSkills
          : form.skillsRaw.split(',').map(s => s.trim()).filter(Boolean);
        if (skills.length === 0) {
          setError(lang === 'en' ? 'Add at least one skill.' : 'أضف مهارة واحدة على الأقل.');
          return;
        }
        const meta = CAT_META[category] || CAT_META['Other'];
        const jobData = {
          title, category, type,
          budget:      Number(budget),
          description, skills,
          deadline:    deadline || null,
          days:        days ? Number(days) : null,
          icon:        meta.icon,
          color:       meta.color,
          postedBy:    user.id,
          order:       Date.now()
        };
        setLoading(true);
        setError('');
        window.UserDB.addJob(jobData).then((result) => {
          setLoading(false);
          if (result.ok) {
            setDone(true);
            // Simple AI Matching: Notify freelancers with matching skills
            firebase.firestore().collection('users').where('role', '==', 'freelancer').get().then(snap => {
              snap.docs.forEach(doc => {
                const u = doc.data();
                const matches = skills.some(s => 
                  (u.bio || '').toLowerCase().includes(s.toLowerCase()) || 
                  (u.skills || []).some(us => us.toLowerCase() === s.toLowerCase())
                );
                if (matches) {
                  window.UserDB.addNotification(doc.id, 'info', `A new job matching your skills was posted: ${title}`, 'jobs', result.id);
                }
              });
            });
          } else {
            setError('❌ ' + (result.error || 'Failed to post. Try again.'));
          }
        });
      };

      const meta = CAT_META[form.category];

      return (
        <div className="jobs-page" dir={dir}>
          <div className="container" style={{ maxWidth: '760px', paddingTop: '40px', paddingBottom: '60px' }}>

            {/* Header */}
            <div className="section-header" style={{ marginBottom: '32px' }}>
              <span className="tag"><i className="fas fa-plus-circle"></i>{lang === 'en' ? 'New Listing' : 'إضافة خدمة'}</span>
              <h1 style={{ fontSize: '2rem' }}>
                {lang === 'en' ? <><span style={{ color: 'var(--gold)' }}>Post</span> a Service</> : <><span style={{ color: 'var(--gold)' }}>نشر</span> خدمة</>}
              </h1>
              <p>{lang === 'en' ? 'Fill in the details below to publish your service listing to all freelancers.' : 'أكمل التفاصيل أدناه لنشر خدمتك لجميع المستقلين.'}</p>
            </div>

            {/* Form Card */}
            <div className="auth-card" style={{ maxWidth: '100%', padding: '36px 40px' }}>
              {error && <div className="auth-error" style={{ marginBottom: '20px' }}>{error}</div>}
              <form onSubmit={handleSubmit}>

                {/* Title */}
                <div className="form-group">
                  <label className="form-label">{lang === 'en' ? 'Service Title *' : 'عنوان الخدمة *'}</label>
                  <div className="input-icon-wrap">
                    <i className="fas fa-heading input-icon"></i>
                    <input className="form-input" type="text" value={form.title}
                      onChange={e => { set('title', e.target.value); setError(''); }}
                      placeholder={lang === 'en' ? 'e.g. Full-Stack Web Developer Needed' : 'مثال: مطلوب مطور ويب متكامل'} />
                  </div>
                </div>

                {/* Category + Type row */}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                  <div className="form-group">
                    <label className="form-label">{lang === 'en' ? 'Category *' : 'الفئة *'}</label>
                    <div className="input-icon-wrap">
                      <i className={`fas ${meta.icon} input-icon`} style={{ color: meta.color }}></i>
                      <select className="form-input" value={form.category}
                        onChange={e => set('category', e.target.value)}
                        style={{ cursor: 'pointer' }}>
                        {categories.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="form-group">
                    <label className="form-label">{lang === 'en' ? 'Project Type *' : 'نوع المشروع *'}</label>
                    <div style={{ display: 'flex', gap: '10px', marginTop: '4px' }}>
                      {[{v:'local', en:'Local', ar:'محلي'}, {v:'intl', en:'International', ar:'دولي'}].map(t => (
                        <div key={t.v}
                          onClick={() => set('type', t.v)}
                          className={`role-card${form.type === t.v ? ' selected' : ''}`}
                          style={{ flex: 1, padding: '10px 8px', fontSize: '13px' }}>
                          <i className={`fas fa-${t.v === 'local' ? 'map-marker-alt' : 'globe'}`}></i>
                          <span>{lang === 'en' ? t.en : t.ar}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Budget */}
                <div className="form-group">
                  <label className="form-label">{lang === 'en' ? 'Budget (EGP) *' : 'الميزانية (جنيه) *'}</label>
                  <div className="input-icon-wrap">
                    <i className="fas fa-dollar-sign input-icon"></i>
                    <input className="form-input" type="number" min="1" value={form.budget}
                      onChange={e => { set('budget', e.target.value); setError(''); }}
                      placeholder={lang === 'en' ? 'e.g. 5000' : 'مثال: 5000'} />
                  </div>
                </div>

                {/* Description */}
                <div className="form-group">
                  <label className="form-label">{lang === 'en' ? 'Description *' : 'الوصف *'}</label>
                  <textarea className="form-input contact-textarea" value={form.description}
                    onChange={e => { set('description', e.target.value); setError(''); }}
                    placeholder={lang === 'en' ? 'Describe the project, requirements, and deliverables...' : 'صف المشروع والمتطلبات والمخرجات المطلوبة...'}
                    style={{ minHeight: '120px' }} />
                </div>

                {/* Deadline + Days row */}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                  <div className="form-group">
                    <label className="form-label">{lang === 'en' ? 'Deadline' : 'الموعد النهائي'}</label>
                    <div className="input-icon-wrap">
                      <i className="fas fa-calendar-alt input-icon"></i>
                      <input className="form-input" type="date" value={form.deadline}
                        onChange={e => set('deadline', e.target.value)} />
                    </div>
                  </div>
                  <div className="form-group">
                    <label className="form-label">{lang === 'en' ? 'Duration (days)' : 'المدة (أيام)'}</label>
                    <div className="input-icon-wrap">
                      <i className="fas fa-clock input-icon"></i>
                      <input className="form-input" type="number" min="1" value={form.days}
                        onChange={e => set('days', e.target.value)}
                        placeholder={lang === 'en' ? 'e.g. 30' : 'مثال: 30'} />
                    </div>
                  </div>
                </div>

                {/* Skills — tag picker from DB */}
                <div className="form-group">
                  <label className="form-label">{lang === 'en' ? 'Required Skills *' : 'المهارات المطلوبة *'}</label>
                  {allSkills.length > 0 ? (
                    <div className="skill-tag-picker">
                      {allSkills.filter(sk => !form.category || !CAT_META[form.category] || true).map(sk => (
                        <span key={sk}
                          className={`skill-tag-option${selectedSkills.includes(sk) ? ' selected' : ''}`}
                          onClick={() => toggleSkill(sk)}>{sk}</span>
                      ))}
                    </div>
                  ) : (
                    <div className="input-icon-wrap">
                      <i className="fas fa-tags input-icon"></i>
                      <input className="form-input" type="text" value={form.skillsRaw}
                        onChange={e => { set('skillsRaw', e.target.value); setError(''); }}
                        placeholder={lang === 'en' ? 'e.g. React, Node.js' : 'مثال: React، Node.js'} />
                    </div>
                  )}
                  {(selectedSkills.length > 0 || form.skillsRaw) && (
                    <div className="job-skills" style={{ marginTop: '10px' }}>
                      {(selectedSkills.length > 0 ? selectedSkills : form.skillsRaw.split(',').map(s=>s.trim()).filter(Boolean)).map((s,i)=>(
                        <span key={i} className="job-skill">{s}</span>
                      ))}
                    </div>
                  )}
                </div>

                {/* Submit */}
                <button className="btn-auth btn-auth-primary" type="submit" disabled={loading}
                  style={{ marginTop: '8px' }}>
                  {loading
                    ? <><span className="spinner"></span>{lang === 'en' ? ' Publishing...' : ' جاري النشر...'}</>
                    : <><i className="fas fa-paper-plane" style={{ marginRight: '8px' }}></i>{lang === 'en' ? 'Publish Service' : 'نشر الخدمة'}</>}
                </button>
              </form>
            </div>

          </div>
        </div>
      );
    }

    /* ============================================================
       APPLICATIONS PAGE
       ============================================================ */
